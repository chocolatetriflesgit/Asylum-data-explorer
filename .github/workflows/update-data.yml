name: Update data

# Daily pull of gov.uk publications. Refreshes:
#   - small-boats ODS     -> data/boats-data.js
#   - asylum-claims xlsx  -> data/nat-full-data.js, data/nat-quarterly-data.js,
#                            data/decisions-data.js, data/nat-series-data.js
#   - asylum-support xlsx -> data/hotels-data.js
#   - resettlement xlsx   -> data/resettlement-data.js
#   - returns xlsx        -> data/returns-data.js
#   - age-disputes xlsx   -> data/age-disputes-data.js
#   - backlog xlsx        -> data/backlog-data.js
#   - support-by-LA xlsx  -> data/support-regions-data.js
#   - IOM missing-migrants -> data/deaths-data.js (non-gov.uk source)
#   - last-7-days HTML    -> data/provisional-data.js
# Then re-bundles index.html, runs integrity tests, and commits if anything
# changed. Failure is loud — each fetcher exits non-zero if the gov.uk page
# layout shifts, which is exactly what we want.

on:
  schedule:
    - cron: "0 7 * * *"  # 07:00 UTC daily
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "src/**"
      - "index.html"
      - ".github/workflows/update-data.yml"

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Fetch latest small-boats ODS
        run: python scripts/fetch_latest.py

      - name: Build boats data module
        run: python scripts/build_boats_data.py cache/latest.ods data/

      - name: Fetch latest asylum-claims xlsx
        run: python scripts/fetch_asylum_claims.py

      - name: Build NAT_FULL data module
        run: python scripts/build_nat_full.py cache/asylum-claims-datasets-*.xlsx data/

      - name: Build NAT_QUARTERLY data module
        run: python scripts/build_nat_quarterly.py cache/asylum-claims-datasets-*.xlsx data/

      - name: Build decisions data module
        run: python scripts/build_decisions.py cache/asylum-claims-datasets-*.xlsx data/

      - name: Build nationality series data module
        run: python scripts/build_nat_series.py cache/asylum-claims-datasets-*.xlsx data/

      - name: Fetch latest asylum-support xlsx
        run: python scripts/fetch_asylum_support.py

      - name: Build hotels data module
        run: python scripts/build_hotels.py cache/asylum-seekers-receipt-support-datasets-*.xlsx data/

      - name: Fetch latest resettlement xlsx
        run: python scripts/fetch_resettlement.py

      - name: Build resettlement data module
        run: python scripts/build_resettlement.py cache/resettlement-scheme-datasets-*.xlsx data/

      - name: Fetch latest returns xlsx
        run: python scripts/fetch_returns.py

      - name: Build returns data module
        run: python scripts/build_returns.py cache/returns-datasets-*.xlsx data/

      - name: Fetch latest age-disputes xlsx
        run: python scripts/fetch_age_disputes.py

      - name: Build age-disputes data module
        run: python scripts/build_age_disputes.py cache/age-disputes-datasets-*.xlsx data/

      - name: Fetch latest backlog xlsx
        run: python scripts/fetch_backlog.py

      - name: Build backlog data module
        run: python scripts/build_backlog.py cache/asylum-claims-awaiting-decision-datasets-*.xlsx data/

      - name: Fetch latest support-by-LA xlsx
        run: python scripts/fetch_support_la.py

      - name: Build support regions data module
        run: python scripts/build_support_regions.py cache/support-local-authority-datasets-*.xlsx data/

      - name: Build support-by-LAD data module
        run: python scripts/build_support_la.py cache/support-local-authority-datasets-*.xlsx data/

      # UK Local Authority District boundaries — committed once a year by ONS.
      # Skip if cached; the build will fall back to the existing cache otherwise.
      - name: Fetch ONS LAD boundaries
        run: python scripts/fetch_uk_geo.py
        continue-on-error: true

      - name: Build UK map data module
        run: python scripts/build_uk_map.py

      - name: Fetch IOM Missing Migrants CSV
        run: python scripts/fetch_deaths.py
        continue-on-error: true  # IOM is out-of-band; don't fail the job if their URL blips.

      - name: Build Channel deaths data module
        run: |
          if [ -f cache/deaths/latest.csv ]; then
            python scripts/build_deaths.py cache/deaths/latest.csv data/
          else
            python scripts/build_deaths.py --empty data/
          fi

      - name: Fetch gov.uk last-7-days provisional page
        run: python scripts/fetch_last_7_days.py

      - name: Build provisional data module
        run: python scripts/build_provisional.py

      # ─────────────────────────────────────────────────────────
      # External country-context sources for the Atlas. All four
      # are annual feeds, so a daily run is wasteful — but cheap.
      # UCDP requires UCDP_API_TOKEN as a repo secret; if it isn't
      # set the fetcher exits with code 2 and we move on.
      # ─────────────────────────────────────────────────────────
      - name: Fetch World Bank GDP per capita
        run: python scripts/fetch_worldbank.py
        continue-on-error: true

      - name: Fetch Freedom House FIW
        run: python scripts/fetch_freedomhouse.py
        continue-on-error: true

      - name: Fetch UCDP conflict events
        env:
          UCDP_API_TOKEN: ${{ secrets.UCDP_API_TOKEN }}
        run: python scripts/fetch_ucdp.py
        continue-on-error: true

      - name: Build country-context data module
        run: python scripts/build_country_context.py

      - name: Re-bundle index.html
        run: python scripts/bundle.py

      - name: Run data integrity tests
        run: pytest tests/ -v

      - name: Commit changes if any
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- data/ index.html; then
            echo "no changes"
            exit 0
          fi

          TODAY=$(date -u +%Y-%m-%d)
          git add data/ index.html
          git commit -m "chore: data update ${TODAY}"
          git push
