name: Security scan

# pip-audit against runtime + dev dependencies.
# Runs on every push/PR + weekly so we catch advisories published between pushes.
# Failing the job blocks merge until the advisory is resolved (upgrade or pin).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit==2.7.3

      - name: Audit runtime requirements
        run: pip-audit -r requirements.txt --strict

      - name: Audit dev requirements
        run: pip-audit -r requirements-dev.txt --strict
