// gov.uk link. Kept here rather than pipeline-generated because these facts
// change rarely and aren't in the source ODS.
const SCHEME_INFO = {
  'ACRS': {
    full: 'Afghan Citizens Resettlement Scheme',
    eligibility: 'Afghan nationals at risk after the 2021 evacuation — three pathways (evacuees, UNHCR referrals, at-risk groups).',
    status: 'Open',

  },

    full: 'Afghan Relocations and Assistance Policy',
    eligibility: 'Afghans who worked for or with HM Government in Afghanistan and their families.',
    status: 'Closed to new principal applications (Dec 2024); family reunion continues.',
    url: 'https://www.gov.uk/guidance/the-afghan-relocations-and-assistance-policy',
  },
  'UK Resettlement Scheme': {
    full: 'UK Resettlement Scheme (UKRS)',
    eligibility: 'Refugees referred by UNHCR, prioritising the most vulnerable. Replaced VPRS in 2021.',
    status: 'Open',
    url: 'https://www.gov.uk/government/publications/uk-resettlement-scheme-factsheet',
  },
  'Community Sponsorship': {
    full: 'Community Sponsorship Scheme',
    eligibility: 'Refugees matched to community groups that provide housing and integration support for the first year.',
    status: 'Open',
    url: 'https://www.gov.uk/government/publications/apply-for-full-community-sponsor-status',
  },
  'Mandate Scheme': {
    full: 'Mandate Resettlement Scheme',
    eligibility: 'Refugees anywhere in the world with a close family member settled in the UK willing to accommodate them.',
    status: 'Open',
    url: 'https://www.gov.uk/government/publications/mandate-refugee-programme-policy-and-process',
  },
  'Afghan Resettlement Programme': {
    full: 'Afghan Resettlement Programme (ARP)',
    eligibility: 'Umbrella programme from 2024 consolidating ACRS and ARAP delivery. No new pathways beyond its constituents.',
    status: 'Programme ongoing',
    url: 'https://www.gov.uk/government/publications/afghan-resettlement-programme-consolidation',
  },
};

function resolveSchemeKey(name) {
  if (SCHEME_INFO[name]) return name;
  const n = name.toUpperCase();
  if (n.startsWith('ACRS')) return 'ACRS';
  if (n.startsWith('ARAP')) return 'ARAP';
  if (n.startsWith('UKRS') || n.startsWith('UK RESETTLEMENT')) return 'UK Resettlement Scheme';
  if (n.startsWith('COMMUNITY')) return 'Community Sponsorship';
  if (n.startsWith('MANDATE')) return 'Mandate Scheme';
  if (n.startsWith('AFGHAN RESETTLEMENT')) return 'Afghan Resettlement Programme';
  return name;
}

function SchemeCell({ name, colorIdx }) {
  const key = resolveSchemeKey(name);
  const info = SCHEME_INFO[key];
  const tip = info ? `${info.full}\nEligibility: ${info.eligibility}\nStatus: ${info.status}` : null;
  return (
    <td style={{padding:'13px 0',color:'var(--ink)'}}>
      <span className="tick" style={{background:['var(--accent)','var(--accent-2)','var(--accent-warn)','var(--accent-gold)','var(--muted)','var(--muted-2)'][colorIdx%6]}}/>
      <span style={{fontWeight:500}}>{name}</span>
      {info && (
        <>
          {info.full !== name && (
            <div style={{fontSize:11.5,color:'var(--muted)',fontStyle:'italic',marginTop:2,marginLeft:22,lineHeight:1.4}}>
              {info.full}
            </div>
          )}
          <div style={{fontSize:11,color:'var(--muted-2)',marginTop:3,marginLeft:22,display:'flex',gap:10,alignItems:'center'}}>
            <span title={tip} style={{cursor:'help',borderBottom:'1px dotted var(--muted-2)'}}>{info.status}</span>
            <a href={info.url} target="_blank" rel="noopener noreferrer" style={{color:'var(--accent)',textDecoration:'none'}}>gov.uk ↗</a>
          </div>
        </>
      )}
    </td>
  );
}

// Peek the first three rows of whichever window-global is most
// representative for a given dataset code. Used by the Datasets page
// to show readers what the underlying shape actually looks like — no
// more "trust us, it exists" listings.
function _previewFor(code) {
  const W = typeof window !== 'undefined' ? window : {};
  const pick = (arr) => Array.isArray(arr) && arr.length ? arr.slice(0, 3) : null;
  switch (code) {
    case 'ASY_D01':  return { global: 'NAT_FULL',            rows: pick(W.NAT_FULL) };
    case 'ASY_D02':  return { global: 'DECISIONS_LATEST',    rows: pick(W.DECISIONS_LATEST) };
    case 'ASY_D03':  return { global: 'SEX_AGE_ANNUAL',      rows: pick(W.SEX_AGE_ANNUAL) };
    case 'ASY_D04':  return { global: 'OUTCOME_COHORT_ANNUAL', rows: pick(W.OUTCOME_COHORT_ANNUAL) };
    case 'ASY_D07':  return { global: 'BACKLOG_LATEST',      rows: pick(W.BACKLOG_LATEST) };
    case 'ASY_D05':  return { global: 'SUPPORT_REGIONS',     rows: pick(W.SUPPORT_REGIONS) };
    case 'ASY_D09':  return { global: 'HOTELS',              rows: pick(W.HOTELS) };
    case 'ASY_D11':  return { global: 'SUPPORT_REGIONS',     rows: pick(W.SUPPORT_REGIONS) };
    case 'AGE_D01':  return { global: 'AGE_DISPUTES_BY_NATIONALITY', rows: pick(W.AGE_DISPUTES_BY_NATIONALITY) };
    case 'SB_D01':   return { global: 'BOATS_WEEKLY',        rows: pick(W.BOATS_WEEKLY) };
    case 'SB_D02':   return { global: 'BOATS_PROVISIONAL',   rows: pick(W.BOATS_PROVISIONAL) };
    case 'IRR_D01':  return { global: 'IRR_BOATS_BY_NATIONALITY', rows: null };
    case 'RES_D01':  return { global: 'RESETTLEMENT_SERIES', rows: pick(W.RESETTLEMENT_SERIES) };
    case 'RES_D02':  return { global: 'UKRAINE_VISAS',       rows: null };
    default:         return { global: null, rows: null };
  }
}

const _boatsW = () => (typeof BOATS_WEEKLY !== 'undefined' ? BOATS_WEEKLY : []);
const _boatsM = () => (typeof BOATS_MONTHLY !== 'undefined' ? BOATS_MONTHLY : []);
const _boatsD = () => (typeof BOATS_DAILY !== 'undefined' ? BOATS_DAILY : []);
const _annualFromWeekly = (key) => {
  const by = {};
  for (const row of _boatsW()) {
    if (row[key] == null) continue;
    const y = +row.we.slice(0,4);
    by[y] = (by[y] || 0) + row[key];
  }
  return Object.entries(by).map(([y,v])=>({y:+y, v})).sort((a,b)=>a.y-b.y);
};

      const colors = ['var(--accent)','var(--accent-warn)','var(--accent-2)','var(--accent-gold)','var(--ink-2)','var(--muted-2)'];
      return {
        years,
        series: sd.map(s => ({ name: s.name, data: years.map(y => s[String(y)] ?? 0) })),
        colors,
      };
    })(),
    series: [],
  },
  {
    id: 'returns',
    label: 'Returns by nationality (top 20)',
    render: 'returns-detail',
    stackData: (() => {
      const ret = typeof RETURNS_BY_NATIONALITY !== 'undefined' ? RETURNS_BY_NATIONALITY : [];
      const top = ret.slice(0, 20);
      const year = typeof RETURNS_META !== 'undefined' ? RETURNS_META.year : null;
      return {
        labels: top.map(r => r.name),
        series: [
          { name: 'Enforced',  data: top.map(r => r.enforced),  color: 'var(--accent-warn)' },
          { name: 'Voluntary', data: top.map(r => r.voluntary), color: 'var(--accent-gold)' },
        ],
        year,
      };
    })(),
    series: (() => {
      const ret = typeof RETURNS_BY_NATIONALITY !== 'undefined' ? RETURNS_BY_NATIONALITY : [];
      return ret.slice(0, 20).map((d, i) => ({ y: i, v: d.total, label: d.name }));
    })(),
    color: 'var(--accent-warn)',
    snapshot: true,
  },
  {
    id: 'age_disputes',
    label: 'Age disputes by nationality',
    series: (() => {
      const ad = typeof AGE_DISPUTES_BY_NATIONALITY !== 'undefined' ? AGE_DISPUTES_BY_NATIONALITY : [];
      return ad.filter(d => d.raised > 0).slice(0, 20).map((d, i) => ({ y: i, v: d.raised, label: d.name }));
    })(),
    color: 'var(--accent-2)',
    snapshot: true,
  },
];

const GRANULARITIES = ['daily','weekly','monthly','quarterly','annual'];

function getGranularSeries(opt, gran) {
  if (gran === 'annual' || !opt.supportsGranularity) return opt.series;
  if (opt.id !== 'boats') return opt.series;
  if (gran === 'monthly') return _boatsM().map((d,i)=>({y:i, v:d.m, label:d.month}));
  if (gran === 'weekly')  return _boatsW().map((d,i)=>({y:i, v:d.m, label:d.we}));
  if (gran === 'daily')   return _boatsD().map((d,i)=>({y:i, v:d.m, label:d.d}));
  if (gran === 'quarterly') {
    const by = {};
    for (const r of _boatsM()) {
      const [yr, mon] = r.month.split('-').map(Number);
      const q = `${yr}Q${Math.ceil(mon/3)}`;
      by[q] = (by[q] || 0) + r.m;
    }
    return Object.entries(by).map(([q,v],i)=>({y:i, v, label:q}));
  }
  return opt.series;
}

// Read the Build view's initial config out of the URL hash (set when a
// Dashboard chart is "forked into Build-a-chart" or when a link is
// shared). Falls back to localStorage, then to the built-in defaults.
function readBuildInitial() {
  const defaults = {
    ds: 'applications',
    overlays: ['boats'],
    chartType: 'line',
    range: [2018, DATA_MAX_YEAR],
    granularity: 'annual',
    selectedNats: ['Pakistan','Afghanistan','Iran','Eritrea','Syria'],
  };
  try {
    const read = (key, fromHash) => {
      const m = typeof location !== 'undefined'
        ? new RegExp('[#&]' + key + '=([^&]+)').exec(location.hash) : null;
      if (m) return decodeURIComponent(m[1]);
      if (fromHash) return null;
      const stored = typeof localStorage !== 'undefined' ? localStorage.getItem('build_' + key) : null;
      return stored;
    };
    const ds = read('d') || defaults.ds;
    const overlays = (read('o') || defaults.overlays.join(',')).split(',').filter(Boolean);
    const chartType = read('ct') || defaults.chartType;
    const rng = (read('r') || `${defaults.range[0]}-${defaults.range[1]}`).split('-').map(Number);
    const range = (rng.length === 2 && rng.every(Number.isFinite)) ? rng : defaults.range;
    const granularity = read('g') || defaults.granularity;
    const selectedNats = (read('nats') || defaults.selectedNats.join(',')).split(',').filter(Boolean);
    return { ds, overlays, chartType, range, granularity, selectedNats };
  } catch (_) {
    return defaults;
  }
}

function BuildView({ setRoute }) {

  const [overlays, setOverlays] = uS2(initial.overlays);

  // as either an inline-SVG file or a rasterised PNG. The chart primitives
  // use `var(--…)` tokens so we inline the relevant custom properties at
  // serialise time — otherwise a stand-alone SVG looks untokened.
  const TOKEN_KEYS = ['--accent','--accent-2','--accent-warn','--accent-gold','--bg','--bg-2','--bg-3','--ink','--ink-2','--muted','--muted-2','--rule','--rule-2','--serif','--mono'];
  const serialiseSvg = () => {
    const host = previewRef.current;
    if (!host) return null;
    const svg = host.querySelector('svg');
    if (!svg) return null;
    const clone = svg.cloneNode(true);
    // Inline design tokens so the file survives outside the page.
    const cs = getComputedStyle(document.documentElement);
    const declarations = TOKEN_KEYS
      .map(k => `${k}: ${cs.getPropertyValue(k).trim()};`)
      .filter(d => d.split(':')[1] && d.split(':')[1] !== ' ;')
      .join(' ');
    clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
    clone.setAttribute('style', (clone.getAttribute('style') || '') + '; ' + declarations);
    if (!clone.getAttribute('width')) clone.setAttribute('width', svg.getBoundingClientRect().width || 800);
    if (!clone.getAttribute('height')) clone.setAttribute('height', svg.getBoundingClientRect().height || 400);
    return new XMLSerializer().serializeToString(clone);
  };
  const downloadBlob = (blob, name) => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = name;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 0);
  };
  const baseName = () => `hodx-${ds}-${range[0]}-${range[1]}`;
  const onDownloadSvg = () => {
    const text = serialiseSvg();
    if (!text) return;
    downloadBlob(new Blob([text], { type: 'image/svg+xml' }), baseName() + '.svg');
  };
  const onDownloadPng = () => {
    const text = serialiseSvg();
    if (!text) return;
    const host = previewRef.current.querySelector('svg');
    const bbox = host.getBoundingClientRect();
    const scale = 2; // retina-ish
    const img = new Image();
    const svgUrl = URL.createObjectURL(new Blob([text], { type: 'image/svg+xml' }));
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width  = Math.max(1, Math.round(bbox.width  * scale));
      canvas.height = Math.max(1, Math.round(bbox.height * scale));

      ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Year axis + per-overlay series for MultiLineChart — only supported annual + line.

// Updates view (Tranche 6.3)
// Chronological changelog. Combines two streams:
//   1. Auto-detected "source refreshed" rows from each *_META.generatedAt
//      (one line per dataset, keyed by code, newest first).
//   2. Hand-curated editorial entries (new charts, revisions, notes) —
//      stored inline as REVISION_LOG because there is no upstream source.
// The merged list is rendered newest-first. No chart primitives; the page
// is purely a timeline so readers can see "what changed when".
// ─────────────────────────────────────────────────────────────
const REVISION_LOG = [
  { date: '22 April 2026', kind: 'Feature',   text: 'Cohort outcome ribbon, merged three-column sankey, and annual backlog waterfall launched from ASY_D04.' },
  { date: '22 April 2026', kind: 'Feature',   text: 'Per-capita Atlas mode (apps per 100k of origin-country displaced population) uses UNHCR population data.' },
  { date: '22 April 2026', kind: 'Feature',   text: 'Boats-by-nationality chart on the Flow view now reads from IRR_D01.' },
  { date: '21 April 2026', kind: 'Editorial', text: 'Story pages restructured with a standard anatomy: 80-word digest, "what this measures / doesn\u2019t" card, Further reading footer.' },
  { date: '21 April 2026', kind: 'Editorial', text: 'Every chart footer now shows "Source \u00b7 as-of \u00b7 next update", read directly from the source metadata.' },
  { date: '20 April 2026', kind: 'Editorial', text: 'Dashboard statistics rebuilt with a four-up hero strip and sparklines; 11 supporting statistics moved under "Detail".' },
  { date: '17 April 2026', kind: 'Source',    text: 'First successful data refresh against the 17 April 2026 small-boats ODS release.' },
];

function _updatesSourceRows() {
  const W = (typeof window !== 'undefined') ? window : {};
  const entries = [
    ['SB_D01',  'Small-boats crossings',                  W.BOATS_META],
    ['SB_D02',  'Small-boats last 7 days',                W.BOATS_PROVISIONAL_META],
    ['ASY_D01', 'Asylum applications by nationality',     W.NAT_FULL_META],
    ['ASY_D02', 'Initial decisions on asylum claims',     W.DECISIONS_META],
    ['ASY_D03', 'Age and sex of applicants',              W.SEX_AGE_META],
    ['ASY_D04', 'Outcome analysis (cohort)',              W.OUTCOME_COHORT_META],
    ['ASY_D05', 'Asylum support',                          W.SUPPORT_REGIONS_META],
    ['ASY_D07', 'Backlog \u2014 cases awaiting decision',  W.BACKLOG_META],
    ['ASY_D09', 'Asylum seekers in hotels',                W.HOTELS_META],
    ['AGE_D01', 'Age disputes',                            W.AGE_DISPUTES_META],
    ['IRR_D01', 'Irregular migration by nationality',     W.IRR_BOATS_META],
    ['RES_D01', 'Resettlement schemes',                    W.RESETTLEMENT_META],
  ];
  const rows = [];
  for (const [code, name, meta] of entries) {
    if (!meta) continue;
    const raw = meta.generatedAt || meta.latestDataPoint || meta.latest_date || meta.asOf;
    if (!raw) continue;
    rows.push({
      date: raw,
      kind: 'Source',
      code,
      text: name + ' refreshed (as of ' + (meta.latestDataPoint || meta.latest_date || raw).slice(0,10) + ').',
    });
  }
  return rows;
}

function _fmtLogDate(raw) {
  if (!raw) return '';
  // Already "DD Month YYYY" → pass through.
  if (/^\d{1,2}\s+[A-Za-z]+\s+\d{4}$/.test(String(raw))) return String(raw);
  const d = new Date(raw);
  if (isNaN(d)) return String(raw);
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return d.getUTCDate() + ' ' + MONTHS[d.getUTCMonth()] + ' ' + d.getUTCFullYear();
}

function _logSortKey(raw) {
  if (!raw) return 0;
  if (/^\d{1,2}\s+[A-Za-z]+\s+\d{4}$/.test(String(raw))) {
    const parts = String(raw).split(/\s+/);
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const mi = MONTHS.indexOf(parts[1]);
    if (mi < 0) return 0;
    return Date.UTC(+parts[2], mi, +parts[0]);
  }
  const d = new Date(raw);
  return isNaN(d) ? 0 : d.getTime();
}

function UpdatesView({ setRoute }) {
  const rows = uM2(() => {
    const merged = REVISION_LOG.concat(_updatesSourceRows());
    merged.sort((a, b) => _logSortKey(b.date) - _logSortKey(a.date));
    return merged;
  }, []);
  const kindColor = {
    'Feature':   'var(--accent)',
    'Editorial': 'var(--accent-warn)',
    'Source':    'var(--muted-2)',
    'Revision':  'var(--accent-warn)',
  };
  return (
    <main className="fade-enter" style={{maxWidth:920,margin:'0 auto',padding:'56px 48px 100px'}}>
      <div className="uc" style={{color:'var(--muted)',marginBottom:10,fontSize:11}}>Log</div>
      <h1 style={{fontFamily:'var(--serif)',fontSize:46,lineHeight:1.05,letterSpacing:-0.5,fontWeight:400,margin:'0 0 14px',color:'var(--ink)'}}>
        Updates
      </h1>
      <p style={{fontSize:16.5,lineHeight:1.55,color:'var(--ink-2)',margin:'0 0 36px',maxWidth:640}}>
        Every source refresh and every notable change to this explorer, newest first. Source rows come from the pipeline metadata; editorial rows are curated by hand.
      </p>
      <ol style={{listStyle:'none',padding:0,margin:0,borderTop:'1px solid var(--rule)'}}>
        {rows.map((r, i) => (
          <li key={i} style={{display:'grid',gridTemplateColumns:'180px 110px 1fr',gap:24,padding:'18px 0',borderBottom:'1px solid var(--rule)',alignItems:'baseline'}}>
            <div className="uc" style={{fontSize:12,color:'var(--muted)',letterSpacing:0.3}}>
              {_fmtLogDate(r.date)}
            </div>
            <div className="uc" style={{fontSize:11,color:kindColor[r.kind] || 'var(--muted)',letterSpacing:0.6}}>
              {r.kind}{r.code ? ' · ' + r.code : ''}
            </div>
            <div style={{fontSize:14.5,lineHeight:1.55,color:'var(--ink-2)'}}>
              {r.text}
            </div>
          </li>
        ))}
      </ol>
      <div style={{marginTop:36,fontSize:12.5,color:'var(--muted)',lineHeight:1.5}}>
        Source rows are generated from each dataset&apos;s <code>*_META</code> at bundle time. Editorial rows live in <code>src/views-story-build.jsx</code> under <code>REVISION_LOG</code>; add a line there when a figure is revised or a new chart ships.
      </div>
    </main>
  );
}

Object.assign(window, { StoryView, DatasetsView, BuildView, UpdatesView });

// Surfaces applicants + grant rate + returns + age disputes for the selected
// country. Data comes from NAT_FULL / NAT_QUARTERLY / RETURNS_BY_NATIONALITY /
// AGE_DISPUTES_BY_NATIONALITY, all inlined at bundle time.

const { useState: uSA, useMemo: uMA } = React;

// Some globals use slightly different nationality strings than Natural
// Earth's country names. Map the known divergences so clicks resolve.
const ATLAS_NAME_ALIASES = {
  'United States of America': 'United States',
  'Czech Rep.': 'Czechia',
  'Bosnia and Herz.': 'Bosnia and Herzegovina',
  'Dem. Rep. Congo': 'Congo (Democratic Republic)',
  'Congo': 'Congo',
  'Côte d\'Ivoire': "Cote d'Ivoire",
  'Central African Rep.': 'Central African Republic',
  'Dominican Rep.': 'Dominican Republic',
  'Eq. Guinea': 'Equatorial Guinea',
  'Myanmar': 'Myanmar (Burma)',
  'Palestine': 'Palestine',
  'Lao PDR': 'Laos',
  'Korea': 'South Korea',
  'Dem. Rep. Korea': 'North Korea',
  'S. Sudan': 'South Sudan',
  'W. Sahara': 'Western Sahara',
  'Bahamas': 'Bahamas, The',
  'Gambia': 'Gambia, The',
  'Solomon Is.': 'Solomon Islands',
  'Fr. S. Antarctic Lands': null,
  'Antarctica': null,
};

function resolveNat(mapCountryName) {
  if (mapCountryName in ATLAS_NAME_ALIASES) return ATLAS_NAME_ALIASES[mapCountryName];
  return mapCountryName;
}

// ATLAS_PALETTE, atlasLerpHex and atlasPaletteColor are defined in charts.jsx
// (loaded before this file in the bundle) so that both the dashboard's
// WorldMapChoropleth and this top-level atlas view share the same 6-stop scale.

function pathCentroid(d) {
  const re = /[ML]\s*([-\d.]+)[,\s]([-\d.]+)/g;
  const pts = []; let m;
  while ((m = re.exec(d))) pts.push([+m[1], +m[2]]);
  if (!pts.length) return null;
  return [pts.reduce((s,p)=>s+p[0],0)/pts.length, pts.reduce((s,p)=>s+p[1],0)/pts.length];
}

// Bounding box of a path's M/L commands. Returns [xMin, yMin, w, h] or null.
// Used by flyToBox so large countries (Russia, Canada) fit fully inside the
// zoomed viewport — a fixed centroid zoom left them clipped.
function pathBBox(d) {
  const re = /[ML]\s*([-\d.]+)[,\s]([-\d.]+)/g;
  let xMin = Infinity, yMin = Infinity, xMax = -Infinity, yMax = -Infinity, m, any = false;
  while ((m = re.exec(d))) {
    const x = +m[1], y = +m[2];
    if (x < xMin) xMin = x; if (y < yMin) yMin = y;
    if (x > xMax) xMax = x; if (y > yMax) yMax = y;
    any = true;
  }
  if (!any) return null;
  return [xMin, yMin, Math.max(1e-6, xMax - xMin), Math.max(1e-6, yMax - yMin)];
}

// 3×3 bivariate palette: rows = applicants tercile (low→high),
// columns = grant-rate tercile (low→high). Cells combine accent-warn
// (low grants) → accent-gold (mid) → accent (high grants), with the
// mix percentage rising with applicant volume.
const BIVARIATE_PALETTE = [
  ['color-mix(in srgb, var(--accent-warn) 25%, var(--bg-2))',
   'color-mix(in srgb, var(--accent-gold) 25%, var(--bg-2))',
   'color-mix(in srgb, var(--accent) 25%, var(--bg-2))'],
  ['color-mix(in srgb, var(--accent-warn) 55%, var(--bg-2))',
   'color-mix(in srgb, var(--accent-gold) 55%, var(--bg-2))',
   'color-mix(in srgb, var(--accent) 55%, var(--bg-2))'],
  ['color-mix(in srgb, var(--accent-warn) 90%, var(--bg-2))',
   'color-mix(in srgb, var(--accent-gold) 90%, var(--bg-2))',
   'color-mix(in srgb, var(--accent) 90%, var(--bg-2))'],
];

// Terciles for a list of positive numbers. Returns [lowCut, midCut].
function terciles(values) {
  const arr = values.filter(v => v != null && v > 0).slice().sort((a,b)=>a-b);
  if (!arr.length) return [0, 0];
  const q = p => arr[Math.min(arr.length - 1, Math.floor(arr.length * p))];
  return [q(1/3), q(2/3)];
}
function tercileBin(v, cuts) {
  if (v == null || !(v > 0)) return null;
  if (v <= cuts[0]) return 0;
  if (v <= cuts[1]) return 1;
  return 2;
}

function AtlasChoropleth({ countryValues, selectedName, compareName, onSelect, metricLabel = 'applicants', bivariate=false, width=820, height=440, zoom }) {
  const worldMap = (typeof WORLD_MAP !== 'undefined') ? WORLD_MAP : null;
  if (!worldMap) {
    return <div style={{padding:40,color:'var(--muted)',fontStyle:'italic'}}>World map not loaded.</div>;
  }

  // Univariate branch: flat numeric values → sqrt-scaled ATLAS_PALETTE.
  // Bivariate branch: values are {v, grant} objects → 3×3 lookup.
  let fillFor;
  let titleFor;
  if (bivariate) {
    const vCuts = terciles(Object.values(countryValues).map(o => o?.v));
    const gCuts = terciles(Object.values(countryValues).map(o => o?.grant));
    fillFor = obj => {
      const vb = tercileBin(obj?.v, vCuts);
      const gb = tercileBin(obj?.grant, gCuts);
      if (vb == null || gb == null) return ATLAS_PALETTE[0];
      return BIVARIATE_PALETTE[vb][gb];
    };
    titleFor = (name, obj) => {
      if (!obj || !(obj.v > 0)) return name;
      const g = obj.grant != null ? `${Math.round(obj.grant * 100)}% grant rate` : 'no grant data';
      return `${name} — ${obj.v.toLocaleString()} applicants · ${g}`;
    };
  } else {
    const vMax = Math.max(...Object.values(countryValues), 1);
    fillFor = v => {
      if (!(v > 0)) return ATLAS_PALETTE[0];
      return atlasPaletteColor(Math.sqrt(v / vMax));
    };
    titleFor = (name, v) => `${name}${v > 0 ? ` — ${v.toLocaleString()} ${metricLabel}` : ''}`;
  }

  return (
    <div style={{position:'relative'}}>
      <svg width="100%" height={height} viewBox={zoom.viewBox} {...zoom.svgProps}
        style={{display:'block',background:'var(--map-bg, var(--bg-2))', ...zoom.svgProps.style}}>
        <g>
          {worldMap.map((c, i) => {
            const nat = resolveNat(c.name);
            const raw = nat ? countryValues[nat] : null;
            const v = bivariate ? raw : (raw ?? 0);
            const isSel = nat && nat === selectedName;
            const isCmp = nat && nat === compareName;
            return (
              <path key={`${c.iso || ''}-${c.name}-${i}`} d={c.d}
                fill={fillFor(v)}
                stroke={isSel ? '#e91e63' : isCmp ? '#f59e0b' : 'var(--rule-2)'} strokeWidth={isSel || isCmp ? 2.5 : 0.4}
                onClick={e => { if (!zoom.didDrag() && nat) onSelect(nat, e.shiftKey); }}
                style={{cursor: nat ? (zoom.zoomed ? 'grab' : 'pointer') : 'default'}}>
                <title>{titleFor(c.name, v)}</title>
              </path>
            );
          })}
        </g>
      </svg>
      <ZoomControls zoom={zoom}/>
    </div>
  );
}

          {breakpoints.map((v, i) => (

// Gather the stat tuple for a single country name so AtlasDetail can
// render one or two countries through the same lookups.
function useCountryFacts(name) {
  return uMA(() => {
    if (!name) return null;
    const natFull = typeof NAT_FULL !== 'undefined' ? NAT_FULL : [];
    const returns = typeof RETURNS_BY_NATIONALITY !== 'undefined' ? RETURNS_BY_NATIONALITY : [];
    const ageDisputes = typeof AGE_DISPUTES_BY_NATIONALITY !== 'undefined' ? AGE_DISPUTES_BY_NATIONALITY : [];
    const natQ = typeof NAT_QUARTERLY !== 'undefined' ? NAT_QUARTERLY : null;
    const grantData = typeof NAT_GRANT_ANNUAL !== 'undefined' ? NAT_GRANT_ANNUAL : null;
    return {
      apps: natFull.find(r => r.name === name) || null,
      qRow: natQ?.series?.find(s => s.name === name) || null,
      ret: returns.find(r => r.name === name) || null,
      ad: ageDisputes.find(r => r.name === name) || null,
      grantSeries: grantData?.series?.find(s => s.name === name) || null,
    };
  }, [name]);
}

// Find the nationality with the largest quarter-on-quarter absolute delta
// in the latest quarter of NAT_QUARTERLY. Used as a default Atlas focus so
// first-time visitors land on the story most likely to be worth telling.
function topQoQMover() {
  const nq = typeof NAT_QUARTERLY !== 'undefined' ? NAT_QUARTERLY : null;
  if (!nq || !nq.series || !nq.series.length) return null;
  let best = null;
  let bestDelta = -Infinity;
  for (const s of nq.series) {
    const d = s.data;
    if (!d || d.length < 2) continue;
    const last = d[d.length - 1];
    const prev = d[d.length - 2];
    if (last == null || prev == null) continue;
    const delta = Math.abs(last - prev);
    if (delta > bestDelta) { bestDelta = delta; best = s.name; }
  }
  return best;
}

function AtlasView({ setRoute }) {
  const defaultSelection = uMA(() => topQoQMover(), []);
  const [selected, setSelected] = uSA(defaultSelection);
  const [compareWith, setCompareWith] = uSA(null);
  const [metric, setMetric] = uSA('applicants');
  const [countryQuery, setCountryQuery] = uSA('');
  const zoom = useMapZoom(720, 335);

  const flyToCountry = nat => {
    const wm = typeof WORLD_MAP !== 'undefined' ? WORLD_MAP : [];
    const entry = wm.find(c => resolveNat(c.name) === nat);
    if (entry) {
      const bb = pathBBox(entry.d);
      if (bb) zoom.flyToBox(bb[0], bb[1], bb[2], bb[3]);
    }
  };

  const handleSelect = (nat, shift=false) => {
    setCountryQuery('');
    if (shift && selected && nat !== selected) {
      // Shift-click on a different country adds/replaces the comparison.
      setCompareWith(nat);
      flyToCountry(nat);
      return;
    }
    // Plain click: replace primary, clear comparison when the user picks
    // a country that already was the comparison (preventing duplicate).
    if (nat === compareWith) setCompareWith(null);
    setSelected(nat);
    flyToCountry(nat);
  };

  const countryValues = uMA(() => {
    const natFull = typeof NAT_FULL !== 'undefined' ? NAT_FULL : [];
    if (metric === 'applicants') return Object.fromEntries(natFull.map(r => [r.name, r.v]));
    if (metric === 'grant_rate') return Object.fromEntries(natFull.filter(r => r.grant != null).map(r => [r.name, Math.round(r.grant * 100)]));
    if (metric === 'bivariate') return Object.fromEntries(natFull.map(r => [r.name, { v: r.v, grant: r.grant }]));
    if (metric === 'returns') {
      const ret = typeof RETURNS_BY_NATIONALITY !== 'undefined' ? RETURNS_BY_NATIONALITY : [];
      return Object.fromEntries(ret.map(r => [r.name, r.total]));
    }
    if (metric === 'age_disputes') {
      const ad = typeof AGE_DISPUTES_BY_NATIONALITY !== 'undefined' ? AGE_DISPUTES_BY_NATIONALITY : [];
      return Object.fromEntries(ad.map(r => [r.name, r.raised]));
    }
    if (metric === 'small_boats') {
      const rows = typeof IRR_BOATS_BY_NATIONALITY !== 'undefined' ? IRR_BOATS_BY_NATIONALITY : [];
      if (!rows.length) return {};
      const latestYear = Math.max(...rows.map(r => r.year));
      const out = {};
      for (const r of rows) {
        if (r.year !== latestYear) continue;
        if (!(r.count > 0)) continue;
        out[r.nationality] = (out[r.nationality] || 0) + r.count;
      }
      return out;
    }
    if (metric === 'per_capita') {
      // Join NAT_FULL (name) → WORLD_MAP (iso) → UNHCR_POC_ANNUAL (latest
      // year × iso → total displaced). Rate is applicants per 100k of the
      // origin's displaced-persons stock. Countries without POC data fall
      // out of the map cleanly.
      const poc = typeof UNHCR_POC_ANNUAL !== 'undefined' ? UNHCR_POC_ANNUAL : [];
      const world = typeof WORLD_MAP !== 'undefined' ? WORLD_MAP : [];
      if (!poc.length || !world.length) return {};
      const latestYear = Math.max(...poc.map(r => r.year));
      const totalByIso = {};
      for (const r of poc) {
        if (r.year !== latestYear) continue;
        totalByIso[r.originIso] = r.total || 0;
      }
      const isoByName = {};
      for (const c of world) isoByName[c.name] = c.iso;
      const out = {};
      for (const r of natFull) {

        if (!denom || !(r.v > 0)) continue;
        out[r.name] = Math.round((r.v / denom) * 100000);
      }
      return out;
    }
    return {};
  }, [metric]);

  const metricLabel = ATLAS_METRIC_OPTIONS.find(m => m.id === metric)?.label ?? 'Applicants';
  const bivariate = metric === 'bivariate';

  const topCountries = uMA(() => {

      </div>
      <div style={{display:'flex',gap:6,marginBottom:16}}>

              style={{

      <div style={{display:'grid',gridTemplateColumns:'minmax(0,1.4fr) minmax(360px,1fr)',gap:28,alignItems:'start'}}>
        <div style={{border:'1px solid var(--rule)',background:'#fff',padding:'12px'}}>

          <div style={{marginTop:12,paddingTop:10,borderTop:'1px dotted var(--rule-2)'}}>

              {countryQuery.trim() && (() => {

                const matches = natFull.filter(r => r.name.toLowerCase().includes(q)).slice(0, 12);
                if (!matches.length) return null;

/* --- src/flow-view.jsx --- */
// flow-view.jsx — Sankey: nationality → decision outcome.
// Data: NAT_FULL for applicants + grant rates; DECISIONS_LATEST (or
// DECISIONS_2024) for the refused/withdrawn split ratio; HOTELS /
// RETURNS_BY_NATIONALITY / BACKLOG_LATEST for the KPI callout row.

// Finding 28 — palette capped at top-5 + Other. The five-colour set mirrors
// the stable top-five irregular-arrivals nationality pool (Afghan, Eritrean,
// Iranian, Syrian, Sudanese) per Irr_D01; the actual five names are still
// pulled from NAT_FULL at runtime so the chart tracks data, not copy.
const FLOW_NAT_PALETTE = [
  '#1c5c3d', '#c44a2a', '#2a5c8b', '#8b6c1c', '#6b2a8b',
  '#888888',
];
const FLOW_NAT_TOP_N = 5;

// System-flow palette — distinct from nationalities so the two sankeys don't
// read as the same data viewed differently.
const FLOW_SYSTEM_COLORS = {
  application:     '#4a4a4a', // neutral grey
  granted:         'var(--accent-2)',
  humanitarian:    'var(--accent-gold)',
  refused:         'var(--accent-warn)',
  withdrawn:       'var(--muted-2)',
  appealAllowed:   'var(--accent-2)',
  appealDismissed: 'var(--muted-2)',
};

// Col-0 entry routes — sourced from Asy_D01a (asylum-claim date basis, all
// claimants incl. dependants). Shades within each group so the reader can see
// the three top-level groups at a glance.
const ROUTE_OF_ENTRY_NODES = [
  { sub: 'Small Boat',                             group: 'Illegal Entry Routes', color: '#c44a2a' },
  { sub: 'Clandestine',                            group: 'Illegal Entry Routes', color: '#d66a4a' },
  { sub: 'Entered Without Relevant Documentation', group: 'Illegal Entry Routes', color: '#e8a085' },
  { sub: 'Study Visa',                             group: 'Visas and Other Leave', color: '#2a5c8b' },
  { sub: 'Work Visa',                              group: 'Visas and Other Leave', color: '#4a7cab' },
  { sub: 'Visitor Visa',                           group: 'Visas and Other Leave', color: '#6a9ccb' },
  { sub: 'Other Leave',                            group: 'Visas and Other Leave', color: '#8fbce0' },
  { sub: 'Other',                                  group: 'Other',                 color: '#888888' },
];

// Build the four-column system flow. Only col-3 appeal outcomes remain mocked
// (closes when R6 / ASY_D04 pipeline lands).
function buildSystemFlow() {
  const route = typeof ROUTE_OF_ENTRY_QUARTERLY !== 'undefined' ? ROUTE_OF_ENTRY_QUARTERLY : [];
  const routeMeta = typeof ROUTE_OF_ENTRY_META !== 'undefined' ? ROUTE_OF_ENTRY_META : null;
  const decisions = typeof DECISIONS_LATEST !== 'undefined' ? DECISIONS_LATEST
    : typeof DECISIONS_2024 !== 'undefined' ? DECISIONS_2024 : [];

  if (!route.length) return { nodes: [], links: [], year: null };

  const year = routeMeta?.year;
  const yearPrefix = year != null ? String(year) + ' ' : null;
  const yearRows = yearPrefix
    ? route.filter(r => r.q.indexOf(yearPrefix) === 0)
    : route;

  // Sum by sub-route for the reference year.
  const bySub = {};
  for (const r of yearRows) {
    bySub[r.sub] = (bySub[r.sub] || 0) + r.v;
  }

  const col0 = ROUTE_OF_ENTRY_NODES
    .map(n => ({
      id: 'e_' + n.sub.replace(/\s+/g, '_').toLowerCase(),
      label: n.sub,
      col: 0,
      value: bySub[n.sub] || 0,
      color: n.color,
    }))
    .filter(n => n.value > 0);

  const appsTotal = col0.reduce((s, n) => s + n.value, 0);
  if (!appsTotal) return { nodes: [], links: [], year };

  // Col 2 — initial-decision outcomes, shares from DECISIONS_LATEST.
  // DECISIONS_LATEST rows: [granted, humanitarian, refused, withdrawn]
  const decTotal = decisions.reduce((s, r) => s + (r?.v ?? 0), 0) || 1;
  const grantedShare      = (decisions[0]?.v ?? 0) / decTotal;
  const humanitarianShare = (decisions[1]?.v ?? 0) / decTotal;
  const refusedShare      = (decisions[2]?.v ?? 0) / decTotal;

  const granted      = Math.round(appsTotal * grantedShare);
  const humanitarian = Math.round(appsTotal * humanitarianShare);
  const refused      = Math.round(appsTotal * refusedShare);
  const withdrawn    = appsTotal - granted - humanitarian - refused;

  // Col 3 — "Latest outcome" (real, when OUTCOME_COHORT_ANNUAL has data).
  // Aggregate the initial-vs-latest deltas across cohorts that overlap the
  // display year. For each initial bucket we compute what share of that
  // bucket landed in each latest bucket; col-2 → col-3 links are sized
  // accordingly so column totals match initial totals.
  const cohortRows = (typeof OUTCOME_COHORT_ANNUAL !== 'undefined' && Array.isArray(OUTCOME_COHORT_ANNUAL))
    ? OUTCOME_COHORT_ANNUAL : [];
  let latestNodes = [], latestLinks = [];
  if (cohortRows.length) {
    // Aggregate initial + latest buckets across all cohort rows (defensible:
    // the share of initial→latest transitions is approximately stable across
    // cohort years, so pooling them gives a stronger signal than one year).
    const init = { protection:0, otherLeave:0, refusals:0, withdrawals:0, admin:0, notYet:0 };
    const latest = { protection:0, otherLeave:0, refusals:0, withdrawals:0, admin:0, notYet:0 };
    for (const r of cohortRows) {
      for (const k in init) { init[k] += r.initial?.[k] || 0; latest[k] += r.latest?.[k] || 0; }
    }
    const initTotal = Object.values(init).reduce((s,v)=>s+v,0) || 1;
    const scale = appsTotal / initTotal;
    const L = k => Math.round((latest[k] || 0) * scale);
    const lGrant = L('protection') + L('otherLeave');
    const lRef   = L('refusals');
    const lWdr   = L('withdrawals') + L('admin');
    const lPend  = Math.max(0, appsTotal - lGrant - lRef - lWdr);
    // Col-3 nodes carry `mocked: true` so SankeyChart draws them in a paler
    // tint with a dashed outline — this column is a proxy (cohort initial-vs-
    // latest delta), not real appeals data. See C2 in the pre-copy polish plan.
    latestNodes = [
      { id: 'l_grant', label: 'Granted (latest)',   col: 3, value: lGrant, color: FLOW_SYSTEM_COLORS.granted,    mocked: true },
      { id: 'l_ref',   label: 'Refused (latest)',   col: 3, value: lRef,   color: FLOW_SYSTEM_COLORS.refused,    mocked: true },
      { id: 'l_wdr',   label: 'Withdrawn (latest)', col: 3, value: lWdr,   color: FLOW_SYSTEM_COLORS.withdrawn,  mocked: true },
      ...(lPend > 0 ? [{ id: 'l_pend', label: 'Still pending — awaiting a final outcome', col: 3, value: lPend, color: 'var(--bg-3)', mocked: true }] : []),
    ];
    // Naive routing: each initial bucket sends its mass proportionally to
    // the four latest buckets based on global shares. Good enough for an
    // overview — the cohort ribbon (B5) is where per-cohort precision lives.
    const shareTotal = lGrant + lRef + lWdr + lPend || 1;
    const partitionLinks = (fromId, fromV) => {
      if (!fromV) return [];
      return [
        { source: fromId, target: 'l_grant', value: Math.round(fromV * lGrant / shareTotal), dashed: true },
        { source: fromId, target: 'l_ref',   value: Math.round(fromV * lRef   / shareTotal), dashed: true },
        { source: fromId, target: 'l_wdr',   value: Math.round(fromV * lWdr   / shareTotal), dashed: true },
        ...(lPend > 0 ? [{ source: fromId, target: 'l_pend', value: Math.round(fromV * lPend / shareTotal), dashed: true }] : []),
      ].filter(lk => lk.value > 0);
    };
    latestLinks = [
      ...partitionLinks('d_grant', granted),
      ...partitionLinks('d_human', humanitarian),
      ...partitionLinks('d_ref',   refused),
      ...partitionLinks('d_wdr',   withdrawn),
    ];
  }

  const nodes = [
    ...col0,
    { id: 'app',     label: 'Asylum claim', col: 1, value: appsTotal,    color: FLOW_SYSTEM_COLORS.application },
    { id: 'd_grant', label: 'Granted',      col: 2, value: granted,      color: FLOW_SYSTEM_COLORS.granted },
    { id: 'd_human', label: 'Humanitarian', col: 2, value: humanitarian, color: FLOW_SYSTEM_COLORS.humanitarian },
    { id: 'd_ref',   label: 'Refused',      col: 2, value: refused,      color: FLOW_SYSTEM_COLORS.refused },
    { id: 'd_wdr',   label: 'Withdrawn',    col: 2, value: withdrawn,    color: FLOW_SYSTEM_COLORS.withdrawn },
    ...latestNodes,
  ];

  const links = [
    ...col0.map(n => ({ source: n.id, target: 'app', value: n.value })),
    { source: 'app',   target: 'd_grant', value: granted },
    { source: 'app',   target: 'd_human', value: humanitarian },
    { source: 'app',   target: 'd_ref',   value: refused },
    { source: 'app',   target: 'd_wdr',   value: withdrawn },
    ...latestLinks,
  ];

  return { nodes, links, year, hasLatest: latestNodes.length > 0 };
}

function buildSankeyData() {
  const natFull = typeof NAT_FULL !== 'undefined' ? NAT_FULL : [];
  const decisions = typeof DECISIONS_LATEST !== 'undefined' ? DECISIONS_LATEST
    : typeof DECISIONS_2024 !== 'undefined' ? DECISIONS_2024 : [];

  if (!natFull.length) return { nodes: [], links: [] };

  const sorted = [...natFull].sort((a, b) => b.v - a.v);
  const topN   = sorted.slice(0, FLOW_NAT_TOP_N);
  const rest   = sorted.slice(FLOW_NAT_TOP_N);

  // Fallback grant rate: weighted average across all nationalities
  const totalV       = natFull.reduce((s, r) => s + r.v, 0);
  const totalGranted = natFull.reduce((s, r) => s + r.v * (r.grant ?? 0), 0);
  const globalGrant  = totalV > 0 ? totalGranted / totalV : 0.5;

  // Refused vs withdrawn split from initial decisions breakdown
  const refusedV    = decisions[2]?.v ?? 0;
  const withdrawnV  = decisions[3]?.v ?? 0;
  const splitDenom  = refusedV + withdrawnV;
  const refusedRatio = splitDenom > 0 ? refusedV / splitDenom : 0.77;

  // "Other" aggregate: nationalities outside the top N
  const otherV       = rest.reduce((s, r) => s + r.v, 0);
  const otherGranted = rest.reduce((s, r) => s + r.v * (r.grant ?? globalGrant), 0);
  const otherGrant   = otherV > 0 ? otherGranted / otherV : globalGrant;

  const sources = [
    ...topN.map((r, i) => ({
      id: `n${i}`, label: r.name, v: r.v,
      grant: r.grant ?? globalGrant, color: FLOW_NAT_PALETTE[i],
    })),
    { id: 'nOther', label: 'Other nationalities', v: otherV, grant: otherGrant, color: FLOW_NAT_PALETTE[FLOW_NAT_TOP_N] },
  ];

  const links = [];
  let totG = 0, totR = 0, totW = 0;

  for (const s of sources) {
    if (!s.v) continue;
    const g = Math.round(s.v * s.grant);
    const notG = s.v - g;
    const r = Math.round(notG * refusedRatio);
    const w = notG - r;
    links.push({ source: s.id, target: 'rG', value: g });
    links.push({ source: s.id, target: 'rR', value: r });
    links.push({ source: s.id, target: 'rW', value: w });
    totG += g; totR += r; totW += w;
  }

  const nodes = [
    ...sources.map(s => ({ id: s.id, label: s.label, col: 0, value: s.v, color: s.color })),
    { id: 'rG', label: 'Granted (initial)',   col: 1, value: totG, color: 'var(--accent-2)'    },
    { id: 'rR', label: 'Refused',   col: 1, value: totR, color: 'var(--accent-warn)'  },
    { id: 'rW', label: 'Withdrawn', col: 1, value: totW, color: 'var(--muted-2)'      },
  ];

  return { nodes, links };
}

function FlowKPI({ label, value, note }) {
  return (
    <div style={{border:'1px solid var(--rule)',padding:'14px 16px',background:'var(--bg-2)'}}>
      <div className="uc" style={{color:'var(--muted)',fontSize:10.5,marginBottom:4}}>{label}</div>

function FlowView({ setRoute }) {

  return (

        <div className="uc" style={{color:'var(--muted)',marginBottom:8,display:'inline-block',paddingBottom:4,borderBottom:'2px solid var(--accent-2)'}}>Flow</div>

        </p>
      </div>

      {/* How to read this — Tranche 6.5 primer for non-expert readers. */}
      <aside style={{marginTop:8,marginBottom:28,padding:'18px 22px',background:'var(--bg-2)',border:'1px solid var(--rule)',borderLeft:'2px solid var(--accent)',maxWidth:940}}>
        <div className="uc" style={{color:'var(--muted)',fontSize:11,marginBottom:8,letterSpacing:0.4}}>How to read this</div>

      </div>
      {system.hasLatest && (

// Finding 28 · Small-boat arrivals by nationality, top-5 + Other, across
// full years in IRR_BOATS_BY_NATIONALITY (Irr_02b / Irr_D01).
function buildIrrTop5ByYear() {
  const rows = (typeof IRR_BOATS_BY_NATIONALITY !== 'undefined' && Array.isArray(IRR_BOATS_BY_NATIONALITY))
    ? IRR_BOATS_BY_NATIONALITY : [];
  if (!rows.length) return { years: [], palette: [], matrix: [], latestPartialYear: null };

  // Partition: full years for the stacked bars, flag any partial year.
  const fullYears = [...new Set(rows.filter(r => !r.partial && !r.meta).map(r => r.year))].sort();
  const partialYears = [...new Set(rows.filter(r => r.partial && !r.meta).map(r => r.year))].sort();
  const latestPartialYear = partialYears.length ? partialYears[partialYears.length - 1] : null;

  if (!fullYears.length) return { years: [], palette: [], matrix: [], latestPartialYear };

  // Top-5 set = highest-volume nationalities summed across the full-year window,
  // excluding the source's own "All other nationalities" aggregate and
  // "Not currently recorded" so we don't double-count them.
  const totals = new Map();
  for (const r of rows) {
    if (r.meta) continue;            // skip source's own aggregates
    if (!fullYears.includes(r.year)) continue;
    totals.set(r.nationality, (totals.get(r.nationality) || 0) + r.count);
  }
  const top5 = [...totals.entries()].sort((a, b) => b[1] - a[1]).slice(0, 5).map(e => e[0]);
  const palette = [...top5, 'Other'];

  // Matrix of counts: rows=palette entries, cols=years (full years only).
  const matrix = palette.map(name => fullYears.map(y => {
    if (name === 'Other') {
      // Everything in-year minus the top-5 — includes source-side "All other
      // nationalities" and "Not currently recorded".
      let yearTotal = 0, topCount = 0;
      for (const r of rows) {
        if (r.year !== y) continue;
        if (r.meta === 'total') continue;
        if (r.meta === 'other' || r.meta === 'unrecorded') { yearTotal += r.count; continue; }
        yearTotal += r.count;
        if (top5.includes(r.nationality)) topCount += r.count;
      }
      return yearTotal - topCount;
    }
    const row = rows.find(r => r.year === y && r.nationality === name);
    return row ? row.count : 0;
  }));

  return { years: fullYears, palette, matrix, latestPartialYear };
}

function IrrBoatsByNationality() {
  const { years, palette, matrix, latestPartialYear } = React.useMemo(buildIrrTop5ByYear, []);
  const meta = typeof IRR_BOATS_META !== 'undefined' ? IRR_BOATS_META : null;

  if (!years.length) {
    return (
      <div style={{marginTop:48}}>
        <div className="uc" style={{color:'var(--muted)',fontSize:10.5,marginBottom:6}}>Small boats · by nationality</div>
        <div style={{border:'1px dashed var(--rule)',background:'var(--bg-2)',padding:'40px 20px',textAlign:'center',color:'var(--muted)',fontStyle:'italic',fontSize:13}}>
          Small boats by nationality data unavailable.
        </div>
      </div>
    );
  }

  const W = 1000, H = 240, M = { top: 16, right: 140, bottom: 28, left: 56 };
  const innerW = W - M.left - M.right;
  const innerH = H - M.top - M.bottom;
  const barW = innerW / years.length * 0.7;
  const gap = innerW / years.length * 0.3;

  const totals = years.map((_, yi) => palette.reduce((s, _n, pi) => s + (matrix[pi][yi] || 0), 0));
  const yMax = Math.max(...totals, 1);
  // Palette tokens echo FLOW_NAT_PALETTE (5 colours) + muted for Other.
  const colors = ['#1c5c3d','#c44a2a','#2a5c8b','#8b6c1c','#6b2a8b','#888888'];

  const nf = (n) => n.toLocaleString('en-GB');

  return (
    <div style={{marginTop:48}}>
      <div className="uc" style={{color:'var(--muted)',fontSize:10.5,marginBottom:6}}>Small boats · by nationality · Irr_D01</div>
      <h2 style={{fontFamily:'var(--serif)',fontSize:22,fontWeight:400,letterSpacing:-0.3,margin:'0 0 6px'}}>
        Top-five nationalities crossing in small boats
      </h2>
      <p style={{fontSize:14,color:'var(--ink-2)',maxWidth:720,margin:'0 0 12px',lineHeight:1.5}}>
        Full calendar years only; the top-five set is chosen by pooled volume across {years[0]}–{years[years.length-1]}. Everything else — including the Home Office's own &ldquo;All other nationalities&rdquo; and &ldquo;Not currently recorded&rdquo; rows — falls into <em>Other</em>.
      </p>
      <div style={{border:'1px solid var(--rule)',background:'#fff',padding:'16px 20px 12px'}}>
        <svg width={W} height={H} role="img" aria-label="Small-boat arrivals by nationality, stacked by year">
          {/* y-axis */}
          <line x1={M.left} y1={M.top} x2={M.left} y2={M.top + innerH} stroke="var(--rule-2)"/>
          {[0, 0.5, 1].map((t, i) => {
            const v = Math.round(yMax * (1 - t));
            const y = M.top + innerH * t;
            return (
              <g key={i}>
                <line x1={M.left} y1={y} x2={M.left + innerW} y2={y} stroke="var(--rule-2)" strokeDasharray={t === 1 ? '0' : '2 3'}/>
                <text x={M.left - 6} y={y + 4} textAnchor="end" style={{fontFamily:'var(--mono)',fontSize:10,fill:'var(--muted)'}}>{nf(v)}</text>
              </g>
            );
          })}
          {/* bars */}
          {years.map((y, yi) => {
            const x = M.left + (yi + 0.5) * (innerW / years.length) - barW / 2;
            let acc = 0;
            return (
              <g key={y}>
                {palette.map((name, pi) => {
                  const v = matrix[pi][yi] || 0;
                  if (v <= 0) return null;
                  const h = (v / yMax) * innerH;
                  const y0 = M.top + innerH - acc - h;
                  acc += h;
                  return (
                    <rect key={name} x={x} y={y0} width={barW} height={h}
                          fill={colors[pi]} stroke="#fff" strokeWidth={0.5}>
                      <title>{`${y} · ${name}: ${nf(v)}`}</title>
                    </rect>
                  );
                })}
                <text x={x + barW/2} y={M.top + innerH + 16} textAnchor="middle"
                      style={{fontFamily:'var(--mono)',fontSize:10.5,fill:'var(--muted)'}}>{y}</text>
              </g>
            );
          })}
          {/* legend */}
          {palette.map((name, pi) => (
            <g key={name} transform={`translate(${M.left + innerW + 16}, ${M.top + pi * 18})`}>
              <rect x={0} y={0} width={12} height={12} fill={colors[pi]}/>
              <text x={18} y={10} style={{fontFamily:'var(--serif)',fontSize:12,fill:'var(--ink-2)'}}>{name}</text>
            </g>
          ))}
        </svg>
        {latestPartialYear != null ? (
          <div style={{fontSize:11.5,color:'var(--muted-2)',marginTop:6,lineHeight:1.5}}>
            {latestPartialYear} excluded from the chart — it is a partial year in the latest release.
          </div>
        ) : null}
        {meta?.asOf ? (
          <div style={{fontSize:11.5,color:'var(--muted-2)',marginTop:2,lineHeight:1.5}}>
            {meta.asOf}
          </div>
        ) : null}
      </div>
    </div>
  );
}

// Aggregate OUTCOME_COHORT_ANNUAL across nationalities so each cohort
// year has a single {claims, initial, latest, returns} row.
function buildCohortAggregate() {
  const rows = (typeof OUTCOME_COHORT_ANNUAL !== 'undefined' && Array.isArray(OUTCOME_COHORT_ANNUAL))
    ? OUTCOME_COHORT_ANNUAL : [];
  if (!rows.length) return [];
  const byYear = new Map();
  const zero = () => ({ claims:0, initial:{protection:0,otherLeave:0,refusals:0,withdrawals:0,admin:0,notYet:0},
                         latest:{protection:0,otherLeave:0,refusals:0,withdrawals:0,admin:0,notYet:0},
                         returns:{enforced:0,voluntary:0} });
  for (const r of rows) {
    if (!byYear.has(r.year)) byYear.set(r.year, zero());
    const acc = byYear.get(r.year);
    acc.claims += r.claims || 0;
    for (const k in acc.initial) acc.initial[k] += r.initial?.[k] || 0;
    for (const k in acc.latest)  acc.latest[k]  += r.latest?.[k]  || 0;
    for (const k in acc.returns) acc.returns[k] += r.returns?.[k] || 0;
  }
  return [...byYear.entries()]
    .sort((a,b) => a[0] - b[0])
    .map(([year, v]) => ({ year, ...v }));
}

// Build annual backlog waterfall: inflow from ASYLUM_ANNUAL (new claims each
// year), pending stock from BACKLOG_LATEST (year-end snapshot), decided =
// derived to close the balance. Returns [] when either source is missing.
// Awaits OUTCOME_COHORT ingest (see BACKLOG.md) to replace the derived
// "decided" term with the cohort-level initial-vs-latest split.
function buildAnnualWaterfall() {
  const asy = (typeof ASYLUM_ANNUAL !== 'undefined' && Array.isArray(ASYLUM_ANNUAL)) ? ASYLUM_ANNUAL : [];
  const bkl = (typeof BACKLOG_LATEST !== 'undefined' && Array.isArray(BACKLOG_LATEST)) ? BACKLOG_LATEST : [];
  if (!asy.length || !bkl.length) return [];
  const inflowByYear = {};
  for (const r of asy) inflowByYear[r.y] = r.v;
  const rows = [];
  let prevPending = 0;
  for (const r of bkl) {
    const inflow = inflowByYear[r.y] || 0;
    const pending = r.v || 0;
    // Decided (+ withdrew / admin) = prior pending + inflow − current pending.
    const decided = Math.max(0, prevPending + inflow - pending);
    rows.push({ year: r.y, inflow, decided, pending });
    prevPending = pending;
  }
  return rows;
}

// root.jsx — root component + tweak panel + routing

const { useState: uSR, useEffect: uER } = React;

function TweakPanel({ tweaks, setTweaks, open, onClose }) {
  const accents = [
    { key: '#1c3d2e', label: 'Forest' },
    { key: '#0f2a4a', label: 'Navy' },
    { key: '#2a4a3a', label: 'Sage' },
    { key: '#6b3d2e', label: 'Umber' },
    { key: '#5a3a6b', label: 'Plum' },
    { key: '#1a1a17', label: 'Ink' },
  ];
  const setAccent = k => {
    setTweaks({ ...tweaks, accent: k });
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accent: k } }, '*');
  };
  const toggleMode = key => {
    const next = { ...tweaks, [key]: !tweaks[key] };
    setTweaks(next);
  };
  uER(()=>{
    document.documentElement.style.setProperty('--accent', tweaks.accent);
  }, [tweaks.accent]);
  uER(()=>{
    const body = document.body;
    body.classList.toggle('mode-high-contrast', !!tweaks.highContrast);
    body.classList.toggle('mode-print', !!tweaks.printFriendly);
  }, [tweaks.highContrast, tweaks.printFriendly]);
  if (!open) return null;
  return (
    <div className="tweak-panel open" style={{display:'block'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
        <div className="uc" style={{color:'var(--muted)'}}>Display</div>
        <button onClick={onClose} className="pressable" style={{fontSize:18,color:'var(--muted)'}}>×</button>
      </div>
      <div style={{fontSize:12,color:'var(--muted)',marginBottom:8}}>Accent colour</div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        {accents.map(a=>(
          <button key={a.key} title={a.label} onClick={()=>setAccent(a.key)}
            className={`swatch ${tweaks.accent===a.key?'active':''}`}
            style={{background:a.key}}/>
        ))}
      </div>
      <div style={{fontSize:12,color:'var(--muted)',margin:'16px 0 8px'}}>Reading mode</div>
      <div style={{display:'flex',flexDirection:'column',gap:6,fontSize:12.5}}>
        <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}>
          <input type="checkbox" checked={!!tweaks.highContrast} onChange={()=>toggleMode('highContrast')}/>
          <span>High contrast</span>
        </label>
        <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}>
          <input type="checkbox" checked={!!tweaks.printFriendly} onChange={()=>toggleMode('printFriendly')}/>
          <span>Print-friendly (no backgrounds)</span>
        </label>
      </div>
      <div style={{fontSize:11,color:'var(--muted-2)',marginTop:12,fontStyle:'italic',lineHeight:1.45}}>
        Display-only — no data changes.
      </div>
    </div>
  );
}

function App() {
  const [route, setRoute] = uSR({ name: 'index' });
  const [search, setSearch] = uSR(false);
  const [method, setMethod] = uSR(false);
  const [tweaks, setTweaks] = uSR(TWEAK_DEFAULTS);
  const [tweakOpen, setTweakOpen] = uSR(false);

  // persist route in localStorage
  uER(()=>{
    const r = localStorage.getItem('hoe_route');
    if (r) try { setRoute(JSON.parse(r)); } catch(e){}
  }, []);
  uER(()=>{ localStorage.setItem('hoe_route', JSON.stringify(route)); }, [route]);

  // tweak host protocol — register listener BEFORE announcing
  uER(()=>{
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setTweakOpen(true);
      else if (e.data.type === '__deactivate_edit_mode') setTweakOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  // keyboard shortcut for search
  uER(()=>{
    const k = e => { if ((e.metaKey||e.ctrlKey) && e.key === 'k') { e.preventDefault(); setSearch(true); } };
    window.addEventListener('keydown', k);
    return ()=>window.removeEventListener('keydown', k);
  }, []);

  return (
    <>
      <Header route={route} setRoute={setRoute} onSearch={()=>setSearch(true)} onMethod={()=>setMethod(true)}/>
      {route.name === 'index' && <IndexView setRoute={setRoute}/>}
      {route.name === 'dashboard' && <DashboardView setRoute={setRoute}/>}
      {route.name === 'atlas' && <AtlasView setRoute={setRoute}/>}
      {route.name === 'story' && <StoryView id={route.id} setRoute={setRoute} onMethod={()=>setMethod(true)}/>}
      {route.name === 'datasets' && <DatasetsView setRoute={setRoute}/>}
      {route.name === 'build' && <BuildView setRoute={setRoute}/>}
      {route.name === 'flow' && <FlowView setRoute={setRoute}/>}
      {route.name === 'updates' && <UpdatesView setRoute={setRoute}/>}

      {(route.name === 'dashboard' || route.name === 'atlas') && <BackToTop/>}

      <footer style={{borderTop:'1px solid var(--rule)',padding:'36px 48px',maxWidth:1240,margin:'0 auto',display:'flex',justifyContent:'space-between',alignItems:'baseline',fontSize:12.5,color:'var(--muted)'}}>
        <div>
          <span style={{fontFamily:'var(--serif)',fontStyle:'italic',color:'var(--ink-2)'}}>Migration data explorer</span>
          <span style={{margin:'0 14px'}}>·</span>
          <span>Open data · Published under OGL v3.0</span>
        </div>
        <div style={{display:'flex',gap:22}}>
          <span className="ulh" style={{cursor:'pointer'}} onClick={()=>setMethod(true)}>Methodology</span>
          <span className="ulh" style={{cursor:'pointer'}}>API</span>
          <span className="ulh" style={{cursor:'pointer'}}>Contact</span>
          <span className="ulh" style={{cursor:'pointer'}}>About</span>
        </div>
      </footer>

      <SearchModal open={search} onClose={()=>setSearch(false)} onPick={r=>setRoute(r)}/>
      <MethodologyDrawer open={method} onClose={()=>setMethod(false)}/>
      <TweakPanel tweaks={tweaks} setTweaks={setTweaks} open={tweakOpen} onClose={()=>setTweakOpen(false)}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
