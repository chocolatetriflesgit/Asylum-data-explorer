<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Home Office Data Explorer</title>
<meta name="description" content="A browser-based data explorer for UK Home Office small-boats crossing data." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..700;1,8..60,300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fbfaf7;
    --bg-2: #f5f2ea;
    --bg-3: #efe9db;
    --ink: #1a1a17;
    --ink-2: #3a342a;
    --muted: #7a6d5a;
    --muted-2: #9a8f78;
    --rule: #e8e2d4;
    --rule-2: #d6cdb8;
    --accent: #1c3d2e;           /* forest */
    --accent-2: #5a7d3b;          /* olive */
    --accent-warn: #b85c38;       /* terracotta */
    --accent-gold: #8a6d3b;
    --serif: 'Source Serif 4', Georgia, 'Times New Roman', serif;
    --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--serif);font-feature-settings:"onum" 1,"kern" 1}
  body{font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  a{color:inherit;text-decoration:none}
  button{font:inherit;color:inherit;cursor:pointer;background:none;border:none;padding:0}
  .mono{font-family:var(--mono);font-feature-settings:"tnum" 1}
  .tnum{font-variant-numeric:tabular-nums}
  .sc{font-variant:small-caps;letter-spacing:.06em;text-transform:lowercase}
  .uc{letter-spacing:.08em;text-transform:uppercase;font-size:11px;color:var(--muted)}
  /* scrollbar */
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:var(--rule-2);border-radius:0}
  ::-webkit-scrollbar-track{background:var(--bg)}
  /* tweak panel */
  .tweak-panel{position:fixed;bottom:20px;right:20px;background:#fff;border:1px solid var(--rule-2);box-shadow:0 4px 20px rgba(0,0,0,.08);padding:16px 18px;z-index:100;min-width:220px;display:none;font-size:13px}
  .tweak-panel.open{display:block}
  .swatch{width:22px;height:22px;border-radius:50%;border:1px solid var(--rule-2);cursor:pointer;transition:transform .1s}
  .swatch:hover{transform:scale(1.1)}
  .swatch.active{outline:2px solid var(--ink);outline-offset:2px}
  /* tiny transitions */
  .fade-enter{animation:fadeIn .35s ease both}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .pressable{transition:opacity .15s}
  .pressable:hover{opacity:.7}
  /* drawer */
  .drawer-scrim{position:fixed;inset:0;background:rgba(26,26,23,.3);z-index:80;opacity:0;pointer-events:none;transition:opacity .25s}
  .drawer-scrim.open{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;bottom:0;width:min(520px,92vw);background:var(--bg);border-left:1px solid var(--rule-2);transform:translateX(100%);transition:transform .3s cubic-bezier(.2,.7,.2,1);z-index:90;overflow-y:auto}
  .drawer.open{transform:translateX(0)}
  /* tooltip */
  .tt{position:absolute;pointer-events:none;background:var(--ink);color:var(--bg);padding:8px 10px;font-size:12px;line-height:1.4;transform:translate(-50%,calc(-100% - 10px));white-space:nowrap;z-index:20;opacity:0;transition:opacity .12s}
  .tt.on{opacity:1}
  .tt:after{content:"";position:absolute;left:50%;top:100%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--ink)}
  /* range */
  input[type=range]{-webkit-appearance:none;appearance:none;background:transparent;width:100%}
  input[type=range]::-webkit-slider-runnable-track{height:2px;background:var(--rule-2)}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);margin-top:-6px;border:2px solid var(--bg)}
  input[type=range]::-moz-range-track{height:2px;background:var(--rule-2)}
  input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--accent);border:2px solid var(--bg)}
  /* link underline on hover */
  .ulh{border-bottom:1px solid transparent;transition:border-color .15s}
  .ulh:hover{border-bottom-color:currentColor}
  /* checkbox */
  .chk{display:inline-flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
  .chk input{appearance:none;width:14px;height:14px;border:1px solid var(--rule-2);background:#fff;margin:0;position:relative}
  .chk input:checked{background:var(--accent);border-color:var(--accent)}
  .chk input:checked:after{content:"";position:absolute;inset:2px;background:var(--bg);clip-path:polygon(14% 44%,0 60%,38% 100%,100% 22%,84% 6%,38% 70%)}
  /* segmented */
  .seg{display:inline-flex;border:1px solid var(--rule-2);background:#fff}
  .seg button{padding:6px 12px;font-size:12px;letter-spacing:.04em;color:var(--muted);border-right:1px solid var(--rule-2)}
  .seg button:last-child{border-right:none}
  .seg button.on{background:var(--accent);color:var(--bg)}
  /* accent rule under kickers */
  .kicker-rule{display:inline-block;padding-bottom:6px;border-bottom:2px solid var(--accent-warn);margin-bottom:10px}
  .rule-olive{border-bottom:2px solid var(--accent-2)}
  .rule-gold{border-bottom:2px solid var(--accent-gold)}
  .rule-terra{border-bottom:2px solid var(--accent-warn)}
  .rule-accent{border-bottom:2px solid var(--accent)}
  .end-dot:after{content:"";display:inline-block;width:6px;height:6px;background:var(--accent-warn);margin-left:8px;vertical-align:1px;border-radius:50%}
  .end-dot-olive:after{background:var(--accent-2)}
  .end-dot-gold:after{background:var(--accent-gold)}
  .tick{display:inline-block;width:10px;height:2px;background:var(--accent-warn);margin-right:8px;vertical-align:4px}
  .tick-olive{background:var(--accent-2)}
  .tick-gold{background:var(--accent-gold)}
  .tick-accent{background:var(--accent)}
  .kpi-card{background:#fff;border:1px solid var(--rule);padding:22px 24px;position:relative}
  .kpi-card:before{content:"";position:absolute;top:0;left:0;width:36px;height:3px;background:var(--accent-warn)}
  .kpi-card.olive:before{background:var(--accent-2)}
  .kpi-card.gold:before{background:var(--accent-gold)}
  .kpi-card.accent:before{background:var(--accent)}
  .kpi-card.ink:before{background:var(--ink)}
</style>

a of operations of small boats), motor cruisers, tugs and fishing vessels \u2013 although these are rarely used by people arriving via illegal routes at present- Arrive in the UK clandestinely on larger vessels not referenced above, including where hidden in a vehicle on a ferry- Arrive in the UK undetected, or where there have been reports of people making the crossing, but no actual encounters","5. \u2018Boats involved in uncontrolled landings\u2019 are a subset of \u2018boats detected\u2019. Uncontrolled landings are boats which have been recorded as arriving in the UK without interception. Any people detected in uncontrolled landings are counted in the \u2018Migrants arrived\u2019 figures.","6. The data in table SB_01 covers arrivals only, and relates to daily totals. The data in table SB_02 covers both arrivals and preventions, and relates to weekly totals - the data is shown on the last day of the week period, but the activity may have occurred on any day within that week period.","7. Data on preventions are operational estimates collected and provided to the UK by French authorities.","8. The prevention data includes:- Individuals who are prevented from departing France, or those who return to France- Finds of general maritime equipment- Arrests of facilitators linked to small boats crossings","9. The preventions  data does not include:- General dispersal of migrants","Related information","Immigration system statistics (for quarterly data on small boat crossings and other illegal entry routes from 2018 onwards)","Migrants detected crossing the English Channel in small boats - monthly data (for data on daily small boat crossings, from 14 April 2022 to 30 January 2023)"]};

// ─────────────────────────────────────────────────────────────
// Tooltip helper hook
// ─────────────────────────────────────────────────────────────
function useTooltip() {
  const [tt, setTt] = React.useState(null);
  const show = (e, content) => {
    const r = e.currentTarget.closest('.chart-wrap')?.getBoundingClientRect?.();
    if (!r) return;
    setTt({ x: e.clientX - r.left, y: e.clientY - r.top, content });
  };
  const hide = () => setTt(null);
  const node = tt && (
    <div className="tt on" style={{ left: tt.x, top: tt.y }}>{tt.content}</div>
  );
  return { show, hide, node };
}

const fmtK = v => {
  if (v >= 1000) return (v/1000).toFixed(v >= 10000 ? 0 : 1) + 'k';
  return String(v);
};
const fmtN = v => v.toLocaleString('en-GB');

function LineChart({
  data, width=720, height=320, annotations=[],
  stroke='var(--accent)', area=true, title='', subtitle='', source='',
  yearRange=null,
  caption=null,

  // filter by yearRange
  const filtered = yearRange
    ? data.filter(d => d.y >= yearRange[0] && d.y <= yearRange[1])
    : data;
  const d = filtered.length ? filtered : data;

  const xs = d.map(p => p.y);
  const ys = d.map(p => p.v);
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  const yMax = Math.max(...ys) * 1.1;
  const x = v => pad.l + (xMax === xMin ? iw/2 : ((v - xMin) / (xMax - xMin)) * iw);
  const y = v => pad.t + (1 - v/yMax) * ih;
  const pts = d.map(p => `${x(p.y)},${y(p.v)}`).join(' ');

    : '';

  const step = yMax / 4;
  const yTicks = Array.from({length:5}, (_,i) => Math.round(i*step/5000)*5000).filter((v,i,a)=>a.indexOf(v)===i);

    <figure className="chart-wrap" style={{ position:'relative', margin:0 }}>

            <circle cx={x(p.y)} cy={y(p.v)} r={showLine ? 3 : 4} fill={stroke}/>
            <circle cx={x(p.y)} cy={y(p.v)} r="14" fill="transparent"
              onMouseMove={e=>show(e, <span><b>{p.label ?? p.y}</b> · <span className="tnum">{fmtN(p.v)}</span></span>)}
              onMouseLeave={hide}
              style={{cursor:'crosshair'}}
            />
            {showLabels && (
              <text x={x(p.y)} y={y(p.v)-10} textAnchor="middle" fontSize="10.5" fill="var(--ink-2)" style={{fontVariantNumeric:'tabular-nums',fontFamily:'var(--serif)'}}>
                {fmtK(p.v)}
              </text>
            )}
          </g>
        ))}
        {annotations.map((a,i)=>{
          const pt = d.find(p=>p.y===a.y); if(!pt) return null;
          const px = x(pt.y), py = y(pt.v);
          const dx = a.dx||30, dy = a.dy||-26;
          return (
            <g key={i}>
              <circle cx={px} cy={py} r="5" fill="none" stroke={stroke} strokeWidth="1"/>
              <line x1={px} y1={py} x2={px+dx} y2={py+dy} stroke={stroke} strokeWidth="0.8"/>
              <text x={px+dx+4} y={py+dy+4} fontSize="11.5" fill="var(--ink-2)" style={{fontFamily:'var(--serif)',fontStyle:'italic'}}>{a.label}</text>
            </g>
          );
        })}
      </svg>
      {caption && <div style={{fontSize:12.5,color:'var(--muted)',marginTop:10,fontStyle:'italic',lineHeight:1.5,maxWidth:640}}>{caption}</div>}
      {source && <div className="uc" style={{marginTop:12,color:'var(--muted-2)'}}>Source: {source}</div>}
      {node}
    </figure>
  );
}

// ─────────────────────────────────────────────────────────────
// Multi-line chart
// ─────────────────────────────────────────────────────────────
const MULTI_COLORS = ['var(--accent)', 'var(--accent-warn)', 'var(--accent-2)', 'var(--accent-gold)', 'var(--muted)'];
function MultiLineChart({ years, series, width=720, height=300, showLabels=false }) {
  const { show, hide, node } = useTooltip();
  const pad = { t: 16, r: 120, b: 32, l: 48 };
  const W = width, H = height;
  const iw = W - pad.l - pad.r, ih = H - pad.t - pad.b;
  const allV = series.flatMap(s=>s.data);
  const yMax = Math.max(...allV) * 1.12;
  const x = i => pad.l + (i/(years.length-1))*iw;
  const y = v => pad.t + (1 - v/yMax)*ih;
  const yTicks = [0, yMax*0.25, yMax*0.5, yMax*0.75, yMax].map(v=>Math.round(v/1000)*1000).filter((v,i,a)=>a.indexOf(v)===i);

  return (
    <figure className="chart-wrap" style={{position:'relative',margin:0}}>
      <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} style={{display:'block',overflow:'visible'}}>
        {yTicks.map(t=>(
          <g key={t}>
            <line x1={pad.l} x2={W-pad.r} y1={y(t)} y2={y(t)} stroke="var(--rule)"/>
            <text x={pad.l-10} y={y(t)+4} textAnchor="end" fontSize="11" fill="var(--muted)" style={{fontVariantNumeric:'tabular-nums',fontFamily:'var(--serif)'}}>{fmtK(t)}</text>
          </g>
        ))}
        {years.map((yr,i)=>(
          <text key={yr} x={x(i)} y={H-pad.b+18} textAnchor="middle" fontSize="11" fill="var(--muted)" style={{fontVariantNumeric:'tabular-nums',fontFamily:'var(--serif)'}}>{yr}</text>
        ))}
        <line x1={pad.l} x2={W-pad.r} y1={H-pad.b} y2={H-pad.b} stroke="var(--rule-2)"/>
        {series.map((s,si)=>{
          const color = MULTI_COLORS[si % MULTI_COLORS.length];
          const pts = s.data.map((v,i)=>`${x(i)},${y(v)}`).join(' ');
          const last = s.data.length-1;
          return (
            <g key={`${si}-${s.name}`}>
              <polyline points={pts} fill="none" stroke={color} strokeWidth="1.6" strokeLinejoin="round"/>
              {s.data.map((v,i)=>(
                <g key={i}>
                  <circle cx={x(i)} cy={y(v)} r="2.6" fill={color}/>
                  <circle cx={x(i)} cy={y(v)} r="12" fill="transparent"
                    onMouseMove={e=>show(e, <span><b>{s.name}</b> · {years[i]} · <span className="tnum">{fmtN(v)}</span></span>)}
                    onMouseLeave={hide}
                  />
                </g>
              ))}
              <text x={x(last)+10} y={y(s.data[last])+4} fontSize="12" fill={color} style={{fontFamily:'var(--serif)',fontStyle:'italic'}}>{s.name}</text>
              {showLabels && s.data.map((v,i)=>(
                <text key={`lbl-${i}`} x={x(i)} y={y(v)-8} textAnchor="middle" fontSize="10" fill={color} style={{fontVariantNumeric:'tabular-nums',fontFamily:'var(--serif)'}}>{fmtK(v)}</text>
              ))}
            </g>
          );
        })}
      </svg>
      {node}
    </figure>
  );
}

// ─────────────────────────────────────────────────────────────
// Stacked columns — two series stacked at each x
// ─────────────────────────────────────────────────────────────
function StackedColumns({ data, series=['A','B'], colors=['var(--accent)','var(--accent-warn)'], width=720, height=340, showLabels=false }) {
  const { show, hide, node } = useTooltip();
  const pad = { t: 16, r: 24, b: 32, l: 48 };
  const W=width, H=height, iw=W-pad.l-pad.r, ih=H-pad.t-pad.b;
  const totals = data.map(d => (d.a||0) + (d.b||0));
  const yMax = (Math.max(...totals, 1)) * 1.1;
  const bw = Math.max(8, (iw/data.length) * 0.55);
  const xCenter = i => pad.l + ((i+0.5)/data.length)*iw;
  const yPx = v => pad.t + (1 - v/yMax)*ih;
  const step = yMax/4;
  const yTicks = [0,1,2,3,4].map(i=>Math.round(i*step/1000)*1000).filter((v,i,a)=>a.indexOf(v)===i);
  return (
    <figure className="chart-wrap" style={{position:'relative',margin:0}}>
      <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} style={{display:'block',overflow:'visible'}}>
        {yTicks.map(t=>(
          <g key={t}>
            <line x1={pad.l} x2={W-pad.r} y1={yPx(t)} y2={yPx(t)} stroke="var(--rule)"/>
            <text x={pad.l-10} y={yPx(t)+4} textAnchor="end" fontSize="11" fill="var(--muted)" style={{fontVariantNumeric:'tabular-nums',fontFamily:'var(--serif)'}}>{fmtK(t)}</text>
          </g>
        ))}
        {data.map((d,i)=>{
          const aH = (d.a||0)/yMax*ih;
          const bH = (d.b||0)/yMax*ih;
          const aY = H-pad.b - aH;
          const bY = aY - bH;
          const cx = xCenter(i);
          return (
            <g key={i} onMouseMove={e=>show(e, <span><b>{d.label ?? d.y}</b> · {series[0]} <span className="tnum">{fmtN(d.a||0)}</span> · {series[1]} <span className="tnum">{fmtN(d.b||0)}</span></span>)} onMouseLeave={hide} style={{cursor:'crosshair'}}>
              <rect x={cx-bw/2} y={aY} width={bw} height={aH} fill={colors[0]}/>
              {(d.b||0) > 0 && <rect x={cx-bw/2} y={bY} width={bw} height={bH} fill={colors[1]}/>}
              <text x={cx} y={H-pad.b+18} textAnchor="middle" fontSize="11" fill="var(--muted)" style={{fontVariantNumeric:'tabular-nums',fontFamily:'var(--serif)'}}>{d.label ?? d.y}</text>
              {showLabels && (
                <text x={cx} y={bY-4} textAnchor="middle" fontSize="10.5" fill="var(--ink-2)" style={{fontVariantNumeric:'tabular-nums',fontFamily:'var(--serif)'}}>{fmtK((d.a||0)+(d.b||0))}</text>
              )}
            </g>
          );
        })}
        <line x1={pad.l} x2={W-pad.r} y1={H-pad.b} y2={H-pad.b} stroke="var(--rule-2)"/>
      </svg>
      {node}
    </figure>
  );
}

// ─────────────────────────────────────────────────────────────
// Stacked columns, N series (one column per year/period, stacked segments)
// ─────────────────────────────────────────────────────────────
function StackedColumnsMulti({ years, series, colors, width=800, height=360, showLabels=false }) {
  const { show, hide, node } = useTooltip();
  const pad = { t: 16, r: 160, b: 36, l: 56 };
  const W=width, H=height, iw=W-pad.l-pad.r, ih=H-pad.t-pad.b;
  const palette = colors || [
    'var(--accent)', 'var(--accent-warn)', 'var(--accent-2)',
    'var(--accent-gold)', 'var(--muted-2)', 'var(--ink-2)',
  ];
  const totals = years.map((_, i) => series.reduce((s, r) => s + (r.data[i] || 0), 0));
  const yMax = Math.max(...totals, 1) * 1.1;
  const bw = Math.max(10, (iw/years.length) * 0.6);
  const xCenter = i => pad.l + ((i+0.5)/years.length)*iw;
  const yPx = v => pad.t + (1 - v/yMax)*ih;
  const step = yMax/4;
  const yTicks = [0,1,2,3,4].map(i=>Math.round(i*step/1000)*1000).filter((v,i,a)=>a.indexOf(v)===i);
  return (
    <figure className="chart-wrap" style={{position:'relative',margin:0}}>
      <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} style={{display:'block',overflow:'visible'}}>
        {yTicks.map(t=>(
          <g key={t}>
            <line x1={pad.l} x2={W-pad.r} y1={yPx(t)} y2={yPx(t)} stroke="var(--rule)"/>
            <text x={pad.l-10} y={yPx(t)+4} textAnchor="end" fontSize="11" fill="var(--muted)" style={{fontVariantNumeric:'tabular-nums',fontFamily:'var(--serif)'}}>{fmtK(t)}</text>
          </g>
        ))}
        {years.map((yr, i) => {
          const cx = xCenter(i);
          let yCursor = H - pad.b;
          const segs = series.map((s, si) => {
            const v = s.data[i] || 0;
            const segH = (v/yMax) * ih;
            const segY = yCursor - segH;
            yCursor = segY;
            return { name: s.name, v, segY, segH, color: palette[si % palette.length] };
          });
          const total = totals[i];
          return (
            <g key={yr} onMouseMove={e=>show(e, (
              <span>
                <b>{yr}</b>
                {segs.map((s, si) => (
                  <span key={si}> · {s.name} <span className="tnum">{fmtN(s.v)}</span></span>
                ))}
                {' '}· total <span className="tnum">{fmtN(total)}</span>
              </span>
            ))} onMouseLeave={hide} style={{cursor:'crosshair'}}>
              {segs.map((s, si) => (
                s.segH > 0 ? <rect key={si} x={cx-bw/2} y={s.segY} width={bw} height={s.segH} fill={s.color}/> : null
              ))}
              <text x={cx} y={H-pad.b+18} textAnchor="middle" fontSize="11" fill="var(--muted)" style={{fontVariantNumeric:'tabular-nums',fontFamily:'var(--serif)'}}>{yr}</text>
              {showLabels && total > 0 && (
                <text x={cx} y={yPx(total)-6} textAnchor="middle" fontSize="10.5" fill="var(--ink-2)" style={{fontVariantNumeric:'tabular-nums',fontFamily:'var(--serif)'}}>{fmtK(total)}</text>
              )}
            </g>
          );
        })}
        <line x1={pad.l} x2={W-pad.r} y1={H-pad.b} y2={H-pad.b} stroke="var(--rule-2)"/>
        {/* Legend */}
        {series.map((s, si) => (
          <g key={s.name} transform={`translate(${W-pad.r+14}, ${pad.t+si*18})`}>
            <rect width={10} height={10} fill={palette[si % palette.length]}/>
            <text x={16} y={9} fontSize="11.5" fill="var(--ink-2)" style={{fontFamily:'var(--serif)'}}>{s.name}</text>
          </g>
        ))}
      </svg>
      {node}
    </figure>
  );
}

// ─────────────────────────────────────────────────────────────
// Horizontal bar chart
// ─────────────────────────────────────────────────────────────
function BarChart({ data, width=720, height=null, valueFmt=fmtN, color='var(--accent)', showGrant=false }) {
  const { show, hide, node } = useTooltip();
  const rowH = 30;
  const H = height || data.length * rowH + 16;
  const pad = { t: 8, r: 90, b: 8, l: 130 };
  const iw = width - pad.l - pad.r;
  const vMax = Math.max(...data.map(d=>d.v));
  return (
    <figure className="chart-wrap" style={{position:'relative',margin:0}}>
      <svg width="100%" height={H} viewBox={`0 0 ${width} ${H}`} style={{display:'block'}}>
        {data.map((d,i)=>{
          const y = pad.t + i*rowH;
          const w = (d.v/vMax)*iw;
          return (
            <g key={d.name}
              onMouseMove={e=>show(e, <span><b>{d.name}</b> · <span className="tnum">{valueFmt(d.v)}</span>{showGrant && d.grant !== undefined ? <> · grant rate <span className="tnum">{Math.round(d.grant*100)}%</span></> : null}</span>)}
              onMouseLeave={hide}
              style={{cursor:'crosshair'}}>
              <text x={pad.l-10} y={y+rowH/2+4} textAnchor="end" fontSize="13" fill="var(--ink-2)" style={{fontFamily:'var(--serif)'}}>{d.name}</text>
              <rect x={pad.l} y={y+6} width={iw} height={rowH-12} fill="var(--bg-2)"/>
              <rect x={pad.l} y={y+6} width={w} height={rowH-12} fill={color}/>
              <text x={pad.l+w+8} y={y+rowH/2+4} fontSize="12" fill="var(--ink-2)" style={{fontVariantNumeric:'tabular-nums',fontFamily:'var(--serif)'}}>{valueFmt(d.v)}</text>
              {showGrant && d.grant !== undefined && (
                <text x={width-8} y={y+rowH/2+4} textAnchor="end" fontSize="11" fill="var(--muted)" style={{fontVariantNumeric:'tabular-nums',fontFamily:'var(--serif)',fontStyle:'italic'}}>{Math.round(d.grant*100)}% grant</text>
              )}
            </g>
          );
        })}
      </svg>
      {node}
    </figure>
  );
}

// ─────────────────────────────────────────────────────────────
// Stacked bar / decisions breakdown
// ─────────────────────────────────────────────────────────────
function StackedBar({ data, width=720, height=80 }) {
  const { show, hide, node } = useTooltip();
  const total = data.reduce((s,d)=>s+d.v,0);
  let cum = 0;
  return (
    <figure className="chart-wrap" style={{position:'relative',margin:0}}>
      <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} style={{display:'block'}}>
        {data.map((d,i)=>{
          const w = (d.v/total)*width;
          const x = cum;
          cum += w;
          return (
            <g key={d.label}
              onMouseMove={e=>show(e, <span><b>{d.label}</b> · <span className="tnum">{fmtN(d.v)}</span> · {Math.round(d.v/total*100)}%</span>)}
              onMouseLeave={hide}
              style={{cursor:'crosshair'}}>
              <rect x={x} y={20} width={w-1} height={36} fill={d.color}/>
              <text x={x} y={15} fontSize="11" fill="var(--muted)" className="uc" style={{fontFamily:'var(--serif)'}}>
                {d.label}
              </text>
              <text x={x} y={72} fontSize="12" fill="var(--ink)" style={{fontVariantNumeric:'tabular-nums',fontFamily:'var(--serif)'}}>
                {fmtN(d.v)} <tspan fill="var(--muted)">· {Math.round(d.v/total*100)}%</tspan>
              </text>
            </g>
          );
        })}
      </svg>
      {node}
    </figure>
  );
}

// ─────────────────────────────────────────────────────────────
// Tiny sparkline (for index cards)
// ─────────────────────────────────────────────────────────────
function Spark({ data, width=180, height=48, stroke='var(--accent)', area=true }) {
  const pad = 4;
  const xs = data.map(p=>p.y), ys = data.map(p=>p.v);
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  const yMax = Math.max(...ys) * 1.1;
  const x = v => pad + ((v-xMin)/(xMax-xMin))*(width-2*pad);
  const y = v => pad + (1 - v/yMax)*(height-2*pad);
  const pts = data.map(p=>`${x(p.y)},${y(p.v)}`).join(' ');
  const areaPath = `M${x(data[0].y)},${y(0)} L${pts.split(' ').join(' L')} L${x(data[data.length-1].y)},${y(0)} Z`;
  return (
    <svg width={width} height={height} style={{display:'block'}}>
      {area && <path d={areaPath} fill={stroke} fillOpacity="0.12"/>}
      <polyline points={pts} fill="none" stroke={stroke} strokeWidth="1.3"/>
    </svg>
  );
}

// ─────────────────────────────────────────────────────────────
// Donut / ring for grant rate
// ─────────────────────────────────────────────────────────────
function Ring({ value, size=140, stroke=14, label='', sub='' }) {
  const r = size/2 - stroke/2;
  const c = 2*Math.PI*r;
  const off = c * (1 - value);
  return (
    <div style={{display:'inline-flex',flexDirection:'column',alignItems:'center',gap:4}}>
      <svg width={size} height={size}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--bg-2)" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--accent)" strokeWidth={stroke}
          strokeDasharray={c} strokeDashoffset={off}
          transform={`rotate(-90 ${size/2} ${size/2})`}
          style={{transition:'stroke-dashoffset .5s ease'}}/>
        <text x={size/2} y={size/2+2} textAnchor="middle" fontSize="26" fill="var(--ink)" style={{fontFamily:'var(--serif)',fontVariantNumeric:'tabular-nums'}}>
          {Math.round(value*100)}%
        </text>
      </svg>
      {label && <div className="uc" style={{color:'var(--muted)'}}>{label}</div>}
      {sub && <div style={{fontSize:12,color:'var(--muted)',fontStyle:'italic'}}>{sub}</div>}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Choropleth-ish region list (ranked bars)
// ─────────────────────────────────────────────────────────────
function RegionList({ data }) {
  const vMax = Math.max(...data.map(d=>d.v));
  return (
    <div style={{display:'flex',flexDirection:'column',gap:6}}>
      {data.map(d=>(
        <div key={d.name} style={{display:'grid',gridTemplateColumns:'170px 1fr 60px',alignItems:'center',gap:16,fontSize:13,padding:'6px 0',borderBottom:'1px dotted var(--rule)'}}>
          <span>{d.name}</span>
          <div style={{position:'relative',height:14,background:'var(--bg-2)'}}>
            <div style={{position:'absolute',inset:0,width:`${(d.v/vMax)*100}%`,background:'var(--accent)'}}/>
          </div>
          <span className="tnum" style={{textAlign:'right',color:'var(--ink-2)'}}>{fmtN(d.v)}</span>
        </div>
      ))}
    </div>
  );
}

Object.assign(window, { LineChart, MultiLineChart, BarChart, StackedBar, StackedColumns, StackedColumnsMulti, Spark, Ring, RegionList, fmtK, fmtN });

function SearchModal({ open, onClose, onPick }) {

// dashboard-view.jsx — synchronised dashboard with pride-of-place KPIs + charts + tables

const { useState: uSD, useMemo: uMD } = React;

function DashboardView({ setRoute }) {
  const [range, setRange] = uSD([2018, 2024]);
  const [focus, setFocus] = uSD('all'); // all | applications | decisions | geography

  const filteredAnnual = uMD(()=>ASYLUM_ANNUAL.filter(d => d.y >= range[0] && d.y <= range[1]), [range]);
  const latest = ASYLUM_ANNUAL[ASYLUM_ANNUAL.length - 1];
  const prev = ASYLUM_ANNUAL[ASYLUM_ANNUAL.length - 2];
  const pctChange = ((latest.v - prev.v) / prev.v * 100).toFixed(1);
  const boatsPct = ((latest.boats - prev.boats) / prev.boats * 100).toFixed(1);
  const filteredBacklog = uMD(()=>BACKLOG.filter(d => d.y >= range[0] && d.y <= range[1]), [range]);
  const decisionsTotal = DECISIONS_2024.reduce((s,d)=>s+d.v,0);
  const grantRate = (DECISIONS_2024[0].v + DECISIONS_2024[1].v) / decisionsTotal;

  // Preventions + interceptions (BOATS_WEEKLY.p / .e) — null before first reported week.
  const boatsWeekly = typeof BOATS_WEEKLY !== 'undefined' ? BOATS_WEEKLY : [];
  const preventions2024 = boatsWeekly
    .filter(w => w.we?.startsWith('2024') && w.p != null)
    .reduce((s,w) => s + w.p, 0);
  const preventionsFirstWeek = boatsWeekly.find(w => w.p != null)?.we ?? null;
  const interceptionsWeekly = boatsWeekly
    .filter(w => w.e != null)
    .map((w, i) => ({ y: i, v: w.e, label: w.we }));
  const interceptionsFirstWe = interceptionsWeekly[0]?.label ?? null;
  const interceptionsLastWe = interceptionsWeekly[interceptionsWeekly.length - 1]?.label ?? null;

  // Phase 4 placeholders — hydrate from globals when data lands.
  const natFull = typeof NAT_FULL !== 'undefined' ? NAT_FULL : null;
  const natQuarterly = typeof NAT_QUARTERLY !== 'undefined' ? NAT_QUARTERLY : null;
  const resettlementSeries = typeof RESETTLEMENT_SERIES !== 'undefined' ? RESETTLEMENT_SERIES : null;
  const resettlementYears = typeof RESETTLEMENT_META !== 'undefined' ? RESETTLEMENT_META.years : [2022,2023,2024];
  const hotels = typeof HOTELS !== 'undefined' ? HOTELS : null;

  // Derive "top nationality + QoQ delta" from NAT_QUARTERLY when available.
  const topNatCard = (() => {
    if (!natQuarterly || !natQuarterly.quarters?.length || !natQuarterly.series?.length) return null;
    const qs = natQuarterly.quarters;
    const lastIdx = qs.length - 1;
    const prevIdx = Math.max(0, lastIdx - 1);
    // Find the series with the highest value in the latest quarter.
    let top = natQuarterly.series[0];
    for (const s of natQuarterly.series) {
      if ((s.data[lastIdx] ?? 0) > (top.data[lastIdx] ?? 0)) top = s;
    }
    const now = top.data[lastIdx] ?? 0;
    const was = top.data[prevIdx] ?? 0;
    const delta = was === 0 ? null : ((now - was) / was * 100);
    return { name: top.name, v: now, delta, quarter: qs[lastIdx], prevQuarter: qs[prevIdx] };
  })();

  // Hotels KPI: latest value + previous for delta, if data is present.
  const hotelsCard = (() => {
    if (!hotels || !hotels.length) return null;
    const last = hotels[hotels.length - 1];
    const prev2 = hotels[hotels.length - 2];
    const delta = prev2 ? ((last.persons_in_hotels - prev2.persons_in_hotels) / prev2.persons_in_hotels * 100) : null;
    return { ...last, delta };
  })();

  return (
    <main className="fade-enter" style={{maxWidth:1300,margin:'0 auto',padding:'36px 48px 80px'}}>
      {/* title strip */}
      <div style={{borderBottom:'1px solid var(--rule)',paddingBottom:22,marginBottom:28,display:'flex',justifyContent:'space-between',alignItems:'flex-end',gap:40,flexWrap:'wrap'}}>
        <div>
          <div className="kicker-rule" style={{color:'var(--accent-warn)',fontSize:11,letterSpacing:0.1,textTransform:'uppercase',fontWeight:500}}>Live dashboard · Q1 2026</div>
          <h1 style={{fontFamily:'var(--serif)',fontSize:42,letterSpacing:-0.4,fontWeight:400,margin:'6px 0 10px'}}>Asylum &amp; resettlement at a glance</h1>
          <p style={{fontSize:15.5,color:'var(--ink-2)',maxWidth:680,margin:0,lineHeight:1.5}}>
            Eight key figures, six charts, and the regional table — all driven by a single time-range filter. Updated when the Home Office releases its quarterly figures.
          </p>
        </div>
        <div style={{minWidth:320}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
            <span className="uc" style={{color:'var(--muted)'}}><span className="tick tick-accent"/>Filter range</span>
            <span className="uc tnum" style={{color:'var(--accent)'}}>{range[0]}–{range[1]}</span>
          </div>
          <div style={{display:'flex',gap:10,alignItems:'center'}}>
            <input type="range" min={2014} max={2024} value={range[0]} onChange={e=>setRange([Math.min(+e.target.value, range[1]-1), range[1]])}/>
            <input type="range" min={2014} max={2024} value={range[1]} onChange={e=>setRange([range[0], Math.max(+e.target.value, range[0]+1)])}/>
          </div>
          <div style={{marginTop:14,display:'flex',gap:6,flexWrap:'wrap'}}>
            {[
              { id:'all', label:'All' },
              { id:'applications', label:'Applications and journeys' },
              { id:'decisions', label:'Decisions' },
              { id:'geography', label:'Geography' },
            ].map(f => (
              <button key={f.id} onClick={()=>setFocus(f.id)}
                style={{

// Scrollable full-nationalities table with sortable columns
function NationalitiesTable({ data }) {
  const [sortBy, setSortBy] = uSD('v');
  const [asc, setAsc] = uSD(false);

  if (!data || !data.length) {
    return (
      <div style={{padding:'48px 0',textAlign:'center',color:'var(--muted-2)',fontSize:13,fontStyle:'italic',border:'1px dashed var(--rule-2)'}}>
        Data pending — NAT_FULL not yet loaded
      </div>
    );
  }

  const sorted = [...data].sort((a,b) => {
    const av = a[sortBy], bv = b[sortBy];
    if (typeof av === 'string') return asc ? av.localeCompare(bv) : bv.localeCompare(av);
    return asc ? av - bv : bv - av;
  });

  const click = (col) => () => {
    if (sortBy === col) setAsc(!asc);
    else { setSortBy(col); setAsc(col === 'name'); }
  };
  const arrow = (col) => sortBy===col ? (asc?' ↑':' ↓') : '';

  return (
    <div style={{maxHeight:260,overflowY:'auto'}}>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
        <thead style={{position:'sticky',top:0,background:'#fff'}}>
          <tr>
            <th className="uc" onClick={click('name')} style={{textAlign:'left',padding:'6px 8px 6px 0',fontWeight:500,color:'var(--muted)',borderBottom:'1px solid var(--rule)',cursor:'pointer'}}>Nationality{arrow('name')}</th>
            <th className="uc" onClick={click('v')}    style={{textAlign:'right',padding:'6px 0',fontWeight:500,color:'var(--muted)',borderBottom:'1px solid var(--rule)',cursor:'pointer'}}>Apps{arrow('v')}</th>
            <th className="uc" onClick={click('grant')}style={{textAlign:'right',padding:'6px 0 6px 8px',fontWeight:500,color:'var(--muted)',borderBottom:'1px solid var(--rule)',cursor:'pointer'}}>Grant{arrow('grant')}</th>
          </tr>
        </thead>
        <tbody>
          {sorted.map((r,i)=>(
            <tr key={r.name} style={{borderBottom:'1px dotted var(--rule)'}}>
              <td style={{padding:'5px 8px 5px 0',color:'var(--ink)'}}>{r.name}</td>
              <td className="tnum" style={{padding:'5px 0',textAlign:'right'}}>{fmtN(r.v)}</td>
              <td className="tnum" style={{padding:'5px 0 5px 8px',textAlign:'right',color:'var(--muted)'}}>{r.grant!=null ? Math.round(r.grant*100)+'%' : '—'}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// Framed figure card with number + coloured kicker
function DashFrame({ number, kickerColor, title, sub, children, style={} }) {
  return (
    <div style={{background:'#fff',border:'1px solid var(--rule)',padding:'22px 26px 24px',position:'relative',...style}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16,paddingBottom:12,borderBottom:'1px solid var(--rule)'}}>
        <div>
          <div style={{fontSize:10.5,letterSpacing:0.12,textTransform:'uppercase',color:kickerColor,fontWeight:500,display:'inline-block',paddingBottom:4,borderBottom:`1.5px solid ${kickerColor}`,marginBottom:8}}>Fig. {number}</div>
          <div style={{fontFamily:'var(--serif)',fontSize:18,fontWeight:500,color:'var(--ink)',letterSpacing:-0.1}}>{title}</div>
          {sub && <div style={{fontSize:12.5,color:'var(--muted)',marginTop:3,fontStyle:'italic'}}>{sub}</div>}
        </div>
        <div style={{display:'flex',gap:10,fontSize:11,color:'var(--muted-2)'}} className="uc">
          <span className="pressable" style={{cursor:'pointer'}}>↓</span>
          <span className="pressable" style={{cursor:'pointer'}}>⇢</span>
          <span className="pressable" style={{cursor:'pointer'}}>⎘</span>

}

const _boatsW = () => (typeof BOATS_WEEKLY !== 'undefined' ? BOATS_WEEKLY : []);
const _boatsM = () => (typeof BOATS_MONTHLY !== 'undefined' ? BOATS_MONTHLY : []);
const _boatsD = () => (typeof BOATS_DAILY !== 'undefined' ? BOATS_DAILY : []);
const _annualFromWeekly = (key) => {
  const by = {};
  for (const row of _boatsW()) {
    if (row[key] == null) continue;
    const y = +row.we.slice(0,4);
    by[y] = (by[y] || 0) + row[key];
  }
  return Object.entries(by).map(([y,v])=>({y:+y, v})).sort((a,b)=>a.y-b.y);
};

const DATASET_OPTIONS = [
  { id: 'applications', label: 'Applications',         series: ASYLUM_ANNUAL.map(d=>({y:d.y, v:d.v})),     color: 'var(--accent)' },
  { id: 'boats',        label: 'Small-boat arrivals',  series: ASYLUM_ANNUAL.map(d=>({y:d.y, v:d.boats})), color: 'var(--accent-warn)', supportsGranularity: true },
  { id: 'backlog',      label: 'Backlog (pending)',    series: BACKLOG.map(d=>({y:d.y, v:d.v})),           color: 'var(--accent-2)' },
  { id: 'preventions',  label: 'Preventions',          series: _annualFromWeekly('p'),                      color: 'var(--accent-gold)' },
  { id: 'interceptions',label: 'Interceptions',        series: _annualFromWeekly('e'),                      color: 'var(--muted-2)' },
  (() => {
    // Derive an "Other nationalities" series: total applications per year − sum of named top-5.
    const top5 = NAT_SERIES.series;
    const other = {
      name: 'Other nationalities',
      data: NAT_SERIES.years.map((y, idx) => {
        const total = ASYLUM_ANNUAL.find(d => d.y === y)?.v ?? 0;
        const named = top5.reduce((s, row) => s + row.data[idx], 0);
        return Math.max(0, total - named);
      }),
    };
    const seriesWithOther = [...top5, other];
    // Palette: five named nationalities use distinct accents; "Other" is muted so the named rows lead.
    const colors = [
      'var(--accent)', 'var(--accent-warn)', 'var(--accent-2)',
      'var(--accent-gold)', 'var(--ink-2)', 'var(--muted-2)',
    ];
    return {
      id: 'nationalities',
      label: 'Top 5 nationalities + other',
      render: 'multi',
      multi: { years: NAT_SERIES.years, series: seriesWithOther, colors },
      // flat series — year totals (all nationalities) — used when this option is a compare
      series: NAT_SERIES.years.map((y, idx) => ({
        y,
        v: seriesWithOther.reduce((s, row) => s + row.data[idx], 0),
      })),
      color: 'var(--accent-2)',
    };
  })(),
];

const GRANULARITIES = ['daily','weekly','monthly','quarterly','annual'];

function getGranularSeries(opt, gran) {
  if (gran === 'annual' || !opt.supportsGranularity) return opt.series;
  if (opt.id !== 'boats') return opt.series;
  if (gran === 'monthly') return _boatsM().map((d,i)=>({y:i, v:d.m, label:d.month}));
  if (gran === 'weekly')  return _boatsW().map((d,i)=>({y:i, v:d.m, label:d.we}));
  if (gran === 'daily')   return _boatsD().map((d,i)=>({y:i, v:d.m, label:d.d}));
  if (gran === 'quarterly') {
    const by = {};
    for (const r of _boatsM()) {
      const [yr, mon] = r.month.split('-').map(Number);
      const q = `${yr}Q${Math.ceil(mon/3)}`;
      by[q] = (by[q] || 0) + r.m;
    }
    return Object.entries(by).map(([q,v],i)=>({y:i, v, label:q}));
  }
  return opt.series;
}

function BuildView({ setRoute }) {
  const [ds, setDs] = uS2('applications');
  const [compare, setCompare] = uS2('boats');
  const [chartType, setChartType] = uS2('line');
  const [range, setRange] = uS2([2018, 2024]);
  const [overlay, setOverlay] = uS2(false);
  const [showLabels, setShowLabels] = uS2(false);
  const [granularity, setGranularity] = uS2('annual');

  uE2(() => { if (compare === ds) setCompare('none'); }, [ds]);

  const prim = DATASET_OPTIONS.find(o => o.id === ds);
  const isMultiPrim = prim.render === 'multi';
  const sec = (!isMultiPrim && compare !== 'none' && compare !== ds) ? DATASET_OPTIONS.find(o => o.id === compare) : null;
  const supportsGran = !isMultiPrim && !!prim.supportsGranularity;
  const effGran = supportsGran ? granularity : 'annual';
  const isAnnual = effGran === 'annual';

  const primData = getGranularSeries(prim, effGran);
  const secData  = sec ? sec.series : null;

  // Only apply yearRange filter in annual mode; other grains have index x-values.
  const primView = isAnnual ? primData.filter(d=>d.y>=range[0]&&d.y<=range[1]) : primData;
  const secView  = isAnnual && secData ? secData.filter(d=>d.y>=range[0]&&d.y<=range[1]) : secData;

  // For overlay (MultiLineChart) we need common x-axis — only supported when annual.
  const canOverlay = isAnnual && !!sec && chartType === 'line';
  const overlayOn = overlay && canOverlay;

  const dailyWarn = effGran === 'daily' && primData.length > 1000;

  return (
    <main className="fade-enter" style={{maxWidth:1240,margin:'0 auto',padding:'40px 48px 80px'}}>
      <div style={{marginBottom:28}}>
        <div className="uc" style={{color:'var(--muted)',marginBottom:8,display:'inline-block',paddingBottom:4,borderBottom:'2px solid var(--accent-2)'}}>Build a chart</div>

        <p style={{fontSize:17,color:'var(--ink-2)',maxWidth:640,margin:0,lineHeight:1.5}}>Pick a dataset, a time range, and a chart type. Export as an image or embed it in your own article.</p>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'300px 1fr',gap:40,alignItems:'start'}}>
        {/* controls */}
        <aside style={{position:'sticky',top:96,border:'1px solid var(--rule)',padding:'24px 26px',background:'#fff',maxHeight:'calc(100vh - 120px)',overflowY:'auto'}}>
          <div style={{marginBottom:22}}>
            <div className="uc" style={{color:'var(--muted)',marginBottom:8}}>1 · Primary dataset</div>
            <div style={{maxHeight:220,overflowY:'auto',marginRight:-6,paddingRight:6}}>
              {DATASET_OPTIONS.map(o=>(
                <label key={o.id} className="chk" style={{display:'flex',padding:'6px 0',fontSize:14}}>
                  <input type="radio" name="ds" checked={ds===o.id} onChange={()=>setDs(o.id)} style={{appearance:'auto',width:14,height:14}}/>
                  {o.label}
                </label>
              ))}
            </div>
          </div>

          {!isMultiPrim && (
            <div style={{marginBottom:22,paddingTop:18,borderTop:'1px solid var(--rule)'}}>
              <div className="uc" style={{color:'var(--muted)',marginBottom:8}}>2 · Compare with</div>
              <div style={{maxHeight:200,overflowY:'auto',marginRight:-6,paddingRight:6}}>
                <label className="chk" style={{display:'flex',padding:'6px 0',fontSize:14}}>
                  <input type="radio" name="cmp" checked={compare==='none'} onChange={()=>setCompare('none')} style={{appearance:'auto',width:14,height:14}}/>None
                </label>
                {DATASET_OPTIONS.filter(o=>o.id!==ds && o.render!=='multi').map(o=>(
                  <label key={o.id} className="chk" style={{display:'flex',padding:'6px 0',fontSize:14}}>
                    <input type="radio" name="cmp" checked={compare===o.id} onChange={()=>setCompare(o.id)} style={{appearance:'auto',width:14,height:14}}/>{o.label}
                  </label>
                ))}
              </div>
              {sec && (
                <label className="chk" style={{fontSize:12.5,padding:'8px 0 2px',color: canOverlay ? 'var(--ink-2)' : 'var(--muted-2)'}}>
                  <input type="checkbox" checked={overlayOn} disabled={!canOverlay} onChange={e=>setOverlay(e.target.checked)}/>
                  Overlay on one chart
                </label>
              )}
            </div>
          )}

          <div style={{marginBottom:22,paddingTop:18,borderTop:'1px solid var(--rule)'}}>
            <div className="uc" style={{color:'var(--muted)',marginBottom:10}}>3 · Chart type</div>
            <div className="seg" style={{display:'flex',flexWrap:'wrap'}}>
              {['line','bar','area','scatter','stacked'].map(t=>(
                <button key={t} className={chartType===t?'on':''} onClick={()=>setChartType(t)} style={{flex:'1 0 30%',textTransform:'capitalize'}}>{t}</button>
              ))}
            </div>
            <label className="chk" style={{fontSize:13,padding:'10px 0 2px'}}>
              <input type="checkbox" checked={showLabels} onChange={e=>setShowLabels(e.target.checked)}/>
              Show data labels
            </label>
          </div>

          {supportsGran && (
            <div style={{marginBottom:22,paddingTop:18,borderTop:'1px solid var(--rule)'}}>
              <div className="uc" style={{color:'var(--muted)',marginBottom:10}}>4 · Granularity</div>
              <div className="seg" style={{display:'flex',flexWrap:'wrap'}}>

                  <button key={g} className={granularity===g?'on':''} onClick={()=>setGranularity(g)} style={{flex:'1 0 30%',textTransform:'capitalize',fontSize:11}}>{g}</button>
                ))}
              </div>
              {dailyWarn && <div style={{fontSize:11.5,color:'var(--accent-warn)',marginTop:8,fontStyle:'italic'}}>Daily view renders {primData.length.toLocaleString()} points.</div>}
            </div>
          )}

          {isAnnual && (
            <div style={{marginBottom:22,paddingTop:18,borderTop:'1px solid var(--rule)'}}>
              <div className="uc" style={{color:'var(--muted)',marginBottom:10}}>{supportsGran ? '5' : '4'} · Time range</div>

              <input type="range" min={2014} max={2024} value={range[0]} onChange={e=>setRange([Math.min(+e.target.value, range[1]-1), range[1]])}/>
              <input type="range" min={2014} max={2024} value={range[1]} onChange={e=>setRange([range[0], Math.max(+e.target.value, range[0]+1)])}/>
            </div>
          )}

          <div style={{paddingTop:18,borderTop:'1px solid var(--rule)',display:'flex',flexDirection:'column',gap:8}}>
            <button style={{background:'var(--accent)',color:'var(--bg)',padding:'10px 14px',fontSize:13,fontFamily:'var(--serif)'}}>↓ Download PNG</button>
            <button style={{background:'#fff',color:'var(--accent)',padding:'10px 14px',fontSize:13,fontFamily:'var(--serif)',border:'1px solid var(--accent)'}}>↓ Download CSV</button>

                  {sec && <span style={{color:'var(--muted)',fontWeight:400}}> {overlayOn?'+':'&'} {sec.label}</span>}

            {/* Multi-series primary (e.g. nationalities bundle) */}
            {isMultiPrim ? (
              chartType === 'stacked' ? (
                <StackedColumnsMulti
                  years={prim.multi.years}
                  series={prim.multi.series}
                  colors={prim.multi.colors}
                  width={800} height={380}
                  showLabels={showLabels}
                />
              ) : chartType === 'bar' ? (
                (() => {
                  const latestIdx = prim.multi.years.length - 1;
                  const latestYear = prim.multi.years[latestIdx];
                  const rows = prim.multi.series
                    .map(s => ({ name: s.name, v: s.data[latestIdx] || 0 }))
                    .sort((a,b) => b.v - a.v);
                  return (
                    <>
                      <div className="uc" style={{color:'var(--muted)',marginBottom:10}}>Latest year · {latestYear}</div>
                      <BarChart data={rows} width={800} height={Math.max(220, rows.length*30+16)} color="var(--accent-2)"/>

                })()
              ) : (
                <MultiLineChart
                  years={prim.multi.years}
                  series={prim.multi.series}
                  width={800} height={360}
                  showLabels={showLabels}
                />
              )
            ) : overlayOn ? (
              <MultiLineChart
                years={primView.map(d=>d.y)}
                series={[
                  { name: prim.label, data: primView.map(d=>d.v) },
                  { name: sec.label,  data: (secView||[]).map(d=>d.v) },

          </div>
          <div className="uc" style={{color:'var(--muted-2)',marginTop:12}}>Charts update live as you change controls. Annotations and custom titles coming in the next release.</div>
        </section>
      </div>
    </main>
  );
}

Object.assign(window, { StoryView, DatasetsView, BuildView });


/* --- src/root.jsx --- */
// root.jsx — root component + tweak panel + routing

const { useState: uSR, useEffect: uER } = React;

function TweakPanel({ tweaks, setTweaks, open, onClose }) {
  const accents = [
    { key: '#1c3d2e', label: 'Forest' },
    { key: '#0f2a4a', label: 'Navy' },
    { key: '#2a4a3a', label: 'Sage' },
    { key: '#6b3d2e', label: 'Umber' },
    { key: '#5a3a6b', label: 'Plum' },
    { key: '#1a1a17', label: 'Ink' },
  ];
  const setAccent = k => {
    setTweaks({ ...tweaks, accent: k });
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accent: k } }, '*');
  };
  uER(()=>{
    document.documentElement.style.setProperty('--accent', tweaks.accent);
  }, [tweaks.accent]);
  if (!open) return null;
  return (
    <div className="tweak-panel open" style={{display:'block'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
        <div className="uc" style={{color:'var(--muted)'}}>Tweaks</div>
        <button onClick={onClose} className="pressable" style={{fontSize:18,color:'var(--muted)'}}>×</button>
      </div>
      <div style={{fontSize:12,color:'var(--muted)',marginBottom:8}}>Accent colour</div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        {accents.map(a=>(
          <button key={a.key} title={a.label} onClick={()=>setAccent(a.key)}
            className={`swatch ${tweaks.accent===a.key?'active':''}`}
            style={{background:a.key}}/>
        ))}
      </div>
      <div style={{fontSize:11,color:'var(--muted-2)',marginTop:12,fontStyle:'italic',lineHeight:1.45}}>
        Changes apply live across every chart and piece of UI.
      </div>
    </div>
  );
}

function App() {
  const [route, setRoute] = uSR({ name: 'index' });
  const [search, setSearch] = uSR(false);
  const [method, setMethod] = uSR(false);
  const [tweaks, setTweaks] = uSR(TWEAK_DEFAULTS);
  const [tweakOpen, setTweakOpen] = uSR(false);

  // persist route in localStorage
  uER(()=>{
    const r = localStorage.getItem('hoe_route');
    if (r) try { setRoute(JSON.parse(r)); } catch(e){}
  }, []);
  uER(()=>{ localStorage.setItem('hoe_route', JSON.stringify(route)); }, [route]);

  // tweak host protocol — register listener BEFORE announcing
  uER(()=>{
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setTweakOpen(true);
      else if (e.data.type === '__deactivate_edit_mode') setTweakOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  // keyboard shortcut for search
  uER(()=>{
    const k = e => { if ((e.metaKey||e.ctrlKey) && e.key === 'k') { e.preventDefault(); setSearch(true); } };
    window.addEventListener('keydown', k);
    return ()=>window.removeEventListener('keydown', k);
  }, []);

  return (
    <>
      <Header route={route} setRoute={setRoute} onSearch={()=>setSearch(true)} onMethod={()=>setMethod(true)}/>
      {route.name === 'index' && <IndexView setRoute={setRoute}/>}
      {route.name === 'dashboard' && <DashboardView setRoute={setRoute}/>}
      {route.name === 'story' && <StoryView id={route.id} setRoute={setRoute} onMethod={()=>setMethod(true)}/>}
      {route.name === 'datasets' && <DatasetsView setRoute={setRoute}/>}
      {route.name === 'build' && <BuildView setRoute={setRoute}/>}

      <footer style={{borderTop:'1px solid var(--rule)',padding:'36px 48px',maxWidth:1240,margin:'0 auto',display:'flex',justifyContent:'space-between',alignItems:'baseline',fontSize:12.5,color:'var(--muted)'}}>
        <div>
          <span style={{fontFamily:'var(--serif)',fontStyle:'italic',color:'var(--ink-2)'}}>Home Office data explorer</span>
          <span style={{margin:'0 14px'}}>·</span>
          <span>Open data · Published under OGL v3.0</span>
        </div>
        <div style={{display:'flex',gap:22}}>
          <span className="ulh" style={{cursor:'pointer'}} onClick={()=>setMethod(true)}>Methodology</span>
          <span className="ulh" style={{cursor:'pointer'}}>API</span>
          <span className="ulh" style={{cursor:'pointer'}}>Contact</span>
          <span className="ulh" style={{cursor:'pointer'}}>About</span>
        </div>
      </footer>

      <SearchModal open={search} onClose={()=>setSearch(false)} onPick={r=>setRoute(r)}/>
      <MethodologyDrawer open={method} onClose={()=>setMethod(false)}/>
      <TweakPanel tweaks={tweaks} setTweaks={setTweaks} open={tweakOpen} onClose={()=>setTweakOpen(false)}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

/* BUNDLE_END */
</script>
</body>
