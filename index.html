function RegionWorldMap({ data, width=720, height=380 }) {
  const { show, hide, node } = useTooltip();
  const zoom = useMapZoom(width, height);
  const byName = Object.fromEntries(data.map(d => [d.name, d.v]));
  const total = data.reduce((s, d) => s + d.v, 0);
  const vMax = Math.max(...data.map(d => d.v), 1);
  // Shared 6-stop palette, sqrt-scaled so small regions stay visible.
  const fillFor = v => {
    if (!(v > 0)) return ATLAS_PALETTE[0];
    return atlasPaletteColor(Math.sqrt(v / vMax));
  };
  return (
    <figure className="chart-wrap" style={{position:'relative',margin:0}}>
      <svg width="100%" height={height} viewBox={zoom.viewBox} {...zoom.svgProps}
        style={{display:'block', ...zoom.svgProps.style}}>
        <rect x={0} y={0} width={width} height={height} fill="var(--bg-2)"/>
        {REGION_LAYOUT.map(r => {
          const v = byName[r.name] ?? 0;
          const pct = total ? (v/total*100) : 0;
          return (
            <g key={r.name}
              onMouseMove={e => show(e, <span><b>{r.name}</b> · <span className="tnum">{fmtN(v)}</span> · {pct.toFixed(1)}%</span>)}
              onMouseLeave={hide}
              style={{cursor:'crosshair'}}>
              <rect x={r.x} y={r.y} width={r.w} height={r.h} rx={10}
                fill={fillFor(v)}
                stroke="var(--rule-2)" strokeWidth={0.75}/>
              <text x={r.x + r.w/2} y={r.y + r.h/2 + 4} textAnchor="middle"
                fontSize={11} fontFamily="var(--serif)" fill="var(--ink)"
                style={{pointerEvents:'none'}}>
                {r.name.length > 22 ? r.name.replace(' & ', ' &\n') : r.name}
              </text>
            </g>
          );
        })}
        {/* "Other / Unclassified" sits as a small legend-style badge in the corner */}
        {byName['Other / Unclassified'] !== undefined && (
          <g onMouseMove={e => show(e, <span><b>Other / Unclassified</b> · <span className="tnum">{fmtN(byName['Other / Unclassified'])}</span> · Stateless, refugee, unknown</span>)} onMouseLeave={hide} style={{cursor:'crosshair'}}>
            <rect x={width-130} y={height-46} width={120} height={34} rx={6}
              fill={fillFor(byName['Other / Unclassified'])}
              stroke="var(--rule-2)" strokeWidth={0.75}/>
            <text x={width-70} y={height-25} textAnchor="middle" fontSize="10.5" fontFamily="var(--serif)" fill="var(--ink)" style={{pointerEvents:'none'}}>Other / Unclassified</text>
          </g>
        )}
      </svg>
      <ZoomControls zoom={zoom}/>
      {node}
    </figure>
  );
}

function RegionTable({ data, rows }) {
  const [expanded, setExpanded] = React.useState(new Set());
  const toggle = name => setExpanded(prev => {
    const next = new Set(prev);
    if (next.has(name)) next.delete(name); else next.add(name);
    return next;
  });

  // Build region → sorted country list from raw nationality rows.
  const byRegion = React.useMemo(() => {
    if (!rows) return {};
    const m = {};
    for (const r of rows) {
      const reg = (typeof REGION_MAP !== 'undefined' ? REGION_MAP[r.name] : null) ?? 'Other / Unclassified';
      (m[reg] = m[reg] || []).push(r);
    }
    return m;
  }, [rows]);

  const total = data.reduce((s, d) => s + d.v, 0);
  const vMax = Math.max(...data.map(d => d.v), 1);
  // Legend swatches reuse the same 6-stop palette as the map, so the colour
  // next to a region's name matches the colour painted on the map itself.
  const fillFor = v => {
    if (!(v > 0)) return ATLAS_PALETTE[0];
    return atlasPaletteColor(Math.sqrt(v / vMax));
  };

  return (
    <table style={{width:'100%',borderCollapse:'collapse',fontSize:13.5}}>
      <thead>
        <tr>
          <th className="uc" style={{padding:'0 0 10px',textAlign:'left',fontWeight:500,color:'var(--muted)',borderBottom:'2px solid var(--accent-gold)'}}>Region</th>
          <th className="uc" style={{padding:'0 0 10px',textAlign:'right',fontWeight:500,color:'var(--muted)',borderBottom:'2px solid var(--accent-gold)'}}>Applicants</th>
          <th className="uc" style={{padding:'0 0 10px',textAlign:'right',fontWeight:500,color:'var(--muted)',borderBottom:'2px solid var(--accent-gold)'}}>Share</th>
        </tr>
      </thead>
      <tbody>
        {data.map(r => {
          const isOpen = expanded.has(r.name);
          const countries = byRegion[r.name] ? [...byRegion[r.name]].sort((a, b) => b.v - a.v) : [];
          const canExpand = rows && countries.length > 0;
          return (
            <React.Fragment key={r.name}>
              <tr
                style={{borderBottom:'1px solid var(--rule)', cursor: canExpand ? 'pointer' : 'default'}}
                onClick={canExpand ? () => toggle(r.name) : undefined}
              >
                <td style={{padding:'10px 0',color:'var(--ink)'}}>
                  {canExpand && (
                    <span style={{
                      display:'inline-block', width:10, marginRight:4, fontSize:9,
                      color:'var(--muted)', userSelect:'none',
                      transform: isOpen ? 'rotate(90deg)' : 'none',
                      transition:'transform 0.15s', verticalAlign:'middle',
                    }}>▶</span>
                  )}
                  <span style={{display:'inline-block',width:12,height:12,marginRight:8,verticalAlign:'middle',background:fillFor(r.v),borderRadius:2,border:'1px solid var(--rule-2)'}}/>
                  {r.name}
                </td>
                <td className="tnum" style={{padding:'10px 0',textAlign:'right'}}>{fmtN(r.v)}</td>
                <td className="tnum" style={{padding:'10px 0',textAlign:'right',color:'var(--muted)'}}>{(r.v/total*100).toFixed(1)}%</td>
              </tr>
              {isOpen && countries.map(c => (
                <tr key={c.name} style={{borderBottom:'1px solid var(--rule)',background:'var(--bg-2)'}}>
                  <td style={{padding:'5px 0 5px 26px',color:'var(--ink-2)',fontSize:12.5}}>{c.name}</td>
                  <td className="tnum" style={{padding:'5px 0',textAlign:'right',fontSize:12.5}}>{fmtN(c.v)}</td>
                  <td className="tnum" style={{padding:'5px 0',textAlign:'right',color:'var(--muted)',fontSize:12.5}}>
                    {(c.v / total * 100).toFixed(1)}%
                  </td>
                </tr>
              ))}
            </React.Fragment>
          );
        })}
        <tr>
          <td className="uc" style={{padding:'12px 0 0',color:'var(--muted)'}}>Total</td>
          <td className="tnum" style={{padding:'12px 0 0',textAlign:'right',color:'var(--ink)',fontWeight:500}}>{fmtN(total)}</td>
          <td className="tnum" style={{padding:'12px 0 0',textAlign:'right',color:'var(--muted)'}}>100.0%</td>
        </tr>
      </tbody>
    </table>
  );
}

// ─────────────────────────────────────────────────────────────
// Shared 6-stop choropleth palette + interpolation helpers.
// Used by both WorldMapChoropleth (dashboard Fig.08) and AtlasChoropleth
// (top-level /atlas view). Defined here in charts.jsx so it is in scope
// before atlas-view.jsx loads in the bundle.
// ─────────────────────────────────────────────────────────────
const ATLAS_PALETTE = ['#f5ecd8','#d4b86a','#b85c38','#6b4a2a','#2d4532','#1c3d2e'];

function atlasLerpHex(a, b, t) {
  const pa = parseInt(a.slice(1), 16), pb = parseInt(b.slice(1), 16);
  const ar = (pa >> 16) & 255, ag = (pa >> 8) & 255, ab = pa & 255;
  const br = (pb >> 16) & 255, bg = (pb >> 8) & 255, bb = pb & 255;
  const r = Math.round(ar + (br - ar) * t);
  const g = Math.round(ag + (bg - ag) * t);
  const bl = Math.round(ab + (bb - ab) * t);
  return `#${((r << 16) | (g << 8) | bl).toString(16).padStart(6, '0')}`;
}

function atlasPaletteColor(t) {
  const n = ATLAS_PALETTE.length - 1;
  const x = Math.max(0, Math.min(1, t)) * n;
  const i = Math.floor(x);
  if (i >= n) return ATLAS_PALETTE[n];
  return atlasLerpHex(ATLAS_PALETTE[i], ATLAS_PALETTE[i + 1], x - i);
}

// ─────────────────────────────────────────────────────────────
// Pan + zoom hook for SVG maps. Returns a live viewBox string, handlers
// to spread on the <svg>, and imperative zoomIn/zoomOut/reset actions
// (exposed via <ZoomControls/>). Dragging while zoomed pans the map;
// clicks still fall through as long as the pointer didn't move more than
// ~2 px between mousedown and mouseup (didDrag()).
// ─────────────────────────────────────────────────────────────
function useMapZoom(baseW, baseH, { maxZoom = 8 } = {}) {
  const [view, setView] = React.useState({ x: 0, y: 0, w: baseW, h: baseH });
  const drag = React.useRef(null);
  const [, bump] = React.useState(0); // re-render on drag start/end for cursor

  const scale = baseW / view.w;
  const canZoomIn = scale < maxZoom - 1e-6;
  const canZoomOut = scale > 1 + 1e-6;
  const zoomed = scale > 1 + 1e-6;

  // Keep the view inside the world rect, and enforce min / max zoom.
  const clamp = v => {
    const wMin = baseW / maxZoom;
    const w = Math.max(wMin, Math.min(baseW, v.w));
    const h = w * (baseH / baseW);
    const x = Math.max(0, Math.min(baseW - w, v.x));
    const y = Math.max(0, Math.min(baseH - h, v.y));
    return { x, y, w, h };
  };

  const zoomAt = (cx, cy, factor) => {
    setView(prev => {
      const newW = prev.w / factor;
      const newH = prev.h / factor;
      const nx = cx - (cx - prev.x) * (newW / prev.w);
      const ny = cy - (cy - prev.y) * (newH / prev.h);
      return clamp({ x: nx, y: ny, w: newW, h: newH });
    });
  };
  const zoomIn  = () => zoomAt(view.x + view.w / 2, view.y + view.h / 2, 1.5);
  const zoomOut = () => zoomAt(view.x + view.w / 2, view.y + view.h / 2, 1 / 1.5);
  const reset   = () => setView({ x: 0, y: 0, w: baseW, h: baseH });
  const flyTo   = (cx, cy) => {
    const w = baseW / 4, h = baseH / 4;
    setView(clamp({ x: cx - w / 2, y: cy - h / 2, w, h }));
  };
  // Fit the view to a bounding box (in base-SVG coords), padded by `padFrac`
  // on each side. Preferred for country zooms because it keeps the whole
  // country in view regardless of size — Russia, Canada, etc. otherwise
  // overflow a fixed 4× centroid zoom.
  const flyToBox = (bx, by, bw, bh, padFrac = 0.1) => {
    const padX = bw * padFrac, padY = bh * padFrac;
    const targetW = bw + 2 * padX;
    const targetH = bh + 2 * padY;
    // Keep the chart's aspect ratio. Whichever dimension is constraining
    // determines the zoom level.
    const aspect = baseH / baseW;
    let w = targetW, h = w * aspect;
    if (h < targetH) { h = targetH; w = h / aspect; }
    const cx = bx + bw / 2, cy = by + bh / 2;
    setView(clamp({ x: cx - w / 2, y: cy - h / 2, w, h }));
  };

  const onMouseDown = e => {
    if (e.button !== 0) return;
    const rect = e.currentTarget.getBoundingClientRect();
    drag.current = {
      sx: e.clientX, sy: e.clientY,
      vx: view.x, vy: view.y,
      rect, moved: false,
    };
    bump(n => n + 1);
  };
  const onMouseMove = e => {
    const d = drag.current;
    if (!d) return;
    const dx = (e.clientX - d.sx) / d.rect.width  * view.w;
    const dy = (e.clientY - d.sy) / d.rect.height * view.h;
    if (Math.hypot(e.clientX - d.sx, e.clientY - d.sy) > 2) d.moved = true;
    setView(prev => clamp({ ...prev, x: d.vx - dx, y: d.vy - dy }));
  };
  const stopDrag = () => { drag.current = null; bump(n => n + 1); };

  const didDrag = () => !!(drag.current && drag.current.moved);

  return {
    viewBox: `${view.x} ${view.y} ${view.w} ${view.h}`,
    svgProps: {
      onMouseDown, onMouseMove,
      onMouseUp: stopDrag, onMouseLeave: stopDrag,
      style: {
        cursor: drag.current ? 'grabbing' : (zoomed ? 'grab' : 'default'),
        touchAction: 'none',
      },
    },
    zoomIn, zoomOut, reset, flyTo, flyToBox,
    canZoomIn, canZoomOut, zoomed,
    didDrag,
  };
}

function ZoomControls({ zoom, style = {} }) {
  const btn = (label, onClick, disabled, aria) => (
    <button type="button" onClick={onClick} disabled={disabled} aria-label={aria} title={aria}
      style={{
        width: 26, height: 26, padding: 0, fontSize: 15, lineHeight: 1,
        background: disabled ? 'var(--bg-2)' : '#fff',
        color: disabled ? 'var(--muted-2)' : 'var(--ink)',
        border: '1px solid var(--rule-2)',
        cursor: disabled ? 'default' : 'pointer',
        fontFamily: 'var(--serif)',
      }}>{label}</button>
  );
  return (
    <div style={{
      position: 'absolute', top: 8, right: 8,
      display: 'flex', flexDirection: 'column', gap: 3, zIndex: 2,
      ...style,
    }}>
      {btn('+', zoom.zoomIn,  !zoom.canZoomIn,  'Zoom in')}
      {btn('\u2212', zoom.zoomOut, !zoom.canZoomOut, 'Zoom out')}
      {btn('\u21BA', zoom.reset,    !zoom.zoomed,     'Reset view')}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Country-level choropleth — each country filled by its region's shade.
// Falls back to the schematic RegionWorldMap if WORLD_MAP hasn't been
// generated (i.e. scripts/build_world_map.py hasn't been run).
// ─────────────────────────────────────────────────────────────
function WorldMapChoropleth({ data, width=720, height=380 }) {
  const worldMap = (typeof window !== 'undefined' && window.WORLD_MAP) ? window.WORLD_MAP : null;
  const zoom = useMapZoom(width, height);
  if (!worldMap) return <RegionWorldMap data={data} width={width} height={height}/>;
  const { show, hide, node } = useTooltip();
  const byRegion = Object.fromEntries(data.map(d => [d.name, d.v]));
  const total = data.reduce((s, d) => s + d.v, 0);
  const vMax = Math.max(...data.map(d => d.v), 1);
  // sqrt compresses the long tail so mid-range regions reach the middle stops
  // of the palette instead of all collapsing into the lightest band.
  const fillFor = v => {
    if (!(v > 0)) return ATLAS_PALETTE[0];
    return atlasPaletteColor(Math.sqrt(v / vMax));
  };
  return (
    <figure className="chart-wrap" style={{position:'relative',margin:0}}>
      <svg width="100%" height={height} viewBox={zoom.viewBox} {...zoom.svgProps}
        style={{display:'block', ...zoom.svgProps.style}}>
        <rect x={0} y={0} width={width} height={height} fill="var(--bg-2)"/>
        <g>
          {worldMap.map((c, i) => {
            const regionTotal = byRegion[c.region] ?? 0;
            const pct = total ? (regionTotal/total*100) : 0;
            // Natural Earth uses '-99' for disputed / unrecognised territories, so
            // ISO alone isn't unique. Compose with name + index for a stable key.
            return (
              <path key={`${c.iso || ''}-${c.name}-${i}`} d={c.d}
                fill={fillFor(regionTotal)}
                stroke="var(--rule-2)" strokeWidth={0.4}
                onMouseMove={e => show(e, <span><b>{c.name}</b> · {c.region}{c.region !== 'Other / Unclassified' ? <> · region total <span className="tnum">{fmtN(regionTotal)}</span> · {pct.toFixed(1)}%</> : null}</span>)}
                onMouseLeave={hide}/>
            );
          })}
        </g>
        {/* Corner badge for Other / Unclassified, kept from the schematic version.
            Rendered in world coords so it follows the pan/zoom, but is kept inside
            the overall world rect so it stays visible until the user zooms past it. */}
        {byRegion['Other / Unclassified'] !== undefined && (
          <g onMouseMove={e => show(e, <span><b>Other / Unclassified</b> · <span className="tnum">{fmtN(byRegion['Other / Unclassified'])}</span> · Stateless, refugee, unknown</span>)} onMouseLeave={hide} style={{cursor:'crosshair'}}>
            <rect x={width-130} y={height-46} width={120} height={34} rx={6}
              fill={fillFor(byRegion['Other / Unclassified'])}
              stroke="var(--rule-2)" strokeWidth={0.75}/>
            <text x={width-70} y={height-25} textAnchor="middle" fontSize="10.5" fontFamily="var(--serif)" fill="var(--ink)" style={{pointerEvents:'none'}}>Other / Unclassified</text>
          </g>
        )}
      </svg>
      <ZoomControls zoom={zoom}/>
      {node}
    </figure>
  );
}

// ─────────────────────────────────────────────────────────────
// Sankey chart — N-column left-to-right flow
// nodes: [{id, label, col (0..N-1), value, color, mocked?}]
// links: [{source, target, value, dashed?}]  (source.col must be < target.col)
// ─────────────────────────────────────────────────────────────
function SankeyChart({ nodes, links, width = 820, height = 500 }) {
  const { show, hide, node: ttNode } = useTooltip();
  // Two-tier focus state: hovering a node *previews* the highlight;
  // clicking pins it so the user can study a single cohort without
  // having to keep the pointer still. Clicking the pinned node (or
  // the background) clears the pin.
  const [hoverId, setHoverId] = React.useState(null);
  const [pinnedId, setPinnedId] = React.useState(null);
  const activeId = hoverId ?? pinnedId;
  // A link "belongs to" a node when that node is either its source or target.
  // When there's no active node every link is emphasised equally.
  const isLinkActive = (lk) => !activeId || lk.source === activeId || lk.target === activeId;
  const isNodeActive = (n)  => !activeId || n.id === activeId
      || links.some(lk => (lk.source === activeId && lk.target === n.id)
                       || (lk.target === activeId && lk.source === n.id));

  const NODE_W = 20;
  const GAP    = 8;
  const PAD    = { l: 150, r: 200, t: 12, b: 12 };

  const cols = Array.from(new Set(nodes.map(n => n.col))).sort((a, b) => a - b);
  const maxCol = cols[cols.length - 1] ?? 0;
  const colNodes = Object.fromEntries(cols.map(c => [c, nodes.filter(n => n.col === c)]));
  const colTotals = Object.fromEntries(cols.map(c => [c, colNodes[c].reduce((s, n) => s + n.value, 0)]));
  const totalVal = colTotals[0] ?? Math.max(...Object.values(colTotals), 1);
  const innerH  = height - PAD.t - PAD.b;

  const xForCol = (c) => {
    if (maxCol === 0) return PAD.l;
    const span = width - PAD.l - PAD.r - NODE_W;
    return PAD.l + (c / maxCol) * span;
  };

  // Compute pixel y and h for every node (scale so the biggest column fills innerH).
  const layout = {};
  for (const c of cols) {
    const ns = colNodes[c];
    const denom = colTotals[c] || totalVal;
    const avail = innerH - GAP * Math.max(0, ns.length - 1);
    let y = PAD.t;
    for (const n of ns) {
      const h = Math.max(2, (n.value / denom) * avail);
      layout[n.id] = { x: xForCol(c), y, h };
      y += h + GAP;
    }
  }

  // Advancing cursors so each link picks up where the last left off
  const srcY = Object.fromEntries(nodes.map(n => [n.id, layout[n.id]?.y ?? 0]));
  const tgtY = Object.fromEntries(nodes.map(n => [n.id, layout[n.id]?.y ?? 0]));

  const renderedLinks = links.map(lk => {
    const sn = nodes.find(n => n.id === lk.source);
    const tn = nodes.find(n => n.id === lk.target);
    const sl = layout[lk.source], tl = layout[lk.target];
    if (!sl || !tl || !sn || !tn || !sn.value || !tn.value || lk.value <= 0) return null;

    const lhS = (lk.value / sn.value) * sl.h;
    const lhT = (lk.value / tn.value) * tl.h;
    const x0 = sl.x + NODE_W, sy = srcY[lk.source];
    const x1 = tl.x,          ty = tgtY[lk.target];
    const mx = (x0 + x1) / 2;

    srcY[lk.source] += lhS;
    tgtY[lk.target] += lhT;

    const d = [
      `M ${x0} ${sy}`,
      `C ${mx} ${sy}, ${mx} ${ty}, ${x1} ${ty}`,
      `L ${x1} ${ty + lhT}`,
      `C ${mx} ${ty + lhT}, ${mx} ${sy + lhS}, ${x0} ${sy + lhS}`,
      'Z',
    ].join(' ');

    const pct = ((lk.value / (colTotals[sn.col] || totalVal)) * 100).toFixed(1);
    const tt  = <span><b>{sn.label}</b> → <b>{tn.label}</b>: <span className="tnum">{fmtN(lk.value)}</span> ({pct}%)</span>;
    return { d, color: sn.color, tt, key: `${lk.source}→${lk.target}`, dashed: lk.dashed || sn.mocked || tn.mocked };
  }).filter(Boolean);

  return (
    <figure className="chart-wrap" style={{ position: 'relative', margin: 0 }}>
      <svg width="100%" viewBox={`0 0 ${width} ${height}`} style={{ overflow: 'visible' }}
           onClick={() => setPinnedId(null)}>
        {/* Hatch pattern applied to any node or link whose figure is
            modelled (estimated) rather than measured. Kept as a single
            defs block so all dashed segments share a visual idiom. */}
        <defs>
          <pattern id="sankeyHatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
            <rect width="6" height="6" fill="transparent"/>
            <line x1="0" y1="0" x2="0" y2="6" stroke="currentColor" strokeWidth="2" strokeOpacity="0.55"/>
          </pattern>
        </defs>
        {renderedLinks.map(lk => {
          const active = isLinkActive(lk);
          const base = lk.dashed ? 0.18 : 0.35;
          return (
            <g key={lk.key} style={{ color: lk.color }}>
              <path d={lk.d}
                fill={lk.color} fillOpacity={active ? base : 0.06}
                onMouseMove={e => show(e, lk.tt)} onMouseLeave={hide}
                style={{ cursor: 'default', transition: 'fill-opacity .12s' }}/>
              {lk.dashed ? (
                <path d={lk.d} fill="url(#sankeyHatch)" fillOpacity={active ? 0.9 : 0.2}
                  style={{ pointerEvents: 'none' }}/>
              ) : null}
            </g>
          );
        })}
        {nodes.map(n => {
          const nl = layout[n.id];
          if (!nl) return null;
          const denom = colTotals[n.col] || totalVal;
          const pct  = ((n.value / denom) * 100).toFixed(1);
          const tt   = <span><b>{n.label}</b>: <span className="tnum">{fmtN(n.value)}</span> ({pct}%){n.mocked ? ' · placeholder' : ''}</span>;
          const isLeftmost = n.col === 0;
          const active = isNodeActive(n);
          const isPinned = pinnedId === n.id;
          return (
            <g key={n.id}
              onMouseEnter={() => setHoverId(n.id)}
              onMouseLeave={() => { setHoverId(null); hide(); }}
              onMouseMove={e => show(e, tt)}
              onClick={e => { e.stopPropagation(); setPinnedId(isPinned ? null : n.id); }}
              style={{ cursor: 'pointer', opacity: active ? 1 : 0.35, transition: 'opacity .12s' }}>
              <rect x={nl.x} y={nl.y} width={NODE_W} height={nl.h}
                fill={n.color}
                fillOpacity={n.mocked ? 0.55 : 1}
                stroke={isPinned ? 'var(--accent)' : (n.mocked ? n.color : 'none')}
                strokeDasharray={n.mocked && !isPinned ? '3 2' : undefined}
                strokeWidth={isPinned ? 2 : (n.mocked ? 1 : 0)}
                rx={2}/>
              {isLeftmost ? (
                <text x={nl.x - 8} y={nl.y + nl.h / 2}
                  textAnchor="end" dominantBaseline="middle"
                  fontSize={11} fontFamily="var(--serif)" fill="var(--ink-2)">
                  {n.label}{n.mocked ? ' *' : ''}
                </text>
              ) : (
                <text x={nl.x + NODE_W + 8} y={nl.y + nl.h / 2 - 7}
                  textAnchor="start" fontSize={11} fontFamily="var(--serif)" fill="var(--ink-2)">
                  <tspan>{n.label}{n.mocked ? ' *' : ''}</tspan>
                  <tspan x={nl.x + NODE_W + 8} dy={14} fontSize={10} fill="var(--muted)">{fmtN(n.value)} · {pct}%</tspan>
                </text>
              )}
            </g>
          );
        })}
      </svg>
      {ttNode}
    </figure>
  );
}

// ─────────────────────────────────────────────────────────────
// Cohort outcome ribbon (B5). Small-multiples — one panel per
// cohort year. Each panel shows a horizontal ribbon of six
// buckets (protection / otherLeave / refusals / withdrawals /
// admin / notYet) for both Initial and Latest outcomes, sharing
// an x-axis anchored at 0–claims so panel widths are comparable.
//
// `data` shape: array of
//   { year, claims, initial:{...}, latest:{...}, returns:{...} }
// aggregated across nationalities before passing in.
// ─────────────────────────────────────────────────────────────
const COHORT_BUCKETS = ['protection','otherLeave','refusals','withdrawals','admin','notYet'];
const COHORT_COLORS = {
  protection:  'var(--accent-2)',
  otherLeave:  'var(--accent-gold)',
  refusals:    'var(--accent-warn)',
  withdrawals: 'var(--muted-2)',
  admin:       'var(--muted)',
  notYet:      'var(--bg-3)',
};
const COHORT_LABELS = {
  protection:  'Protection',
  otherLeave:  'Other leave',
  refusals:    'Refused',
  withdrawals: 'Withdrawn',
  admin:       'Admin',
  notYet:      'Pending',
};

function CohortRibbon({ data, width=720, cols=4, rowHeight=72, gap=16, highlightYear=null, annotations=[] }) {
  if (!Array.isArray(data) || data.length === 0) {
    return (
      <figure className="chart-wrap" style={{margin:0,padding:'32px 24px',background:'var(--bg-2)',borderLeft:'2px solid var(--accent)',color:'var(--muted)',fontFamily:'var(--serif)'}}>
        <div style={{fontSize:13,lineHeight:1.5}}>
          <b style={{color:'var(--ink-2)'}}>Cohort ribbon · pending data.</b> This chart reads from
          <code style={{margin:'0 4px',fontFamily:'var(--mono)',fontSize:12}}>OUTCOME_COHORT_ANNUAL</code>,
          which will populate once the outcome-analysis xlsx (ASY_D04) is ingested.
          See <code style={{fontFamily:'var(--mono)',fontSize:12}}>scripts/build_outcome_analysis.py</code>.
        </div>
      </figure>
    );
  }
  const { show, hide, node: ttNode } = useTooltip();
  const rows = Math.ceil(data.length / cols);
  const cellW = (width - gap*(cols-1)) / cols;
  const ribbonH = 14;
  // Extra bottom padding so annotations drawn beneath ribbons don't clip
  // into the next cohort row.
  const extraBelow = 22;
  const height = rows * (rowHeight + gap) + extraBelow;
  // Quick lookup: annotations keyed as `${year}|${phase}`.
  const annByKey = {};
  (annotations || []).forEach(a => {
    if (a && a.year != null) annByKey[a.year + '|' + (a.phase || 'latest')] = a.text;
  });
  const stack = (row, phase) => {
    let x = 0;
    const total = row.claims || 1;
    return COHORT_BUCKETS.map(b => {
      const v = row[phase][b] || 0;
      const w = (v/total) * cellW;
      const seg = { b, v, x, w };
      x += w;
      return seg;
    });
  };
  return (
    <figure className="chart-wrap" style={{position:'relative',margin:0}}>
      <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} style={{display:'block',overflow:'visible'}}>
        {data.map((row, i) => {
          const r = Math.floor(i/cols), c = i%cols;
          const x0 = c*(cellW+gap), y0 = r*(rowHeight+gap);
          const isHL = highlightYear != null && row.year === highlightYear;
          const hasAnyHL = highlightYear != null;
          // Dim non-highlighted cohorts when a highlight is active so the
          // pre-selected cohort reads as the focus of the panel.
          const groupOpacity = !hasAnyHL ? 1 : (isHL ? 1 : 0.45);
          return (
            <g key={row.year} transform={`translate(${x0},${y0})`} style={{opacity: groupOpacity, transition: 'opacity 220ms ease'}}>
              {isHL && (
                <rect x={-6} y={-6} width={cellW+12} height={rowHeight+6}
                      fill="none" stroke="var(--accent)" strokeWidth={1.25}
                      style={{pointerEvents:'none'}}/>
              )}
              <text x={0} y={12} fontSize={12} fontWeight={isHL ? 700 : 600} fill="var(--ink)" style={{fontFamily:'var(--serif)'}}>Cohort {row.year}{isHL ? ' · highlighted' : ''}</text>
              <text x={cellW} y={12} textAnchor="end" fontSize={11} fill="var(--muted)" style={{fontVariantNumeric:'tabular-nums',fontFamily:'var(--serif)'}}>{fmtN(row.claims)} claims</text>
              {['initial','latest'].map((phase, pi) => (
                <g key={phase} transform={`translate(0, ${20 + pi*(ribbonH+8)})`}>
                  <text x={-4} y={ribbonH-3} textAnchor="end" fontSize={10} fill="var(--muted)" style={{fontFamily:'var(--serif)'}}>{phase === 'initial' ? 'At first decision' : 'Latest'}</text>
                  {stack(row, phase).map(seg => (
                    <rect key={seg.b} x={seg.x} y={0} width={Math.max(0, seg.w-0.5)} height={ribbonH}
                      fill={COHORT_COLORS[seg.b]}
                      onMouseMove={e=>show(e, <span><b>Cohort {row.year}</b> · {phase} · {COHORT_LABELS[seg.b]} <span className="tnum">{fmtN(seg.v)}</span></span>)}
                      onMouseLeave={hide}
                      style={{cursor:'crosshair'}}/>
                  ))}
                  {annByKey[row.year + '|' + phase] && (
                    <text x={cellW} y={ribbonH+12} textAnchor="end" fontSize={10} fill="var(--accent)"
                          style={{fontFamily:'var(--serif)',fontStyle:'italic'}}>
                      {annByKey[row.year + '|' + phase]}
                    </text>
                  )}
                </g>
              ))}
            </g>
          );
        })}
      </svg>
      <figcaption style={{marginTop:12,fontSize:12,color:'var(--muted)',display:'flex',flexWrap:'wrap',gap:14}}>
        {COHORT_BUCKETS.map(b => (
          <span key={b} style={{display:'inline-flex',alignItems:'center',gap:6}}>
            <span style={{width:11,height:11,background:COHORT_COLORS[b],display:'inline-block',borderRadius:2}}/>
            {COHORT_LABELS[b]}
          </span>
        ))}
      </figcaption>
      {ttNode}
    </figure>
  );
}

// ─────────────────────────────────────────────────────────────
// Annual backlog waterfall (B4). Per year: inflow (new claims),
// outflow (decided this year), residual (still pending at year
// end, carried forward to next year).
//
// `data` shape: [{year, inflow, decided, pending}], sorted by year.
// Bars are drawn relative to the running pending stock.
// ─────────────────────────────────────────────────────────────
function BacklogWaterfall({ data, width=820, height=320 }) {
  if (!Array.isArray(data) || data.length === 0) {
    return (
      <figure className="chart-wrap" style={{margin:0,padding:'24px',background:'var(--bg-2)',borderLeft:'2px solid var(--accent)',color:'var(--muted)',fontFamily:'var(--serif)',fontSize:13}}>
        <b style={{color:'var(--ink-2)'}}>Backlog waterfall · pending data.</b>
        {' '}Needs annual inflow from ASYLUM_ANNUAL and outflow/residual from OUTCOME_COHORT_ANNUAL. Quarterly version deferred (see plan).
      </figure>
    );
  }
  const { show, hide, node: ttNode } = useTooltip();
  const pad = { t: 16, r: 24, b: 36, l: 56 };
  const iw = width - pad.l - pad.r, ih = height - pad.t - pad.b;
  const stocks = data.map(d => d.pending || 0);
  const yMax = Math.max(...stocks, 1) * 1.1;
  const bw = Math.max(12, (iw / data.length) * 0.55);
  const xC = i => pad.l + ((i + 0.5) / data.length) * iw;
  const yPx = v => pad.t + (1 - v / yMax) * ih;
  return (
    <figure className="chart-wrap" style={{position:'relative',margin:0}}>
      <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} style={{display:'block',overflow:'visible'}}>
        <line x1={pad.l} x2={width-pad.r} y1={height-pad.b} y2={height-pad.b} stroke="var(--rule-2)"/>
        {data.map((d, i) => {
          const prev = i > 0 ? (data[i-1].pending || 0) : 0;
          const curr = d.pending || 0;
          const rise = Math.max(0, curr - prev);
          const fall = Math.max(0, prev - curr);
          const cx = xC(i);
          // Three visual segments: prev-level bar, rise (red/up), fall (green/down).
          const yPrev = yPx(prev), yCurr = yPx(curr);
          return (
            <g key={d.year}
               onMouseMove={e=>show(e, <span><b>{d.year}</b> · in <span className="tnum">{fmtN(d.inflow||0)}</span> · out <span className="tnum">{fmtN(d.decided||0)}</span> · pending <span className="tnum">{fmtN(curr)}</span></span>)}
               onMouseLeave={hide}
               style={{cursor:'crosshair'}}>
              {/* Base */}
              <rect x={cx - bw/2} y={yPx(Math.min(prev, curr))}
                width={bw} height={Math.max(0, height - pad.b - yPx(Math.min(prev, curr)))}
                fill="var(--bg-3)"/>
              {/* Rise / fall */}
              {rise > 0 && (
                <rect x={cx - bw/2} y={yCurr} width={bw} height={yPrev - yCurr} fill="var(--accent-warn)" opacity={0.85}/>
              )}
              {fall > 0 && (
                <rect x={cx - bw/2} y={yPrev} width={bw} height={yCurr - yPrev} fill="var(--accent-2)" opacity={0.85}/>
              )}
              <text x={cx} y={height-pad.b+18} textAnchor="middle" fontSize={11} fill="var(--muted)" style={{fontVariantNumeric:'tabular-nums',fontFamily:'var(--serif)'}}>{d.year}</text>
              <text x={cx} y={yCurr - 6} textAnchor="middle" fontSize={10.5} fill="var(--ink-2)" style={{fontVariantNumeric:'tabular-nums',fontFamily:'var(--serif)'}}>{fmtK(curr)}</text>
            </g>
          );
        })}
      </svg>
      <figcaption style={{marginTop:8,fontSize:12,color:'var(--muted)',display:'flex',gap:16}}>
        <span style={{display:'inline-flex',alignItems:'center',gap:6}}>
          <span style={{width:11,height:11,background:'var(--accent-warn)',display:'inline-block',borderRadius:2}}/> Pending rose</span>
        <span style={{display:'inline-flex',alignItems:'center',gap:6}}>
          <span style={{width:11,height:11,background:'var(--accent-2)',display:'inline-block',borderRadius:2}}/> Pending fell</span>
      </figcaption>
      {ttNode}
    </figure>
  );
}

// ─────────────────────────────────────────────────────────────
// Masthead — thin dated stripe above the main header nav.
// Shows: Vol (years-since-launch) · Issue (ISO week of latest data point)
// · "data through <date>" (latest live data point across all feeds).
// ─────────────────────────────────────────────────────────────
function latestDataThrough() {
  const w = (typeof window !== 'undefined') ? window : {};
  const candidates = [
    w.BOATS_META?.latestDataPoint,
    w.BOATS_PROVISIONAL_META?.latestDate || w.BOATS_PROVISIONAL_META?.updatedAt,
    w.NAT_FULL_META?.generatedAt,
    w.DECISIONS_META?.generatedAt,
    w.BACKLOG_META?.latest_date || w.BACKLOG_META?.generatedAt,
    w.HOTELS_META?.generatedAt,
    w.SUPPORT_REGIONS_META?.date || w.SUPPORT_REGIONS_META?.generatedAt,
  ].filter(Boolean).map(s => ({s, d: new Date(s)})).filter(x => !isNaN(x.d));
  if (!candidates.length) return null;
  return candidates.reduce((a,b) => a.d > b.d ? a : b);
}
function fmtMasthead(d) {
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${String(d.getUTCDate()).padStart(2,'0')} ${MONTHS[d.getUTCMonth()]} ${d.getUTCFullYear()}`;
}
function isoWeek(d) {
  const t = new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate()));
  t.setUTCDate(t.getUTCDate() + 4 - (t.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(t.getUTCFullYear(), 0, 1));
  return Math.ceil((((t - yearStart) / 86400000) + 1) / 7);
}
function Masthead() {
  const latest = latestDataThrough();
  if (!latest) return null;
  const d = latest.d;
  const vol = Math.max(1, d.getUTCFullYear() - 2025); // Vol I = 2026
  const wk = isoWeek(d);
  const toRoman = n => ['','I','II','III','IV','V','VI','VII','VIII','IX','X'][n] || String(n);
  return (
    <div style={{borderBottom:'1px solid var(--rule)',background:'var(--bg-2)'}}>
      <div style={{maxWidth:1240,margin:'0 auto',padding:'4px 48px',display:'flex',justifyContent:'space-between',alignItems:'center',gap:16}}>
        <span className="uc" style={{color:'var(--muted)'}}>Vol {toRoman(vol)} · Issue {wk}</span>
        <span className="uc" style={{color:'var(--muted)'}}>Data through {fmtMasthead(d)}</span>
      </div>
    </div>
  );
}

          <p style={{margin:'0 0 16px'}}>Two views of the same source: <em>Immigration system statistics — asylum claims dataset</em> (sheets <span style={{fontFamily:'var(--mono)',fontSize:12.5}}>Data_Asy_D01</span> for applications and <span style={{fontFamily:'var(--mono)',fontSize:12.5}}>Data_Asy_D02</span> for decisions). The full nationalities table shows every reported nationality for the latest calendar year with all four quarters published. The quarterly panel shows the top 20 nationalities across the most recent eight quarters. Grant rate is <em>(Grant of Protection + Grant of Other Leave) ÷ total decisions</em> for the same year. <a href="https://www.gov.uk/government/statistical-data-sets/immigration-system-statistics-data-tables" style={{color:'var(--accent)',borderBottom:'1px solid var(--accent)'}}>gov.uk data tables</a>. Home Office · Open Government Licence v3.0.</p>

          <h3 style={{fontFamily:'var(--serif)',fontSize:14,textTransform:'uppercase',letterSpacing:0.08,margin:'28px 0 8px',color:'var(--accent)'}}>Resettlement schemes</h3>
          <p style={{margin:'0 0 10px'}}>Persons resettled under each UK scheme for the most recent three complete calendar years. Source: <em>resettlement scheme datasets</em> xlsx, sheet <span style={{fontFamily:'var(--mono)',fontSize:12.5}}>Data_Res_D02</span>.</p>
          <ul style={{margin:'0 0 10px 18px',padding:0,fontSize:14.5,lineHeight:1.55}}>
            <li><strong>ACRS</strong> — Afghan Citizens Resettlement Scheme (Pathways 1 + 2 + 3 summed).</li>
            <li><strong>ARAP</strong> — Afghan Relocations and Assistance Policy, including ARR legacy cases.</li>
            <li><strong>UKRS</strong> — UK Resettlement Scheme.</li>
            <li><strong>Community Sponsorship</strong> — cross-scheme flag, broken out as its own bucket regardless of the base scheme.</li>
            <li><strong>Mandate Scheme</strong> — small continuing programme for recognised refugees with close UK family.</li>
          </ul>
          <p style={{margin:'0 0 16px',fontSize:13.5,color:'var(--muted)'}}>The <em>Ukraine Family Scheme</em> and <em>Homes for Ukraine</em> are tracked in a separate publication and are <strong>not</strong> included here. <a href="https://www.gov.uk/government/statistical-data-sets/immigration-system-statistics-data-tables" style={{color:'var(--accent)',borderBottom:'1px solid var(--accent)'}}>gov.uk data tables</a>. Home Office · Open Government Licence v3.0.</p>

          <h3 style={{fontFamily:'var(--serif)',fontSize:14,textTransform:'uppercase',letterSpacing:0.08,margin:'28px 0 8px',color:'var(--accent)'}}>Asylum accommodation</h3>
          <p style={{margin:'0 0 16px'}}>&quot;Persons in hotels&quot; counts rows where <span style={{fontFamily:'var(--mono)',fontSize:12.5}}>Accommodation Type = &quot;Contingency Accommodation — Hotel&quot;</span>. This is a <em>snapshot</em>, not a period total: the figure is who was in hotel accommodation on that date, published quarterly (end of March, June, September and December). Source: <em>asylum seekers — receipt of support datasets</em> xlsx, sheet <span style={{fontFamily:'var(--mono)',fontSize:12.5}}>Data_Asy_D09</span>. <a href="https://www.gov.uk/government/statistical-data-sets/immigration-system-statistics-data-tables" style={{color:'var(--accent)',borderBottom:'1px solid var(--accent)'}}>gov.uk data tables</a>. Home Office · Open Government Licence v3.0.</p>

          <h3 style={{fontFamily:'var(--serif)',fontSize:14,textTransform:'uppercase',letterSpacing:0.08,margin:'28px 0 8px',color:'var(--accent)'}}>Pending cases (backlog)</h3>
          <p style={{margin:'0 0 16px'}}>The backlog figure counts asylum applications awaiting an initial decision at the 31 December snapshot for each year. The Home Office set a target of deciding applications within six months of receipt. Applications lodged before 28 June 2022 are often termed the <em>legacy backlog</em> — they were processed under a separate Streamlined Asylum Processing stream introduced in 2022. The published total combines legacy and non-legacy cases and includes applicants awaiting an appeal as well as those not yet seen.</p>

          <h3 style={{fontFamily:'var(--serif)',fontSize:14,textTransform:'uppercase',letterSpacing:0.08,margin:'28px 0 8px',color:'var(--accent)'}}>Humanitarian protection</h3>
          <p style={{margin:'0 0 16px'}}>Humanitarian protection (HP) is a form of leave granted when an applicant does not meet the legal definition of a refugee under the 1951 Refugee Convention but faces a real risk of serious harm on return. HP normally carries five years' leave to remain and broadly the same public-fund access as refugee status. On this site, HP grants are counted together with refugee-status grants when calculating the overall grant rate, following Home Office practice. The two outcomes are shown separately in the decisions breakdown chart.</p>

          <h3 style={{fontFamily:'var(--serif)',fontSize:14,textTransform:'uppercase',letterSpacing:0.08,margin:'28px 0 8px',color:'var(--accent)'}}>Appeals</h3>
          <p style={{margin:'0 0 16px'}}>When the Home Office refuses an asylum claim at the initial stage, the applicant may appeal to the First-tier Tribunal (Immigration and Asylum Chamber). The Tribunal independently reviews the decision and either allows the appeal (overturning the refusal) or dismisses it. In 2024 approximately 36% of substantive appeals heard were allowed. Allowed appeals are not double-counted with initial grant decisions — they represent a separate downstream outcome for cases that were first refused.</p>

          <h3 style={{fontFamily:'var(--serif)',fontSize:14,textTransform:'uppercase',letterSpacing:0.08,margin:'28px 0 8px',color:'var(--accent)'}}>Updates and revisions</h3>
          <p style={{margin:'0 0 16px'}}>Historic figures are occasionally revised by the Home Office when new returns are received or coding errors are corrected. We reflect the latest published revision and do not freeze snapshots. See the <span style={{borderBottom:'1px solid var(--accent)',color:'var(--accent)'}}>revision log</span> for a full history.</p>

          <div style={{marginTop:32,padding:'16px 20px',background:'var(--bg-2)',borderLeft:'2px solid var(--accent)'}}>
            <div className="uc" style={{color:'var(--accent)',marginBottom:6}}>Contact</div>
            <div style={{fontSize:14}}>Questions, corrections, data requests: <span style={{borderBottom:'1px solid currentColor'}}>data@example.gov.uk</span></div>
          </div>
        </div>
      </aside>
    </>
  );
}

// Back-to-top — fixed bottom-right button, appears after scrolling
// past ~600px. Mounted only on the long pages (Dashboard, Atlas)
// by root.jsx so it doesn't clutter shorter views.
// ─────────────────────────────────────────────────────────────
function BackToTop() {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const onScroll = () => setVisible(window.scrollY > 600);
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  if (!visible) return null;
  return (
    <button
      aria-label="Back to top"
      onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
      style={{
        position:'fixed', right:24, bottom:24, zIndex:80,
        width:44, height:44, borderRadius:'50%',
        border:'1px solid var(--rule)', background:'var(--bg)',
        color:'var(--ink)', cursor:'pointer',
        boxShadow:'0 6px 18px rgba(0,0,0,0.12)',
        display:'flex', alignItems:'center', justifyContent:'center',
        fontFamily:'var(--serif)', fontSize:18, lineHeight:1,
      }}>
      <span aria-hidden="true" style={{display:'inline-block',transform:'translateY(-1px)'}}>↑</span>
    </button>
  );
}

// dashboard-view.jsx — synchronised dashboard with pride-of-place KPIs + charts + tables

const { useState: uSD, useMemo: uMD, useRef: uRD, useEffect: uED } = React;

// Parse a "2018-2025" style token from the location hash so a shared
// URL reopens the dashboard pinned to the same range. Falls back to
// localStorage so the range is stable across plain reloads too.
function readInitialRange(min, max) {
  try {
    const fromHash = /[#&]r=(\d{4})-(\d{4})/.exec(typeof location !== 'undefined' ? location.hash : '');
    if (fromHash) {
      const a = Math.max(min, Math.min(max, +fromHash[1]));
      const b = Math.max(min, Math.min(max, +fromHash[2]));
      if (a <= b) return [a, b];
    }
    const stored = typeof localStorage !== 'undefined' ? localStorage.getItem('dashRange') : null;
    if (stored) {
      const [a, b] = stored.split('-').map(Number);
      if (Number.isFinite(a) && Number.isFinite(b) && a <= b) {
        return [Math.max(min, Math.min(max, a)), Math.max(min, Math.min(max, b))];
      }
    }
  } catch (_) { /* ignore */ }
  return [2018, max];
}

// Pull a freshness date off a *_META global — prefers the upstream publication
// date ("latestDataPoint", "asOf") over the pipeline's own generation stamp.
// Returned value is the raw string; SourceStrip formats it for display.
function metaAsOf(meta) {
  if (!meta) return null;
  return meta.latest_date || meta.latestDataPoint || meta.asOf || meta.generatedAt || null;
}
function metaNext(meta) {
  if (!meta) return null;
  return meta.nextUpdate || null;
}

function DashboardView({ setRoute }) {
  const [range, setRange] = uSD(() => readInitialRange(2014, DATA_MAX_YEAR));
  const [focus, setFocus] = uSD('all'); // all | applications | decisions | geography

  // Cache per-source freshness once per render — one lookup per *_META.
  const _boatsMeta = typeof BOATS_META !== 'undefined' ? BOATS_META : null;
  const _natMeta   = typeof NAT_FULL_META !== 'undefined' ? NAT_FULL_META : null;
  const _decMeta   = typeof DECISIONS_META !== 'undefined' ? DECISIONS_META : null;
  const _blgMeta   = typeof BACKLOG_META !== 'undefined' ? BACKLOG_META : null;
  const _grantMeta = typeof NAT_GRANT_ANNUAL !== 'undefined' && NAT_GRANT_ANNUAL?._meta ? NAT_GRANT_ANNUAL._meta : null;
  const srcAsOf = {
    SB_01: metaAsOf(_boatsMeta),  SB_01_next: metaNext(_boatsMeta),
    SB_02: _boatsMeta ? metaAsOf(_boatsMeta) : null, SB_02_next: metaNext(_boatsMeta),
    ASY_D01: metaAsOf(_natMeta),  ASY_D01_next: metaNext(_natMeta),
    ASY_D02: metaAsOf(_decMeta ?? _natMeta), ASY_D02_next: metaNext(_decMeta ?? _natMeta),
    ASY_D03: metaAsOf(_blgMeta),  ASY_D03_next: metaNext(_blgMeta),
    GRANT: metaAsOf(_grantMeta ?? _natMeta), GRANT_next: metaNext(_grantMeta ?? _natMeta),
  };

  // Persist range to both localStorage and the URL hash so a link carries it.
  uED(() => {
    try {
      const val = `${range[0]}-${range[1]}`;
      localStorage.setItem('dashRange', val);
      if (typeof location !== 'undefined') {
        const other = location.hash.replace(/([#&])r=\d{4}-\d{4}/g, '$1').replace(/^#&/, '#').replace(/&&/g, '&');
        const sep = other && other !== '#' ? (other.endsWith('#') ? '' : '&') : '#';
        const next = (other && other !== '#' ? other : '') + sep + `r=${val}`;
        if (next !== location.hash) history.replaceState(null, '', next);
      }
    } catch (_) { /* ignore */ }
  }, [range]);

  const filteredAnnual = uMD(()=>ASYLUM_ANNUAL.filter(d => d.y >= range[0] && d.y <= range[1]), [range]);
  const latest = ASYLUM_ANNUAL[ASYLUM_ANNUAL.length - 1];
  const prev = ASYLUM_ANNUAL[ASYLUM_ANNUAL.length - 2];
  // Range-aware headline values — cards track the selected window, not just the overall latest year.
  const rangeLatest = filteredAnnual.length ? filteredAnnual[filteredAnnual.length - 1] : latest;
  const rangePrev   = filteredAnnual.length > 1 ? filteredAnnual[filteredAnnual.length - 2] : null;
  const pctChange   = (rangePrev && rangePrev.v > 0) ? ((rangeLatest.v - rangePrev.v) / rangePrev.v * 100).toFixed(1) : null;
  const backlogData = (typeof BACKLOG_LATEST !== 'undefined' && BACKLOG_LATEST.length) ? BACKLOG_LATEST : [];
  const backlogMeta = typeof BACKLOG_META !== 'undefined' ? BACKLOG_META : null;
  const filteredBacklog = uMD(()=>backlogData.filter(d => d.y >= range[0] && d.y <= range[1]), [range, backlogData]);
  const backlogRangeLatest = filteredBacklog.length ? filteredBacklog[filteredBacklog.length - 1] : null;
  const backlogRangePrev   = filteredBacklog.length > 1 ? filteredBacklog[filteredBacklog.length - 2] : null;
  const backlogDelta = (backlogRangeLatest && backlogRangePrev && backlogRangePrev.v > 0)
    ? ((backlogRangeLatest.v - backlogRangePrev.v) / backlogRangePrev.v * 100).toFixed(1) : null;
  const filteredBoats = uMD(() => {
    const all = typeof BOATS_ANNUAL !== 'undefined' ? BOATS_ANNUAL : [];
    return all.filter(d => d.y >= range[0] && d.y <= range[1]);
  }, [range]);
  const boatsRangeLatest = filteredBoats.length ? filteredBoats[filteredBoats.length - 1] : null;
  const boatsRangePrev   = filteredBoats.length > 1 ? filteredBoats[filteredBoats.length - 2] : null;
  const boatsPct = (boatsRangeLatest && boatsRangePrev && boatsRangePrev.m > 0)
    ? ((boatsRangeLatest.m - boatsRangePrev.m) / boatsRangePrev.m * 100).toFixed(1) : null;
  // Use pipeline-generated DECISIONS_LATEST when available; fall back to legacy DECISIONS_2024.
  const decisionsData = (typeof DECISIONS_LATEST !== 'undefined' && DECISIONS_LATEST.length)
    ? DECISIONS_LATEST : DECISIONS_2024;
  const decisionsYear = (typeof DECISIONS_META !== 'undefined') ? DECISIONS_META.year : 2024;
  const decisionsTotal = decisionsData.reduce((s,d)=>s+d.v,0);
  const grantRate = (decisionsData[0].v + decisionsData[1].v) / decisionsTotal;

  // Preventions + interceptions (BOATS_WEEKLY.p / .e) — null before first reported week.
  const boatsWeekly = typeof BOATS_WEEKLY !== 'undefined' ? BOATS_WEEKLY : [];
  const preventionsYear = String(rangeLatest?.y ?? latest.y);
  const preventionsYearTotal = boatsWeekly
    .filter(w => w.we?.startsWith(preventionsYear) && w.p != null)
    .reduce((s,w) => s + w.p, 0);
  const preventionsFirstWeek = boatsWeekly.find(w => w.p != null)?.we ?? null;
  const _fmtMonth = (ym) => {
    if (!ym || ym.length < 7) return ym ?? '';
    const [y, m] = ym.split('-');
    const mn = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][(+m)-1] || m;
    return `${mn} ${y.slice(2)}`;
  };
  const _aggregateByMonth = (field) => {
    const by = {};
    for (const w of boatsWeekly) {
      if (w[field] == null) continue;
      const ym = w.we?.slice(0,7);
      if (!ym) continue;
      by[ym] = (by[ym] || 0) + w[field];
    }
    return Object.entries(by)
      .map(([ym, v], i) => ({ y: i, v, label: ym }))
      .sort((a,b) => a.label.localeCompare(b.label))
      .map((row, i) => ({ ...row, y: i }));
  };
  const interceptionsMonthly = _aggregateByMonth('e');
  const interceptionsFirstMonth = interceptionsMonthly[0]?.label ?? null;
  const interceptionsLastMonth = interceptionsMonthly[interceptionsMonthly.length - 1]?.label ?? null;
  const preventionsMonthly = _aggregateByMonth('p');
  const preventionsFirstMonth = preventionsMonthly[0]?.label ?? null;
  const preventionsLastMonth = preventionsMonthly[preventionsMonthly.length - 1]?.label ?? null;

  // Phase 4 placeholders — hydrate from globals when data lands.
  const natFull = typeof NAT_FULL !== 'undefined' ? NAT_FULL : null;
  const natFullYear = typeof NAT_FULL_META !== 'undefined' ? NAT_FULL_META.year : null;
  const natQuarterly = typeof NAT_QUARTERLY !== 'undefined' ? NAT_QUARTERLY : null;
  const resettlementSeries = typeof RESETTLEMENT_SERIES !== 'undefined' ? RESETTLEMENT_SERIES : null;
  const resettlementYears = typeof RESETTLEMENT_META !== 'undefined' ? RESETTLEMENT_META.years : [2022,2023,2024];
  const hotels = typeof HOTELS !== 'undefined' ? HOTELS : null;

  // Sex / age breakdown (SEX_AGE_ANNUAL from build_sex_age.py).
  const sexAgeData = typeof SEX_AGE_ANNUAL !== 'undefined' ? SEX_AGE_ANNUAL : null;
  const sexAgeMeta = typeof SEX_AGE_META !== 'undefined' ? SEX_AGE_META : null;
  const sexAgeLatest = sexAgeData ? sexAgeData[sexAgeData.length - 1] : null;
  const sexAgePrev = sexAgeData && sexAgeData.length > 1 ? sexAgeData[sexAgeData.length - 2] : null;
  const filteredSexAge = uMD(() => sexAgeData ? sexAgeData.filter(d => d.y >= range[0] && d.y <= range[1]) : [], [range, sexAgeData]);
  const sexAgeRangeLatest = filteredSexAge.length ? filteredSexAge[filteredSexAge.length - 1] : null;
  const sexAgeRangePrev   = filteredSexAge.length > 1 ? filteredSexAge[filteredSexAge.length - 2] : null;

  // Returns totals (RETURNS_BY_NATIONALITY from build_returns.py).
  const returnsData = typeof RETURNS_BY_NATIONALITY !== 'undefined' ? RETURNS_BY_NATIONALITY : null;
  const returnsMeta = typeof RETURNS_META !== 'undefined' ? RETURNS_META : null;
  const returnsCard = returnsData ? (() => {
    const total = returnsData.reduce((s,r) => s + (r.total||0), 0);
    const priorTotal = returnsMeta?.priorYearTotal ?? null;
    const priorYear = returnsMeta?.priorYear ?? null;
    const yoyPct = (priorTotal && priorTotal > 0)
      ? Number(((total - priorTotal) / priorTotal * 100).toFixed(1))
      : null;
    return {
      enforced: returnsData.reduce((s,r) => s + (r.enforced||0), 0),
      voluntary: returnsData.reduce((s,r) => s + (r.voluntary||0), 0),
      total,
      year: returnsMeta?.year ?? '—',
      priorYear,
      yoyPct,
    };
  })() : null;

  // Age disputes totals (AGE_DISPUTES_BY_NATIONALITY from build_age_disputes.py).
  const ageDisputesData = typeof AGE_DISPUTES_BY_NATIONALITY !== 'undefined' ? AGE_DISPUTES_BY_NATIONALITY : null;
  const ageDisputesMeta = typeof AGE_DISPUTES_META !== 'undefined' ? AGE_DISPUTES_META : null;
  const ageDisputesCard = ageDisputesData ? {
    raised: ageDisputesData.reduce((s,r) => s + (r.raised||0), 0),
    over18: ageDisputesData.reduce((s,r) => s + (r.resolved_over_18||0), 0),
    under18: ageDisputesData.reduce((s,r) => s + (r.resolved_under_18||0), 0),
    year: ageDisputesMeta?.year ?? '—',
  } : null;

  // Derive "top nationality + QoQ delta" from NAT_QUARTERLY when available.
  const topNatCard = (() => {
    if (!natQuarterly || !natQuarterly.quarters?.length || !natQuarterly.series?.length) return null;
    const qs = natQuarterly.quarters;
    const lastIdx = qs.length - 1;
    const prevIdx = Math.max(0, lastIdx - 1);
    // Find the series with the highest value in the latest quarter.
    let top = natQuarterly.series[0];
    for (const s of natQuarterly.series) {
      if ((s.data[lastIdx] ?? 0) > (top.data[lastIdx] ?? 0)) top = s;
    }
    const now = top.data[lastIdx] ?? 0;
    const was = top.data[prevIdx] ?? 0;
    const delta = was === 0 ? null : ((now - was) / was * 100);
    const quarterTotal = natQuarterly.series.reduce((s, ser) => s + (ser.data[lastIdx] ?? 0), 0);
    const share = quarterTotal > 0 ? Math.round(now / quarterTotal * 100) : null;
    return { name: top.name, v: now, delta, quarter: qs[lastIdx], prevQuarter: qs[prevIdx], share };
  })();

  // Hotels KPI: latest value + previous for delta, if data is present.
  const hotelsCard = (() => {
    if (!hotels || !hotels.length) return null;
    const last = hotels[hotels.length - 1];
    const prev2 = hotels[hotels.length - 2];
    const delta = prev2 ? ((last.persons_in_hotels - prev2.persons_in_hotels) / prev2.persons_in_hotels * 100) : null;
    return { ...last, delta };
  })();

  // Provisional last-7-days small-boats data (from the gov.uk HTML page).
  // Canonical BOATS_DAILY from the weekly ODS wins for any overlapping date;
  // the provisional values fill the visible gap between releases.
  const provisional = typeof BOATS_PROVISIONAL !== 'undefined' ? BOATS_PROVISIONAL : null;
  const provisionalMeta = typeof BOATS_PROVISIONAL_META !== 'undefined' ? BOATS_PROVISIONAL_META : null;
  const canonicalLatest = (typeof BOATS_META !== 'undefined' && BOATS_META.latestDataPoint) || null;
  const provisionalDays = uMD(() => {
    if (!provisional) return [];
    return provisional.map(row => {
      const superseded = canonicalLatest ? row.d <= canonicalLatest : false;
      const date = new Date(row.d + 'T00:00:00Z');
      const dayName = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][date.getUTCDay()];
      const day = date.getUTCDate();
      const month = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][date.getUTCMonth()];
      return { ...row, superseded, label: `${dayName} ${day} ${month}` };
    });
  }, [provisional, canonicalLatest]);
  const provisionalWeekTotal = uMD(() => provisionalDays.reduce((s,d) => s + (d.m||0), 0), [provisionalDays]);
  const sameWeekLastYear = uMD(() => {
    if (!provisionalDays.length || !boatsWeekly.length) return null;
    const latestD = provisionalDays[provisionalDays.length - 1]?.d;
    if (!latestD) return null;
    const target = new Date(latestD + 'T00:00:00Z');
    target.setUTCFullYear(target.getUTCFullYear() - 1);
    let best = null, bestDiff = Infinity;
    for (const w of boatsWeekly) {
      if (!w.we) continue;
      const diff = Math.abs(new Date(w.we + 'T00:00:00Z') - target);
      if (diff < bestDiff && diff <= 7 * 86400000) { bestDiff = diff; best = w; }
    }
    return best;
  }, [provisionalDays, boatsWeekly]);

  return (
    <main className="fade-enter" style={{maxWidth:1300,margin:'0 auto',padding:'36px 48px 80px'}}>
      {/* title strip */}
      <div style={{borderBottom:'1px solid var(--rule)',paddingBottom:22,marginBottom:28}}>
        <div className="kicker-rule" style={{color:'var(--accent-warn)',fontSize:11,letterSpacing:0.1,textTransform:'uppercase',fontWeight:500}}>Live dashboard · Q1 2026</div>
        <div style={{display:'flex',alignItems:'baseline',gap:14,flexWrap:'wrap',margin:'6px 0 10px'}}>
          <h1 style={{fontFamily:'var(--serif)',fontSize:42,letterSpacing:-0.4,fontWeight:400,margin:0}}>Asylum &amp; resettlement at a glance</h1>
          <button
            onClick={()=>{
              const anchor = document.getElementById('dash-range');
              if (anchor) anchor.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }}
            title="Jump to range filter"
            style={{
              fontFamily:'var(--mono, var(--serif))',fontSize:11,padding:'3px 10px',
              border:'1px solid var(--rule-2)',background:'var(--bg-2)',color:'var(--ink-2)',
              letterSpacing:0.04,cursor:'pointer',
            }}>
            <span style={{color:'var(--muted)',marginRight:6}}>Filtering</span>
            <span className="tnum">{range[0]}–{range[1]}</span>
          </button>
        </div>
        <p style={{fontSize:15.5,color:'var(--ink-2)',maxWidth:680,margin:0,lineHeight:1.5}}>
          Headline figures from Home Office data. Updated when the Home Office releases its quarterly figures.
        </p>
      </div>

      {/* Provisional last-7-days strip — lifted above KPI rows as the freshest data point. */}
      {provisional && provisionalDays.length > 0 && (
        <section style={{marginBottom:28,padding:'18px 22px',border:'1px dashed var(--rule-2)',background:'var(--bg-2)',borderRadius:0,borderLeft:'none',borderRight:'none'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14,gap:24,flexWrap:'wrap'}}>
            <div>
              <div className="uc" style={{color:'var(--accent-warn)',fontSize:11,letterSpacing:0.1,fontWeight:500,marginBottom:8}}>Last 7 days · provisional</div>
              <div style={{display:'flex',alignItems:'baseline',gap:14,flexWrap:'wrap'}}>
                <div style={{fontFamily:'var(--serif)',fontSize:36,fontWeight:400,letterSpacing:-0.4,lineHeight:1,color:'var(--ink)'}} className="tnum">
                  {provisionalWeekTotal.toLocaleString()}
                </div>
                {sameWeekLastYear && sameWeekLastYear.m > 0 && (() => {
                  const diff = provisionalWeekTotal - sameWeekLastYear.m;
                  const pct = (diff / sameWeekLastYear.m * 100).toFixed(0);
                  return (
                    <div style={{fontSize:13,color: diff > 0 ? 'var(--accent-warn)' : 'var(--accent-2)',fontStyle:'italic'}}>
                      {diff>=0?'+':''}{pct}% vs same week {sameWeekLastYear.we.slice(0,4)}
                    </div>
                  );
                })()}
              </div>
              {/* Mini sparkline */}
              <svg width={provisionalDays.length * 22} height={30} style={{display:'block',marginTop:8}}>
                {(() => {
                  const vals = provisionalDays.map(d => d.m);
                  const maxV = Math.max(...vals, 1);
                  return vals.map((v, i) => (
                    <rect key={i} x={i * 22} y={30 - Math.round((v / maxV) * 24)} width={18} height={Math.round((v / maxV) * 24)}
                      fill={provisionalDays[i].superseded ? 'var(--muted-2)' : 'var(--accent-warn)'}/>
                  ));
                })()}
              </svg>
            </div>
            <div style={{fontSize:12,color:'var(--muted)',fontStyle:'italic',textAlign:'right',marginTop:4}}>
              {provisionalMeta?.updatedAt
                ? `Updated ${new Date(provisionalMeta.updatedAt+'T00:00:00Z').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric',timeZone:'UTC'})}`
                : ''}
              {canonicalLatest && <div style={{marginTop:4}}>Canonical ODS through {canonicalLatest}</div>}
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7, 1fr)',gap:8}}>
            {provisionalDays.map((d,i) => (
              <div key={d.d}
                title={d.superseded
                  ? 'Verified — this date has been incorporated into the weekly ODS time series and is no longer provisional.'
                  : 'Provisional — not yet confirmed by the weekly ODS. May be revised when the next release publishes.'}
                style={{padding:'10px 10px 12px',background:'#fff',
                  border: d.superseded ? '1px solid var(--rule)' : '1px dashed var(--accent-warn)',
                  opacity: d.superseded ? 0.5 : 1,cursor:'help'}}>
                <div className="uc" style={{fontSize:10.5,color:'var(--muted)',letterSpacing:0.1}}>{d.label}</div>
                <div className="tnum" style={{fontFamily:'var(--serif)',fontSize:22,fontWeight:400,letterSpacing:-0.3,lineHeight:1.1,marginTop:6,color:'var(--ink)'}}>
                  {d.m.toLocaleString()}
                </div>
                <div style={{fontSize:11.5,color:'var(--muted-2)',marginTop:4}}>
                  {d.b} boat{d.b===1?'':'s'}{d.superseded ? ' · verified' : ''}
                </div>
              </div>
            ))}
          </div>
          <div style={{fontSize:11.5,color:'var(--muted)',marginTop:10,fontStyle:'italic',lineHeight:1.5}}>
            Figures are provisional, drawn from the Home Office{' '}
            <a href={(typeof BOATS_PROVISIONAL_META !== 'undefined' && BOATS_PROVISIONAL_META?.sourceUrl)
                      || 'https://www.gov.uk/government/publications/migrants-detected-crossing-the-english-channel-in-small-boats/migrants-detected-crossing-the-english-channel-in-small-boats-last-7-days'}
               target="_blank" rel="noopener noreferrer"
               style={{color:'inherit',textDecoration:'underline',textDecorationStyle:'dotted',textUnderlineOffset:2}}>
              small-boat crossings · last 7 days
            </a>{' '}page and updated each day. Faded cells have already been confirmed by the weekly ODS time series; unfaded cells may still be revised. Hover a cell for details.
          </div>
        </section>
      )}

      {/* Hero KPI row — four promoted statistics with sparklines.
          Deliberately large and quiet: this is what a casual visitor should
          see first. The full 15-card grid sits underneath, collapsed. */}
      {(() => {
        const W = (typeof window !== 'undefined') ? window : {};
        // This-week arrivals — last row of BOATS_WEEKLY.
        const wk = (W.BOATS_WEEKLY || []);
        const lastWk = wk[wk.length - 1];
        // YTD arrivals — last non-null value of the current year's BOATS_YOY series.
        const yoy = W.BOATS_YOY || {};
        const yoyYears = Object.keys(yoy).sort();
        const latestYoyYear = yoyYears[yoyYears.length - 1];
        const latestYoyArr = latestYoyYear ? yoy[latestYoyYear] : [];
        let ytd = null, ytdDay = null;
        for (let i = latestYoyArr.length - 1; i >= 0; i--) {
          if (latestYoyArr[i] != null) { ytd = latestYoyArr[i]; ytdDay = i + 1; break; }
        }
        const priorYoyArr = yoyYears.length > 1 ? yoy[yoyYears[yoyYears.length - 2]] : [];
        const ytdPrior = (ytdDay != null && priorYoyArr[ytdDay - 1] != null) ? priorYoyArr[ytdDay - 1] : null;
        const ytdDelta = (ytd && ytdPrior) ? ((ytd - ytdPrior) / ytdPrior * 100) : null;
        // Weighted UK grant rate series — from NAT_GRANT_ANNUAL if we have NAT_FULL counts per year
        // we could weight properly; without per-year counts, fall back to the DECISIONS_LATEST point.
        // Sparklines driven by BOATS_ANNUAL (arrivals), BACKLOG_LATEST (backlog).
        const boatsAnnual = (W.BOATS_ANNUAL || []).map(r => ({ y: r.y, v: r.m }));
        const backlogSeries = (W.BACKLOG_LATEST || []).map(r => ({ y: r.y, v: r.v }));
        // Grant-rate sparkline: unweighted average across NAT_GRANT_ANNUAL series for each year.
        const nga = W.NAT_GRANT_ANNUAL;
        const grantSpark = (nga && Array.isArray(nga.years) && Array.isArray(nga.series)) ? nga.years.map((yr, i) => {
          const vals = nga.series.map(s => s.data[i]).filter(v => v != null);
          const avg = vals.length ? vals.reduce((a,b)=>a+b,0) / vals.length : null;
          return avg == null ? null : { y: yr, v: avg };
        }).filter(Boolean) : [];

        const heroCards = [
          { label: 'This week · arrivals',
            v: lastWk ? fmtN(lastWk.m) : '—',
            d: lastWk ? `week ending ${lastWk.we}` : 'Data pending',
            spark: wk.slice(-12).map((w,i) => ({ y: i, v: w.m || 0 })),
            sparkStroke: 'var(--accent-warn)' },
          { label: `Small-boat arrivals · ${latestYoyYear ?? ''}`,
            v: ytd != null ? fmtN(ytd) : '—',
            d: ytdDelta != null ? `${ytdDelta>=0?'+':''}${ytdDelta.toFixed(1)}% vs same point in ${+latestYoyYear - 1}` : 'cumulative year-to-date',
            spark: boatsAnnual, sparkStroke: 'var(--accent-warn)' },
          { label: `Backlog · ${backlogSeries[backlogSeries.length-1]?.y ?? ''}`,
            v: backlogSeries.length ? fmtN(backlogSeries[backlogSeries.length-1].v) : '—',
            d: (() => {
              if (backlogSeries.length < 2) return 'pending initial decision';
              const a = backlogSeries[backlogSeries.length-1].v, b = backlogSeries[backlogSeries.length-2].v;
              return b>0 ? `${((a-b)/b*100).toFixed(1)}% vs prior year` : 'pending initial decision';
            })(),
            spark: backlogSeries, sparkStroke: 'var(--accent-gold)' },
          { label: `Grant rate · ${decisionsYear}`,
            v: `${Math.round(grantRate*100)}%`,
            d: 'of initial decisions',
            spark: grantSpark, sparkStroke: 'var(--accent-2)' },
        ];
        return (
          <section style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:24,paddingBottom:22,borderBottom:'1px solid var(--rule)'}}>
            {heroCards.map((k,i) => (
              <div key={i} style={{padding:'20px 22px',background:'var(--bg-2)',border:'1px solid var(--rule)'}}>
                <div className="uc" style={{color:'var(--muted)',marginBottom:10,fontSize:10.5}}>{k.label}</div>
                <div style={{fontFamily:'var(--serif)',fontSize:40,fontWeight:400,letterSpacing:-0.4,lineHeight:1,color:'var(--ink)'}} className="tnum">{k.v}</div>
                <div style={{fontSize:12.5,color:'var(--muted)',marginTop:8,fontStyle:'italic'}}>{k.d}</div>
                {k.spark && k.spark.length > 1 && (
                  <div style={{marginTop:12}}>
                    <Spark data={k.spark} width={220} height={36} stroke={k.sparkStroke}/>
                  </div>
                )}
              </div>
            ))}
          </section>
        );
      })()}

      {/* Detail statistics — full 15-card grid, collapsed by default. */}
      <details style={{marginBottom:14}}>
        <summary style={{cursor:'pointer',listStyle:'none',padding:'10px 0',borderBottom:'1px solid var(--rule)',display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
          <span className="uc" style={{color:'var(--muted)',fontSize:10.5}}>Detail · 15 statistics</span>
          <span style={{fontSize:11,color:'var(--muted-2)',fontStyle:'italic'}}>click to expand ▾</span>
        </summary>
        <div style={{paddingTop:18}}>
      {/* KPI strip row 1 — Preventions · Applications · Initial decisions · Appeals allowed.
          The "Small-boat arrivals · YYYY" card that lived here was a duplicate of the
          hero card above (same number, same year) and was removed in the polish pass. */}
      <section style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:14}}>
        {[
          { cls:'ink', label:`Preventions · ${preventionsYear}`, v:fmtN(preventionsYearTotal),
            d: preventionsFirstWeek ? `since wk ending ${preventionsFirstWeek}` : 'provisional', dPos:true },
          { cls:'accent', label:`Applications · ${rangeLatest.y}`, v:fmtN(rangeLatest.v),
            d: pctChange!=null ? `${+pctChange>=0?'+':''}${pctChange}% vs ${rangePrev?.y??''}` : `${rangeLatest.y} only`,

// Dual-handle year-range slider with ticks, preset chips, and a promoted selection label.
// Replaces the pair of overlapping native <input type="range"> sliders — those had no
// visible selected segment, no ticks, and the active years were easy to misread.
function FilterRange({ range, setRange, min, max }) {
  const svgRef = uRD(null);
  const dragRef = uRD(null);
  const width = 460;
  const pad = 14;
  const trackY = 18;
  const trackW = width - pad * 2;
  const yToX = y => pad + ((y - min) / (max - min)) * trackW;
  const xToY = x => Math.round(min + ((x - pad) / trackW) * (max - min));

  const setFromPointer = (e) => {
    if (!dragRef.current || !svgRef.current) return;
    const rect = svgRef.current.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * width;
    const y = Math.max(min, Math.min(max, xToY(x)));
    if (dragRef.current === 'start') setRange([Math.min(y, range[1] - 1), range[1]]);
    else setRange([range[0], Math.max(y, range[0] + 1)]);
  };
  const endDrag = () => { dragRef.current = null; };

  uED(() => {
    window.addEventListener('pointermove', setFromPointer);
    window.addEventListener('pointerup', endDrag);
    return () => {
      window.removeEventListener('pointermove', setFromPointer);
      window.removeEventListener('pointerup', endDrag);
    };
  }, [range]);

  const onTickClick = (y) => () => {
    // Click a tick to move the nearer handle there.
    const dStart = Math.abs(y - range[0]);
    const dEnd = Math.abs(y - range[1]);
    if (dStart <= dEnd) setRange([Math.min(y, range[1] - 1), range[1]]);
    else setRange([range[0], Math.max(y, range[0] + 1)]);
  };

  const presets = [
    { label: 'Last 3y',    r: [max - 2, max] },
    { label: 'Since 2018', r: [2018, max] },
    { label: 'Since 2020', r: [2020, max] },
    { label: 'All time',   r: [min, max] },
  ];
  const isActive = (p) => p.r[0] === range[0] && p.r[1] === range[1];

  const years = [];
  for (let y = min; y <= max; y++) years.push(y);

  return (
    <div>
      <div style={{fontFamily:'var(--serif)',fontSize:17,color:'var(--ink)',marginBottom:10,letterSpacing:-0.1}}>
        Showing <span className="tnum" style={{fontWeight:500}}>{range[0]}–{range[1]}</span>
        <span style={{color:'var(--muted-2)',fontSize:13,marginLeft:8,fontStyle:'italic'}}>
          {range[1] - range[0] + 1} year{range[1]-range[0]===0?'':'s'}
        </span>
      </div>
      <div style={{display:'flex',gap:6,marginBottom:10,flexWrap:'wrap'}}>
        {presets.map(p => (
          <button key={p.label} onClick={()=>setRange(p.r)} style={{
            fontSize:11.5,padding:'4px 10px',fontFamily:'var(--serif)',
            background: isActive(p) ? 'var(--accent)' : 'transparent',
            color: isActive(p) ? 'var(--bg)' : 'var(--ink-2)',
            border: '1px solid ' + (isActive(p) ? 'var(--accent)' : 'var(--rule-2)'),
            cursor: 'pointer',
          }}>{p.label}</button>
        ))}
      </div>
      <svg ref={svgRef} width="100%" viewBox={`0 0 ${width} 52`} height={52}
           style={{display:'block',touchAction:'none',userSelect:'none'}}>
        <line x1={pad} x2={width-pad} y1={trackY} y2={trackY} stroke="var(--rule-2)" strokeWidth={3}/>
        <line x1={yToX(range[0])} x2={yToX(range[1])} y1={trackY} y2={trackY} stroke="var(--accent)" strokeWidth={3}/>
        {years.map(y => {
          const x = yToX(y);
          const inRange = y >= range[0] && y <= range[1];
          const isHandle = y === range[0] || y === range[1];
          const showLabel = (y === min || y === max || y % 2 === 0) && !isHandle;
          const anchor = y === min ? 'start' : y === max ? 'end' : 'middle';
          return (
            <g key={y} onClick={onTickClick(y)} style={{cursor:'pointer'}}>
              <rect x={x-4} y={trackY-8} width={8} height={16} fill="transparent"/>
              <line x1={x} x2={x} y1={trackY-5} y2={trackY+5}
                    stroke={inRange ? 'var(--accent)' : 'var(--muted-2)'} strokeWidth={1}/>
              {showLabel && (
                <text x={x} y={trackY+22} fontSize={10} textAnchor={anchor}
                      fill={inRange ? 'var(--ink-2)' : 'var(--muted-2)'}
                      style={{letterSpacing:0.04}}>{y}</text>
              )}
            </g>
          );
        })}
        {['start','end'].map(which => {
          const y = range[which==='start'?0:1];
          return (
            <circle key={which} cx={yToX(y)} cy={trackY} r={8}
                    fill="#fff" stroke="var(--accent)" strokeWidth={2}
                    style={{cursor:'grab'}}
                    onPointerDown={(e)=>{e.preventDefault(); dragRef.current = which;}}>
              <title>{which==='start'?'Start year':'End year'}: {y}</title>
            </circle>
          );
        })}
      </svg>
    </div>
  );
}

// Scrollable full-nationalities table with sortable columns
function NationalitiesTable({ data }) {
  const [sortBy, setSortBy] = uSD('v');
  const [asc, setAsc] = uSD(false);
  const [query, setQuery] = uSD('');
  const [region, setRegion] = uSD('all');

  if (!data || !data.length) {
    return (
      <div style={{padding:'48px 0',textAlign:'center',color:'var(--muted-2)',fontSize:13,fontStyle:'italic',border:'1px dashed var(--rule-2)'}}>
        Data pending — NAT_FULL not yet loaded
      </div>
    );
  }

  // All regions from REGION_MAP — 'Other / Unclassified' bucket covers names
  // missing from the map. Built once per render from the data slice so the
  // filter dropdown only lists regions present in the current dataset.
  const regionOptions = uMD(() => {
    const set = new Set();
    data.forEach(r => set.add(REGION_MAP[r.name] ?? 'Other / Unclassified'));
    return Array.from(set).sort();
  }, [data]);

  // Apply text + region filter, then sort.
  const filtered = uMD(() => {
    const q = query.trim().toLowerCase();
    return data.filter(r => {
      const rg = REGION_MAP[r.name] ?? 'Other / Unclassified';
      if (region !== 'all' && rg !== region) return false;
      if (q && !r.name.toLowerCase().includes(q)) return false;
      return true;
    });
  }, [data, query, region]);

  const sorted = [...filtered].sort((a,b) => {
    const av = a[sortBy], bv = b[sortBy];
    if (typeof av === 'string') return asc ? av.localeCompare(bv) : bv.localeCompare(av);
    return asc ? av - bv : bv - av;
  });

  // Axis for the inline grant-rate bar — fixed at 1.0 so the bar reads as a
  // share of all decisions, not a relative share within the visible rows.
  const grantBarColour = g => g == null ? 'var(--muted-2)' : g >= 0.6 ? 'var(--accent-2)' : g >= 0.35 ? 'var(--accent-gold)' : 'var(--accent-warn)';

  const click = (col) => () => {
    if (sortBy === col) setAsc(!asc);
    else { setSortBy(col); setAsc(col === 'name'); }
  };
  const arrow = (col) => sortBy===col ? (asc?' ↑':' ↓') : '';

  return (
    <div style={{marginTop:12}}>
      {/* Filter row — text search + region pick */}
      <div style={{display:'flex',gap:8,marginBottom:10,alignItems:'center',flexWrap:'wrap'}}>
        <input type="search" value={query} onChange={e => setQuery(e.target.value)}
          placeholder="Find a nationality…"
          style={{flex:'1 1 140px',minWidth:120,padding:'5px 10px',fontSize:12.5,border:'1px solid var(--rule)',background:'var(--bg)',color:'var(--ink)',fontFamily:'var(--serif)',outline:'none'}}/>
        <select value={region} onChange={e => setRegion(e.target.value)}
          style={{padding:'5px 8px',fontSize:12,border:'1px solid var(--rule)',background:'var(--bg)',color:'var(--ink-2)',fontFamily:'var(--serif)'}}>
          <option value="all">All regions</option>
          {regionOptions.map(r => <option key={r} value={r}>{r}</option>)}
        </select>
        <span className="uc" style={{color:'var(--muted-2)',fontSize:10.5}}>{sorted.length} of {data.length}</span>
      </div>

      <div style={{maxHeight:260,overflowY:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13,tableLayout:'fixed'}}>
          <colgroup>
            <col style={{width:'44%'}}/>
            <col style={{width:'20%'}}/>
            <col style={{width:'36%'}}/>
          </colgroup>
          <thead style={{position:'sticky',top:0,background:'#fff'}}>
            <tr>
              <th className="uc" onClick={click('name')} style={{textAlign:'left',padding:'6px 8px 6px 0',fontWeight:500,color:'var(--muted)',borderBottom:'1px solid var(--rule)',cursor:'pointer',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>Nationality{arrow('name')}</th>
              <th className="uc" onClick={click('v')}    style={{textAlign:'right',padding:'6px 0',fontWeight:500,color:'var(--muted)',borderBottom:'1px solid var(--rule)',cursor:'pointer'}}>Apps{arrow('v')}</th>
              <th className="uc" onClick={click('grant')}style={{textAlign:'right',padding:'6px 0 6px 16px',fontWeight:500,color:'var(--muted)',borderBottom:'1px solid var(--rule)',cursor:'pointer'}}>Grant{arrow('grant')}</th>
            </tr>
          </thead>
          <tbody>
            {sorted.map((r,i)=>(
              <tr key={r.name} style={{borderBottom:'1px dotted var(--rule)'}}>
                <td style={{padding:'5px 8px 5px 0',color:'var(--ink)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}} title={r.name}>{r.name}</td>
                <td className="tnum" style={{padding:'5px 0',textAlign:'right'}}>{fmtN(r.v)}</td>
                <td style={{padding:'5px 0 5px 16px',textAlign:'right'}}>
                  {r.grant != null ? (
                    <div style={{display:'inline-flex',alignItems:'center',gap:6,justifyContent:'flex-end',width:'100%'}}>
                      <div style={{position:'relative',width:56,height:8,background:'var(--bg-2)'}} title={`${Math.round(r.grant*100)}%`}>
                        <div style={{position:'absolute',inset:0,width:`${Math.min(100, r.grant*100)}%`,background:grantBarColour(r.grant)}}/>
                      </div>
                      <span className="tnum" style={{color:'var(--muted)',fontSize:11,minWidth:30,textAlign:'right'}}>{Math.round(r.grant*100)}%</span>
                    </div>
                  ) : (
                    <span className="tnum" style={{color:'var(--muted-2)'}}>—</span>
                  )}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}
